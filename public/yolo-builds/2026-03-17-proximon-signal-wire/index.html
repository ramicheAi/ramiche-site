<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIGNAL WIRE — Agent Communication Visualiser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--surface:#0c0c14;--border:#151520;
  --cyan:#22d3ee;--gold:#C9A84C;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --purple:#a855f7;--blue:#3b82f6;--pink:#ec4899;--orange:#f97316;
  --text:#e2e8f0;--dim:#475569;--muted:#1e293b
}
html{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;background:var(--bg);color:var(--text);overflow-x:hidden}
body{min-height:100vh;position:relative}

/* ── NOISE GRAIN ── */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.4
}

/* ── LAYOUT ── */
.wire{position:relative;z-index:1;max-width:100vw;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:16px 24px;border-bottom:1px solid var(--border);
  background:rgba(5,5,8,0.9);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100
}
.topbar .mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#000;
  box-shadow:0 0 20px rgba(34,211,238,0.3)
}
.topbar h1{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--cyan)}
.topbar .sub{font-size:9px;color:var(--dim);letter-spacing:2px}
.topbar .live{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  font-size:10px;letter-spacing:2px;color:var(--green)
}
.topbar .live::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);
  animation:livePulse 1.5s ease-in-out infinite
}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar .clock{font-size:20px;font-weight:200;color:var(--gold);letter-spacing:1px;margin-left:16px}

/* ── MAIN SPLIT ── */
.main{display:grid;grid-template-columns: 1fr;flex:1;overflow:hidden}

/* ── LEFT: AGENT ROSTER ── */
.roster{
  border-right:1px solid var(--border);overflow-y:auto;
  padding:0;background:var(--surface)
}
.roster-title{
  font-size:9px;letter-spacing:3px;color:var(--dim);
  padding:16px 16px 8px;text-transform:uppercase
}
.agent-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:all 0.15s ease;position:relative
}
.agent-row:hover{background:rgba(34,211,238,0.03)}
.agent-row.active{background:rgba(34,211,238,0.06);border-left:2px solid var(--cyan)}
.agent-row .dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0
}
.dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.idle{background:var(--amber)}
.dot.offline{background:var(--dim)}
.agent-row .name{font-size:11px;font-weight:600;letter-spacing:0.5px}
.agent-row .model{font-size:9px;color:var(--dim)}
.agent-row .msg-count{
  margin-left:auto;font-size:9px;
  background:var(--cyan);color:#000;
  padding:1px 6px;border-radius:8px;font-weight:700
}
.agent-row .signal-bars{
  display:flex;gap:1px;align-items:flex-end;height:12px;margin-left:auto
}
.signal-bars .bar{width:3px;border-radius:1px;transition:all 0.3s}

/* ── RIGHT: CANVAS + FEED ── */
.right{display:flex;flex-direction:column;overflow:hidden}

/* ── NETWORK CANVAS ── */
.canvas-wrap{
  position:relative;height:45vh;min-height:300px;
  background:var(--bg);border-bottom:1px solid var(--border);
  overflow:hidden
}
#network{width:100%;height:100%}

/* ── SIGNAL FEED ── */
.feed{flex:1;overflow-y:auto;padding:0}
.feed-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:10
}
.feed-header .title{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.feed-header .filters{display:flex;gap:4px;margin-left:auto}
.feed-header .filter-btn{
  font-size:9px;letter-spacing:1px;padding:3px 8px;
  border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;
  transition:all 0.15s;font-family:inherit
}
.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.05)}

.signal{
  display:grid;grid-template-columns: 1fr 60px;
  align-items:start;gap:12px;
  padding:10px 20px;border-bottom:1px solid rgba(21,21,32,0.5);
  animation:signalIn 0.3s ease-out;
  transition:background 0.15s
}
.signal:hover{background:rgba(34,211,238,0.02)}
@keyframes signalIn{
  from{opacity:0;transform:translateY(-8px)}
  to{opacity:1;transform:translateY(0)}
}
.signal .time{font-size:10px;color:var(--dim);white-space:nowrap;padding-top:2px}
.signal .icon{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0
}
.signal .body{min-width:0}
.signal .route{font-size:10px;color:var(--dim);margin-bottom:2px}
.signal .route .from{color:var(--cyan)}
.signal .route .to{color:var(--gold)}
.signal .content{font-size:12px;line-height:1.5;word-break:break-word}
.signal .type-badge{
  font-size:8px;letter-spacing:1px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;white-space:nowrap;
  justify-self:end;margin-top:2px
}

/* TYPE COLOURS */
.type-task{background:rgba(34,211,238,0.12);color:var(--cyan)}
.type-result{background:rgba(34,197,94,0.12);color:var(--green)}
.type-error{background:rgba(239,68,68,0.12);color:var(--red)}
.type-decision{background:rgba(168,85,247,0.12);color:var(--purple)}
.type-handoff{background:rgba(201,168,76,0.12);color:var(--gold)}
.type-broadcast{background:rgba(236,72,153,0.12);color:var(--pink)}
.type-escalation{background:rgba(249,115,22,0.12);color:var(--orange)}

.icon-task{background:rgba(34,211,238,0.1);color:var(--cyan)}
.icon-result{background:rgba(34,197,94,0.1);color:var(--green)}
.icon-error{background:rgba(239,68,68,0.1);color:var(--red)}
.icon-decision{background:rgba(168,85,247,0.1);color:var(--purple)}
.icon-handoff{background:rgba(201,168,76,0.1);color:var(--gold)}
.icon-broadcast{background:rgba(236,72,153,0.1);color:var(--pink)}
.icon-escalation{background:rgba(249,115,22,0.1);color:var(--orange)}

/* ── STATS STRIP ── */
.stats{
  display:flex;gap:0;border-bottom:1px solid var(--border);
  background:var(--surface)
}
.stat{
  flex:1;padding:12px 16px;text-align:center;
  border-right:1px solid var(--border)
}
.stat:last-child{border-right:none}
.stat .val{font-size:22px;font-weight:200;color:var(--cyan)}
.stat .lbl{font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:2px}
.stat.gold .val{color:var(--gold)}
.stat.green .val{color:var(--green)}
.stat.amber .val{color:var(--amber)}
.stat.red .val{color:var(--red)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .roster{display:none}
  .canvas-wrap{height:35vh;min-height:200px}
  .signal{grid-template-columns: 1fr 50px}
}

/* ── PARTICLE TRAIL ── */
.particle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  pointer-events:none;z-index:5
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
</style>
</head>
<body>
<div class="wire">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="mark">SW</div>
    <div>
      <h1>SIGNAL WIRE</h1>
      <div class="sub">Agent Communication Visualiser</div>
    </div>
    <div class="live">LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <!-- STATS STRIP -->
  <div class="stats">
    <div class="stat"><div class="val" id="s-signals">0</div><div class="lbl">Signals</div></div>
    <div class="stat gold"><div class="val" id="s-agents">0</div><div class="lbl">Agents Active</div></div>
    <div class="stat green"><div class="val" id="s-tasks">0</div><div class="lbl">Tasks</div></div>
    <div class="stat amber"><div class="val" id="s-handoffs">0</div><div class="lbl">Handoffs</div></div>
    <div class="stat red"><div class="val" id="s-errors">0</div><div class="lbl">Errors</div></div>
  </div>

  <!-- MAIN SPLIT -->
  <div class="main">
    <!-- LEFT ROSTER -->
    <div class="roster">
      <div class="roster-title">Agent Roster</div>
      <div id="roster"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <!-- NETWORK CANVAS -->
      <div class="canvas-wrap">
        <canvas id="network"></canvas>
      </div>

      <!-- FEED -->
      <div class="feed-header">
        <div class="title">Signal Feed</div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="task">TASK</button>
          <button class="filter-btn" data-filter="result">RESULT</button>
          <button class="filter-btn" data-filter="handoff">HANDOFF</button>
          <button class="filter-btn" data-filter="decision">DECISION</button>
          <button class="filter-btn" data-filter="error">ERROR</button>
        </div>
      </div>
      <div class="feed" id="feed"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════════════
   SIGNAL WIRE — Real-time Agent Communication Visualiser
   Built by PROXIMON · R&D Architect · RAMICHE OS

   Shows every message, task, handoff, and decision flowing between agents
   as an animated particle network. Ultra-linear. Dark. Mesmerising.
   ══════════════════════════════════════════════════════════════════════════════ */

const AGENTS = [
  { id:'atlas',     name:'ATLAS',       role:'Team Lead',        model:'Claude Opus 4.6',    color:'#C9A84C', status:'online' },
  { id:'proximon',  name:'PROXIMON',    role:'R&D Architect',    model:'DeepSeek V3.2',      color:'#22d3ee', status:'online' },
  { id:'aetherion', name:'AETHERION',   role:'Design Director',  model:'Claude Sonnet 4.5',  color:'#a855f7', status:'online' },
  { id:'shuri',     name:'SHURI',       role:'Frontend Engineer',model:'DeepSeek V3.2',      color:'#3b82f6', status:'online' },
  { id:'maestro',   name:'TheMAESTRO',  role:'Music Production', model:'DeepSeek V3.2',      color:'#ec4899', status:'idle' },
  { id:'simons',    name:'SIMONS',      role:'Data & Analytics', model:'DeepSeek V3.2',      color:'#f59e0b', status:'online' },
  { id:'vee',       name:'VEE',         role:'Marketing & Comms',model:'DeepSeek V3.2',      color:'#34d399', status:'idle' },
  { id:'widow',     name:'WIDOW',       role:'Security',         model:'DeepSeek V3.2',      color:'#ef4444', status:'online' },
  { id:'mercury',   name:'MERCURY',     role:'Sales & Revenue',  model:'DeepSeek V3.2',      color:'#f97316', status:'idle' },
  { id:'nova',      name:'NOVA',        role:'Fabrication',      model:'Claude Sonnet 4.5',  color:'#8b5cf6', status:'idle' },
  { id:'kiyosaki',  name:'KIYOSAKI',    role:'Finance',          model:'DeepSeek V3.2',      color:'#06b6d4', status:'idle' },
  { id:'themis',    name:'THEMIS',      role:'Legal Review',     model:'DeepSeek V3.2',      color:'#64748b', status:'idle' },
  { id:'ink',       name:'INK',         role:'Content',          model:'DeepSeek V3.2',      color:'#e879f9', status:'idle' },
  { id:'haven',     name:'HAVEN',       role:'Community',        model:'DeepSeek V3.2',      color:'#2dd4bf', status:'idle' },
  { id:'echo',      name:'ECHO',        role:'Intel Analyst',    model:'Gemini 3.1 Pro',     color:'#818cf8', status:'idle' },
  { id:'triage',    name:'TRIAGE',      role:'Debug Specialist', model:'Claude Sonnet 4.5',  color:'#fb923c', status:'idle' },
  { id:'strange',   name:'DR STRANGE',  role:'Scenario Modeling',model:'Claude Sonnet 4.5',  color:'#c084fc', status:'idle' },
  { id:'swimelite', name:'SWIM ELITE',  role:'Athlete Training', model:'DeepSeek V3.2',      color:'#38bdf8', status:'idle' },
  { id:'selah',     name:'SELAH',       role:'Wellness',         model:'DeepSeek V3.2',      color:'#4ade80', status:'idle' },
  { id:'chatbot',   name:'CHATBOT',     role:'Public Assistant', model:'DeepSeek V3.2',      color:'#fbbf24', status:'idle' },
];

const SIGNAL_TYPES = ['task','result','handoff','decision','error','broadcast','escalation'];
const ICONS = {task:'⚡',result:'✓',handoff:'→',decision:'◆',error:'✕',broadcast:'◉',escalation:'▲'};

const SAMPLE_SIGNALS = [
  {from:'atlas',to:'proximon',type:'task',msg:'Run daily improvement loop — identify highest-leverage experiment across METTLE'},
  {from:'proximon',to:'atlas',type:'result',msg:'Gateway timeout patched 300→1800s. Session completion rate +94%'},
  {from:'atlas',to:'shuri',type:'task',msg:'Extract AnalyticsDashboard from coach/page.tsx — target < 300 lines'},
  {from:'shuri',to:'atlas',type:'result',msg:'AnalyticsDashboard extracted. 19KB. Build passes clean.'},
  {from:'proximon',to:'shuri',type:'handoff',msg:'MeetsView scoring engine ready — wire onMeetScore callback into coach page'},
  {from:'atlas',to:'simons',type:'task',msg:'Generate PE portfolio value multiplier model for Verified Agent pitch'},
  {from:'simons',to:'atlas',type:'result',msg:'PE Multiplier YOLO build complete — Chart.js waterfall, 10x speed factor validated'},
  {from:'widow',to:'atlas',type:'escalation',msg:'Firestore rules audit: write size limits active, deletes blocked, but public reads open on 2 collections'},
  {from:'atlas',to:'aetherion',type:'task',msg:'Design athlete card themes — 6 variants matching METTLE brand identity'},
  {from:'aetherion',to:'atlas',type:'result',msg:'6 card themes shipped: Neon, Ocean, Fire, Shadow, Gold, Crystal. PNG export ready.'},
  {from:'proximon',to:'atlas',type:'decision',msg:'Direct API routing approved — Gemini→DeepSeek→OpenRouter. ~80% cost reduction.'},
  {from:'atlas',to:'mercury',type:'task',msg:'Build pricing calculator for verified agent hourly rates vs human SG&A'},
  {from:'echo',to:'atlas',type:'result',msg:'Intel scan complete: Firestore Pipelines GA, Node.js cold-start improvements, Wiz acquisition'},
  {from:'atlas',to:'vee',type:'task',msg:'Draft launch copy for Galactik Antics Shopify store — collector tier messaging'},
  {from:'proximon',to:'widow',type:'handoff',msg:'syncSaveRoster zero-XP guard patched. Verify no other unguarded write paths.'},
  {from:'nova',to:'atlas',type:'result',msg:'Spool Tracker prototype complete — filament usage, cost calc, live printer status'},
  {from:'atlas',to:'kiyosaki',type:'task',msg:'Model cash flow projections for Q2 — factor in reduced OpenRouter spend'},
  {from:'triage',to:'atlas',type:'error',msg:'coach/page.tsx build fail: getSportForAthlete prop missing from AnalyticsDashboard'},
  {from:'proximon',to:'atlas',type:'broadcast',msg:'All 3 urgent bottlenecks resolved. Gateway, DeepSeek fallbacks, zombie sessions — verified.'},
  {from:'strange',to:'atlas',type:'decision',msg:'Scenario model: Shopify single-store multi-brand beats separate stores by 3.2x on cross-sell'},
  {from:'atlas',to:'maestro',type:'task',msg:'Score ambient loop for METTLE level-up celebration — 8-bit meets synthwave'},
  {from:'maestro',to:'atlas',type:'result',msg:'Level-up audio exported: 2.3s WAV, 8-bit arp → pad swell. Three variations.'},
  {from:'proximon',to:'simons',type:'handoff',msg:'Meet scoring engine deployed — need analytics view for meet-day XP distribution'},
  {from:'haven',to:'atlas',type:'result',msg:'Discord community onboarding flow drafted — 5 channels, role assignment bot'},
  {from:'swimelite',to:'proximon',type:'result',msg:'Practice planner templates loaded — 8 set types, 7 energy zones, drag-drop ready'},
  {from:'ink',to:'vee',type:'handoff',msg:'Blog post draft: "Why Your Swim Team Needs Gamification" — ready for social cuts'},
  {from:'selah',to:'atlas',type:'result',msg:'Wellness check framework deployed — burnout detection across agent session patterns'},
  {from:'chatbot',to:'atlas',type:'error',msg:'Public chat endpoint returning 503 — Gemini rate limit hit at 2:47 AM'},
  {from:'themis',to:'atlas',type:'decision',msg:'SwimCloud scraping is fair use — transformative, non-commercial, factual data only'},
  {from:'atlas',to:'proximon',type:'task',msg:'Build YOLO — something wild and unconventional. Go full R&D mode.'},
];

let signals = [];
let stats = {signals:0,tasks:0,handoffs:0,errors:0};
let activeFilter = 'all';
let nodePositions = {};
let particles = [];
let activeAgents = new Set();

/* ── CLOCK ── */
function updateClock(){
  const d = new Date();
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  const s = d.getSeconds().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();

/* ── ROSTER ── */
function renderRoster(){
  const el = document.getElementById('roster');
  el.innerHTML = AGENTS.map(a => {
    const isActive = activeAgents.has(a.id);
    const st = isActive ? 'online' : a.status;
    const signal = isActive ? 5 : st==='online' ? 3 : st==='idle' ? 1 : 0;
    return `<div class="agent-row ${isActive?'active':''}" data-agent="${a.id}">
      <div class="dot ${st}"></div>
      <div>
        <div class="name" style="color:${a.color}">${a.name}</div>
        <div class="model">${a.model}</div>
      </div>
      <div class="signal-bars">
        ${[1,2,3,4,5].map(i => `<div class="bar" style="height:${i*2+2}px;background:${i<=signal?a.color:'var(--border)'}"></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

/* ── NETWORK CANVAS ── */
const canvas = document.getElementById('network');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  const wrap = canvas.parentElement;
  W = canvas.width = wrap.clientWidth * devicePixelRatio;
  H = canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  layoutNodes();
}

function layoutNodes(){
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  const cx = w/2, cy = h/2;
  const innerR = Math.min(w,h) * 0.2;
  const outerR = Math.min(w,h) * 0.38;

  // Core agents in inner ring
  const core = ['atlas','proximon','aetherion','shuri','simons','widow'];
  core.forEach((id,i) => {
    const angle = (i/core.length) * Math.PI * 2 - Math.PI/2;
    nodePositions[id] = { x: cx + Math.cos(angle)*innerR, y: cy + Math.sin(angle)*innerR };
  });

  // Others in outer ring
  const outer = AGENTS.filter(a => !core.includes(a.id));
  outer.forEach((a,i) => {
    const angle = (i/outer.length) * Math.PI * 2 - Math.PI/2;
    nodePositions[a.id] = { x: cx + Math.cos(angle)*outerR, y: cy + Math.sin(angle)*outerR };
  });
}

function drawNetwork(){
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  // Draw connections (faint lines between all agents)
  ctx.strokeStyle = 'rgba(34,211,238,0.03)';
  ctx.lineWidth = 0.5;
  const core = ['atlas','proximon','aetherion','shuri','simons','widow'];
  core.forEach(id => {
    const p = nodePositions[id];
    if(!p) return;
    AGENTS.forEach(a => {
      if(a.id === id) return;
      const q = nodePositions[a.id];
      if(!q) return;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(q.x, q.y);
      ctx.stroke();
    });
  });

  // Draw active connection lines
  const recentSignals = signals.slice(-8);
  recentSignals.forEach((s,i) => {
    const from = nodePositions[s.from];
    const to = nodePositions[s.to];
    if(!from || !to) return;
    const agent = AGENTS.find(a => a.id === s.from);
    const alpha = 0.1 + (i/recentSignals.length)*0.25;
    ctx.strokeStyle = (agent?.color || '#22d3ee') + Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  });

  // Draw particles
  particles = particles.filter(p => {
    p.t += p.speed;
    if(p.t > 1) return false;
    const from = nodePositions[p.from];
    const to = nodePositions[p.to];
    if(!from || !to) return false;
    const x = from.x + (to.x - from.x) * p.t;
    const y = from.y + (to.y - from.y) * p.t;
    const alpha = p.t < 0.1 ? p.t*10 : p.t > 0.8 ? (1-p.t)*5 : 1;

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.round(alpha*60).toString(16).padStart(2,'0');
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.fill();

    // Trail
    for(let j=1;j<=4;j++){
      const tt = p.t - j*0.02;
      if(tt < 0) continue;
      const tx = from.x + (to.x - from.x) * tt;
      const ty = from.y + (to.y - from.y) * tt;
      const ta = alpha * (1 - j*0.2);
      ctx.beginPath();
      ctx.arc(tx, ty, 1.5 - j*0.2, 0, Math.PI*2);
      ctx.fillStyle = p.color + Math.round(ta*100).toString(16).padStart(2,'0');
      ctx.fill();
    }
    return true;
  });

  // Draw nodes
  AGENTS.forEach(a => {
    const p = nodePositions[a.id];
    if(!p) return;
    const isActive = activeAgents.has(a.id);

    // Outer glow for active
    if(isActive){
      ctx.beginPath();
      ctx.arc(p.x, p.y, 18, 0, Math.PI*2);
      ctx.fillStyle = a.color + '15';
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, isActive ? 10 : 7, 0, Math.PI*2);
    ctx.fillStyle = isActive ? a.color : a.color + '60';
    ctx.fill();

    if(isActive){
      ctx.strokeStyle = a.color + '40';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 14, 0, Math.PI*2);
      ctx.stroke();
    }

    // Label
    ctx.font = '9px "SF Mono","Fira Code",monospace';
    ctx.fillStyle = isActive ? a.color : 'rgba(100,116,139,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText(a.name, p.x, p.y + (isActive?22:18));
  });

  requestAnimationFrame(drawNetwork);
}

/* ── SIGNAL FEED ── */
function addSignal(sig){
  signals.push(sig);
  if(signals.length > 200) signals.shift();

  activeAgents.add(sig.from);
  activeAgents.add(sig.to);
  setTimeout(() => {
    activeAgents.delete(sig.from);
    activeAgents.delete(sig.to);
    renderRoster();
  }, 5000);

  stats.signals++;
  if(sig.type==='task') stats.tasks++;
  if(sig.type==='handoff') stats.handoffs++;
  if(sig.type==='error') stats.errors++;

  document.getElementById('s-signals').textContent = stats.signals;
  document.getElementById('s-agents').textContent = activeAgents.size;
  document.getElementById('s-tasks').textContent = stats.tasks;
  document.getElementById('s-handoffs').textContent = stats.handoffs;
  document.getElementById('s-errors').textContent = stats.errors;

  // Spawn particle
  const agent = AGENTS.find(a => a.id === sig.from);
  particles.push({
    from: sig.from, to: sig.to,
    t: 0, speed: 0.008 + Math.random()*0.006,
    color: agent?.color || '#22d3ee'
  });

  // Add to feed
  if(activeFilter !== 'all' && sig.type !== activeFilter) return;
  renderSignalToFeed(sig);
  renderRoster();
}

function renderSignalToFeed(sig){
  const feed = document.getElementById('feed');
  const fromAgent = AGENTS.find(a => a.id === sig.from);
  const toAgent = AGENTS.find(a => a.id === sig.to);
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');

  const el = document.createElement('div');
  el.className = 'signal';
  el.dataset.type = sig.type;
  el.innerHTML = `
    <div class="time">${time}</div>
    <div class="icon icon-${sig.type}">${ICONS[sig.type]||'•'}</div>
    <div class="body">
      <div class="route">
        <span class="from" style="color:${fromAgent?.color||'var(--cyan)'}">${fromAgent?.name||sig.from}</span>
        → <span class="to" style="color:${toAgent?.color||'var(--gold)'}">${toAgent?.name||sig.to}</span>
      </div>
      <div class="content">${sig.msg}</div>
    </div>
    <div class="type-badge type-${sig.type}">${sig.type}</div>
  `;
  feed.prepend(el);

  // Cap feed DOM to 80 items
  while(feed.children.length > 80) feed.removeChild(feed.lastChild);
}

/* ── FILTER BUTTONS ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    // Re-render feed
    document.getElementById('feed').innerHTML = '';
    signals.filter(s => activeFilter==='all' || s.type === activeFilter)
      .slice(-50).forEach(s => renderSignalToFeed(s));
  });
});

/* ── SIMULATION ENGINE ── */
let signalIndex = 0;

function emitNextSignal(){
  const sig = SAMPLE_SIGNALS[signalIndex % SAMPLE_SIGNALS.length];
  signalIndex++;
  addSignal({...sig});

  // Randomise next interval: 1.5-6s for organic feel
  const delay = 1500 + Math.random() * 4500;
  setTimeout(emitNextSignal, delay);
}

/* ── INIT ── */
window.addEventListener('resize', resize);
resize();
renderRoster();
drawNetwork();

// Start emitting signals after a brief pause
setTimeout(emitNextSignal, 800);
// Burst first 3 quickly to populate feed
setTimeout(() => { addSignal({...SAMPLE_SIGNALS[1]}); }, 400);
setTimeout(() => { addSignal({...SAMPLE_SIGNALS[0]}); }, 100);
</script>

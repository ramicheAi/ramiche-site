<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Margin Heatmap Dashboard — SIMONS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a28;--border:#2a2a3a;
  --text:#e0e0e8;--muted:#7a7a8a;--accent:#4fc3f7;--green:#4caf50;
  --red:#ef5350;--amber:#ffb74d;--purple:#b388ff;
  --font:'SF Mono',Monaco,'Cascadia Code',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;overflow-x:hidden}
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:600;color:var(--accent)}
.header span{color:var(--muted);font-size:11px}
.controls{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.controls label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
.tab-group{display:flex;gap:2px}
.tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:4px 12px;cursor:pointer;font-size:11px;font-family:var(--font)}
.tab:first-child{border-radius:4px 0 0 4px}
.tab:last-child{border-radius:0 4px 4px 0}
.tab.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,0.08)}
.btn{background:var(--accent);color:#000;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600}
.btn:hover{opacity:0.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.main{padding:20px 24px}
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.kpi-value{font-size:20px;font-weight:700;margin:4px 0}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
.kpi-value.positive{color:var(--green)}
.kpi-value.negative{color:var(--red)}
.kpi-value.neutral{color:var(--accent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-2 .full{grid-column:1/-1}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px}
.chart-title{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;justify-content:space-between;align-items:center}
.chart-title .sub{font-size:10px;color:var(--muted);font-weight:400}
canvas{width:100%;display:block}
.heatmap-container{overflow-x:auto}
.heatmap-table{border-collapse:collapse;width:100%;min-width:600px}
.heatmap-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:8px;text-align:center;border-bottom:1px solid var(--border);font-weight:500}
.heatmap-table th:first-child{text-align:left;min-width:160px}
.heatmap-table td{padding:0;text-align:center;border-bottom:1px solid rgba(42,42,58,0.5);cursor:pointer;position:relative}
.hm-cell{padding:10px 8px;font-size:12px;font-weight:600;transition:transform 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.hm-cell:hover{transform:scale(1.05);z-index:2}
.hm-cell .pct{font-size:13px}
.hm-cell .dollar{font-size:9px;opacity:0.7}
.heatmap-table td:first-child{text-align:left;padding:8px;font-size:11px;color:var(--text);background:transparent!important;cursor:default}
.heatmap-table td:first-child .brand-tag{font-size:9px;color:var(--muted);display:block}
.rank-table{width:100%;border-collapse:collapse;font-size:11px}
.rank-table th,.rank-table td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)}
.rank-table th{color:var(--muted);font-weight:500;text-transform:uppercase;font-size:10px}
.rank-table td:first-child,.rank-table th:first-child{text-align:left}
.rank-table .rank-num{color:var(--accent);font-weight:700;width:24px}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.tag-green{background:rgba(76,175,80,0.15);color:var(--green)}
.tag-red{background:rgba(239,83,80,0.15);color:var(--red)}
.tag-amber{background:rgba(255,183,77,0.15);color:var(--amber)}
.tooltip{position:fixed;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:12px;font-size:11px;pointer-events:none;z-index:100;max-width:280px;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.tooltip h4{color:var(--accent);font-size:12px;margin-bottom:8px}
.tooltip .tt-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)}
.tooltip .tt-row:last-child{border:none}
.tooltip .tt-label{color:var(--muted)}
.tooltip .tt-val{font-weight:600}
.tooltip .tt-val.neg{color:var(--red)}
.tooltip .tt-val.pos{color:var(--green)}
.legend{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-bar{width:120px;height:10px;border-radius:2px;background:linear-gradient(90deg,#b71c1c,#ef5350,#ffb74d,#fff176,#aed581,#4caf50,#1b5e20)}
@media(max-width:900px){
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header">
  <h1>Margin Heatmap Dashboard</h1>
  <span>SIMONS — Data & Analytics | RAMICHE OS</span>
</div>
<div class="controls">
  <div>
    <label>Brand</label>
    <div class="tab-group" id="brandTabs"></div>
  </div>
  <div>
    <label>Volume Tier</label>
    <div class="tab-group" id="volumeTabs"></div>
  </div>
  <div style="margin-left:auto">
    <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
  </div>
</div>
<div class="main">
  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="grid-2">
    <div class="chart-card full">
      <div class="chart-title">
        <span>Product × Channel Margin Heatmap</span>
        <div class="legend"><span>Loss</span><div class="legend-bar"></div><span>High Margin</span></div>
      </div>
      <div class="heatmap-container" id="heatmapContainer"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Profitability Quadrant</span><span class="sub">Margin % vs Revenue Potential</span></div>
      <canvas id="quadrantChart" height="300"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Margin Distribution</span><span class="sub">Histogram of all combos</span></div>
      <canvas id="histChart" height="300"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Top 5 — Highest Margin</span></div>
      <table class="rank-table" id="topTable"></table>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Bottom 5 — Lowest Margin</span></div>
      <table class="rank-table" id="bottomTable"></table>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
// ─── DATA ──────────────────────────────────────────────
const PRODUCTS = [
  {id:'ga-iphone',    name:'GA iPhone Case',    brand:'GA',       cogs:11.50, ship:4.50, pkg:0.50},
  {id:'ga-poster',    name:'GA Framed Poster',  brand:'GA',       cogs:18.75, ship:7.50, pkg:1.00},
  {id:'ga-tshirt',    name:'GA T-Shirt',        brand:'GA',       cogs:13.25, ship:4.00, pkg:0.50},
  {id:'ga-hoodie',    name:'GA Hoodie',         brand:'GA',       cogs:25.50, ship:5.50, pkg:0.75},
  {id:'ga-mug',       name:'GA Mug',            brand:'GA',       cogs:8.25,  ship:5.00, pkg:0.75},
  {id:'ga-sticker',   name:'GA Sticker Pack',   brand:'GA',       cogs:2.10,  ship:1.50, pkg:0.25},
  {id:'ga-pin',       name:'GA Enamel Pin',     brand:'GA',       cogs:3.50,  ship:2.00, pkg:0.50},
  {id:'ram-vinyl',    name:'RAMICHE Vinyl',     brand:'RAMICHE',  cogs:8.50,  ship:4.50, pkg:1.50},
  {id:'ram-cd',       name:'RAMICHE CD',        brand:'RAMICHE',  cogs:3.00,  ship:3.00, pkg:0.75},
  {id:'ram-merch',    name:'RAMICHE Merch Tee', brand:'RAMICHE',  cogs:12.00, ship:4.00, pkg:0.50},
  {id:'par-vinyl',    name:'Parallax Vinyl',    brand:'Parallax', cogs:9.00,  ship:4.50, pkg:1.50},
  {id:'par-tape',     name:'Parallax Cassette', brand:'Parallax', cogs:4.50,  ship:2.50, pkg:0.50},
  {id:'stu-hourly',   name:'Studio Session/hr', brand:'Studio',   cogs:0,     ship:0,    pkg:0},
  {id:'stu-mix',      name:'Studio Mix/Master', brand:'Studio',   cogs:0,     ship:0,    pkg:0},
];

// Retail prices by channel (some products not available on all channels)
const CHANNEL_PRICES = {
  shopify:     {base:1.00},
  kickstarter: {base:0.90},  // ~10% discount for backers
  etsy:        {base:1.05},  // slight markup for marketplace
  direct:      {base:0.95},  // direct = lower price, no platform fees
};

const RETAIL_BASE = {
  'ga-iphone':29.99, 'ga-poster':49.99, 'ga-tshirt':34.99, 'ga-hoodie':54.99,
  'ga-mug':19.99, 'ga-sticker':9.99, 'ga-pin':14.99,
  'ram-vinyl':34.99, 'ram-cd':14.99, 'ram-merch':29.99,
  'par-vinyl':29.99, 'par-tape':12.99,
  'stu-hourly':150.00, 'stu-mix':500.00,
};

// Channel availability (0 = not sold there)
const AVAILABILITY = {
  'ga-iphone':    {shopify:1, kickstarter:1, etsy:1, direct:1},
  'ga-poster':    {shopify:1, kickstarter:1, etsy:1, direct:1},
  'ga-tshirt':    {shopify:1, kickstarter:1, etsy:1, direct:1},
  'ga-hoodie':    {shopify:1, kickstarter:1, etsy:0, direct:1},
  'ga-mug':       {shopify:1, kickstarter:1, etsy:1, direct:0},
  'ga-sticker':   {shopify:1, kickstarter:1, etsy:1, direct:1},
  'ga-pin':       {shopify:1, kickstarter:1, etsy:1, direct:1},
  'ram-vinyl':    {shopify:1, kickstarter:0, etsy:1, direct:1},
  'ram-cd':       {shopify:1, kickstarter:0, etsy:0, direct:1},
  'ram-merch':    {shopify:1, kickstarter:0, etsy:1, direct:1},
  'par-vinyl':    {shopify:1, kickstarter:0, etsy:1, direct:1},
  'par-tape':     {shopify:1, kickstarter:0, etsy:1, direct:1},
  'stu-hourly':   {shopify:0, kickstarter:0, etsy:0, direct:1},
  'stu-mix':      {shopify:0, kickstarter:0, etsy:0, direct:1},
};

const CHANNELS = [
  {id:'shopify',     name:'Shopify',     feePct:0.029, feeFixed:0.30, procPct:0},
  {id:'kickstarter', name:'Kickstarter', feePct:0.05,  feeFixed:0,    procPct:0.035},
  {id:'etsy',        name:'Etsy',        feePct:0.065, feeFixed:0.25, procPct:0.03},
  {id:'direct',      name:'Direct',      feePct:0,     feeFixed:0,    procPct:0},
];

const VOLUME_TIERS = [
  {id:'low',  label:'Low (25/mo)',  units:25,  fixedCosts:50,  cpa:8},
  {id:'mid',  label:'Mid (100/mo)', units:100, fixedCosts:50,  cpa:5},
  {id:'high', label:'High (500/mo)',units:500, fixedCosts:50,  cpa:3},
];

const BRANDS = ['All','GA','RAMICHE','Parallax','Studio'];

let activeBrand = 'All';
let activeVolume = 'mid';

// ─── INIT TABS ─────────────────────────────────────────
function initTabs() {
  const brandEl = document.getElementById('brandTabs');
  BRANDS.forEach(b => {
    const t = document.createElement('div');
    t.className = 'tab' + (b === activeBrand ? ' active' : '');
    t.textContent = b;
    t.onclick = () => { activeBrand = b; refreshAll(); };
    brandEl.appendChild(t);
  });
  const volEl = document.getElementById('volumeTabs');
  VOLUME_TIERS.forEach(v => {
    const t = document.createElement('div');
    t.className = 'tab' + (v.id === activeVolume ? ' active' : '');
    t.textContent = v.label;
    t.onclick = () => { activeVolume = v.id; refreshAll(); };
    volEl.appendChild(t);
  });
}

// ─── ECONOMICS ENGINE ──────────────────────────────────
function computeCell(product, channel, volumeTier) {
  const avail = AVAILABILITY[product.id]?.[channel.id];
  if (!avail) return null;

  const vt = VOLUME_TIERS.find(v => v.id === volumeTier);
  const priceMultiplier = CHANNEL_PRICES[channel.id].base;
  const retail = RETAIL_BASE[product.id] * priceMultiplier;

  const platformFee = retail * channel.feePct + channel.feeFixed;
  const processingFee = retail * channel.procPct;
  const totalFees = platformFee + processingFee;
  const cpa = vt.cpa;
  const totalVariable = product.cogs + product.ship + product.pkg + totalFees + cpa;
  const contribution = retail - totalVariable;
  const marginPct = retail > 0 ? contribution / retail : 0;
  const fixedPerUnit = vt.units > 0 ? vt.fixedCosts / vt.units : 0;
  const netMargin = contribution - fixedPerUnit;
  const netPct = retail > 0 ? netMargin / retail : 0;
  const monthlyRevenue = retail * vt.units;
  const monthlyProfit = contribution * vt.units - vt.fixedCosts;

  return {
    product, channel, retail, platformFee, processingFee, totalFees,
    cpa, totalVariable, contribution, marginPct, fixedPerUnit,
    netMargin, netPct, monthlyRevenue, monthlyProfit, units: vt.units
  };
}

function getAllCells() {
  const cells = [];
  const products = activeBrand === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.brand === activeBrand);
  products.forEach(p => {
    CHANNELS.forEach(ch => {
      const cell = computeCell(p, ch, activeVolume);
      if (cell) cells.push(cell);
    });
  });
  return cells;
}

// ─── RENDER ────────────────────────────────────────────
function refreshAll() {
  // Update tab styles
  document.querySelectorAll('#brandTabs .tab').forEach((t,i) => t.classList.toggle('active', BRANDS[i] === activeBrand));
  document.querySelectorAll('#volumeTabs .tab').forEach((t,i) => t.classList.toggle('active', VOLUME_TIERS[i].id === activeVolume));

  const cells = getAllCells();
  renderKPIs(cells);
  renderHeatmap(cells);
  renderQuadrant(cells);
  renderHistogram(cells);
  renderRankings(cells);
}

function renderKPIs(cells) {
  const strip = document.getElementById('kpiStrip');
  const n = cells.length;
  const avgMargin = cells.reduce((s,c) => s + c.marginPct, 0) / n;
  const totalMonthlyProfit = cells.reduce((s,c) => s + c.monthlyProfit, 0);
  const totalMonthlyRev = cells.reduce((s,c) => s + c.monthlyRevenue, 0);
  const profitable = cells.filter(c => c.marginPct > 0).length;
  const best = cells.reduce((a,b) => a.marginPct > b.marginPct ? a : b);
  const worst = cells.reduce((a,b) => a.marginPct < b.marginPct ? a : b);

  const kpis = [
    {label:'Combos', value:n, cls:'neutral'},
    {label:'Avg Margin', value:(avgMargin*100).toFixed(1)+'%', cls:avgMargin>0.2?'positive':avgMargin>0?'neutral':'negative'},
    {label:'Profitable', value:profitable+'/'+n, cls:profitable===n?'positive':'neutral'},
    {label:'Mo. Revenue', value:'$'+(totalMonthlyRev/1000).toFixed(1)+'k', cls:'neutral'},
    {label:'Best', value:(best.marginPct*100).toFixed(0)+'%', cls:'positive'},
    {label:'Worst', value:(worst.marginPct*100).toFixed(0)+'%', cls:worst.marginPct<0?'negative':'neutral'},
  ];
  strip.innerHTML = kpis.map(k => `<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div></div>`).join('');
}

function marginColor(pct) {
  // -20% = deep red, 0% = red, 15% = amber, 30% = yellow-green, 50%+ = deep green
  if (pct < -0.1) return 'rgba(183,28,28,0.85)';
  if (pct < 0)    return 'rgba(239,83,80,0.7)';
  if (pct < 0.10) return 'rgba(255,183,77,0.6)';
  if (pct < 0.20) return 'rgba(255,241,118,0.5)';
  if (pct < 0.30) return 'rgba(174,213,129,0.55)';
  if (pct < 0.40) return 'rgba(76,175,80,0.65)';
  return 'rgba(27,94,32,0.8)';
}

function textColor(pct) {
  if (pct < 0) return '#fff';
  if (pct < 0.20) return '#1a1a28';
  return '#fff';
}

function renderHeatmap(cells) {
  const container = document.getElementById('heatmapContainer');
  const products = activeBrand === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.brand === activeBrand);

  let html = '<table class="heatmap-table"><thead><tr><th>Product</th>';
  CHANNELS.forEach(ch => { html += `<th>${ch.name}</th>`; });
  html += '</tr></thead><tbody>';

  products.forEach(p => {
    html += `<tr><td>${p.name}<span class="brand-tag">${p.brand}</span></td>`;
    CHANNELS.forEach(ch => {
      const cell = computeCell(p, ch, activeVolume);
      if (!cell) {
        html += '<td style="background:var(--bg);color:var(--muted);font-size:10px;padding:10px">—</td>';
      } else {
        const bg = marginColor(cell.marginPct);
        const fg = textColor(cell.marginPct);
        html += `<td style="background:${bg}" data-pid="${p.id}" data-cid="${ch.id}"
          onmouseenter="showTooltip(event,'${p.id}','${ch.id}')"
          onmouseleave="hideTooltip()">
          <div class="hm-cell" style="color:${fg}">
            <span class="pct">${(cell.marginPct*100).toFixed(1)}%</span>
            <span class="dollar">$${cell.contribution.toFixed(2)}</span>
          </div>
        </td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── TOOLTIP ───────────────────────────────────────────
function showTooltip(evt, pid, cid) {
  const p = PRODUCTS.find(x => x.id === pid);
  const ch = CHANNELS.find(x => x.id === cid);
  const cell = computeCell(p, ch, activeVolume);
  if (!cell) return;

  const tip = document.getElementById('tooltip');
  const rows = [
    ['Retail Price', '$'+cell.retail.toFixed(2), ''],
    ['COGS', '-$'+p.cogs.toFixed(2), 'neg'],
    ['Shipping', '-$'+p.ship.toFixed(2), 'neg'],
    ['Packaging', '-$'+p.pkg.toFixed(2), 'neg'],
    ['Platform Fees', '-$'+cell.totalFees.toFixed(2), 'neg'],
    ['Marketing CPA', '-$'+cell.cpa.toFixed(2), 'neg'],
    ['Contribution', '$'+cell.contribution.toFixed(2), cell.contribution >= 0 ? 'pos' : 'neg'],
    ['Margin %', (cell.marginPct*100).toFixed(1)+'%', cell.marginPct >= 0.2 ? 'pos' : cell.marginPct >= 0 ? '' : 'neg'],
    ['Mo. Profit ('+cell.units+'u)', '$'+cell.monthlyProfit.toFixed(0), cell.monthlyProfit >= 0 ? 'pos' : 'neg'],
  ];

  tip.innerHTML = `<h4>${p.name} × ${ch.name}</h4>` +
    rows.map(r => `<div class="tt-row"><span class="tt-label">${r[0]}</span><span class="tt-val ${r[2]}">${r[1]}</span></div>`).join('');

  tip.style.display = 'block';
  const rect = tip.getBoundingClientRect();
  let x = evt.clientX + 16;
  let y = evt.clientY - 10;
  if (x + rect.width > window.innerWidth - 20) x = evt.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight - 20) y = window.innerHeight - rect.height - 20;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ─── QUADRANT CHART ────────────────────────────────────
function renderQuadrant(cells) {
  const canvas = document.getElementById('quadrantChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width = canvas.offsetWidth * dpr;
  const H = canvas.height = 600;
  ctx.scale(dpr/1, dpr/1);
  ctx.clearRect(0,0,W*2,H*2);

  const pad = {t:30, r:30, b:50, l:70};
  const cw = W/dpr - pad.l - pad.r;
  const ch = H/dpr - pad.t - pad.b;

  const maxRev = Math.max(...cells.map(c => c.monthlyRevenue)) * 1.15;
  const margins = cells.map(c => c.marginPct);
  const minM = Math.min(...margins, -0.05);
  const maxM = Math.max(...margins, 0.5);
  const mRange = maxM - minM;

  // Grid
  ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    ctx.fillStyle = '#7a7a8a'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    const mv = minM + (i/4) * mRange;
    ctx.fillText((mv*100).toFixed(0)+'%', pad.l - 6, y + 3);
  }
  for (let i = 0; i <= 4; i++) {
    const x = pad.l + (i/4)*cw;
    ctx.fillStyle = '#7a7a8a'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('$'+(maxRev*i/4/1000).toFixed(0)+'k', x, pad.t+ch+22);
  }
  ctx.fillStyle = '#7a7a8a'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Monthly Revenue Potential', pad.l + cw/2, pad.t + ch + 40);
  ctx.save(); ctx.translate(12, pad.t + ch/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Contribution Margin %', 0, 0); ctx.restore();

  // Quadrant lines at 20% margin and median revenue
  const medianRev = [...cells].sort((a,b) => a.monthlyRevenue - b.monthlyRevenue)[Math.floor(cells.length/2)].monthlyRevenue;
  const threshold = 0.20;

  // Horizontal line at 20%
  const threshY = pad.t + ch - ((threshold - minM)/mRange)*ch;
  ctx.strokeStyle = 'rgba(79,195,247,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, threshY); ctx.lineTo(pad.l+cw, threshY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(79,195,247,0.5)'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('20% margin', pad.l + 4, threshY - 4);

  // Vertical line at median revenue
  const medX = pad.l + (medianRev/maxRev)*cw;
  ctx.strokeStyle = 'rgba(79,195,247,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(medX, pad.t); ctx.lineTo(medX, pad.t+ch); ctx.stroke();
  ctx.setLineDash([]);

  // Quadrant labels
  ctx.fillStyle = 'rgba(76,175,80,0.25)'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'right';
  ctx.fillText('STARS', pad.l+cw-4, pad.t+14);
  ctx.fillStyle = 'rgba(255,183,77,0.25)'; ctx.textAlign = 'left';
  ctx.fillText('NICHE', pad.l+4, pad.t+14);
  ctx.fillStyle = 'rgba(179,136,255,0.25)'; ctx.textAlign = 'right';
  ctx.fillText('VOLUME PLAYS', pad.l+cw-4, pad.t+ch-4);
  ctx.fillStyle = 'rgba(239,83,80,0.25)'; ctx.textAlign = 'left';
  ctx.fillText('DANGER ZONE', pad.l+4, pad.t+ch-4);

  // Bubbles
  const brandColors = {GA:'#4fc3f7', RAMICHE:'#b388ff', Parallax:'#ffb74d', Studio:'#4caf50'};
  cells.forEach(c => {
    const x = pad.l + (c.monthlyRevenue/maxRev)*cw;
    const y = pad.t + ch - ((c.marginPct - minM)/mRange)*ch;
    const r = Math.max(4, Math.min(16, c.contribution / 2));
    const color = brandColors[c.product.brand] || '#4fc3f7';
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  });

  // Legend
  let lx = pad.l;
  ctx.font = '9px monospace';
  Object.entries(brandColors).forEach(([brand, color]) => {
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(lx+5, pad.t+ch+38, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a7a8a'; ctx.textAlign = 'left';
    ctx.fillText(brand, lx+12, pad.t+ch+41);
    lx += 80;
  });
}

// ─── HISTOGRAM ─────────────────────────────────────────
function renderHistogram(cells) {
  const canvas = document.getElementById('histChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width = canvas.offsetWidth * dpr;
  const H = canvas.height = 600;
  ctx.scale(dpr/1, dpr/1);
  ctx.clearRect(0,0,W*2,H*2);

  const pad = {t:20, r:20, b:50, l:50};
  const cw = W/dpr - pad.l - pad.r;
  const ch = H/dpr - pad.t - pad.b;

  // Build histogram bins
  const binSize = 5; // 5% bins
  const margins = cells.map(c => c.marginPct * 100);
  const minBin = Math.floor(Math.min(...margins) / binSize) * binSize;
  const maxBin = Math.ceil(Math.max(...margins) / binSize) * binSize;
  const bins = [];
  for (let b = minBin; b < maxBin; b += binSize) {
    const count = margins.filter(m => m >= b && m < b + binSize).length;
    bins.push({start: b, end: b + binSize, count});
  }
  const maxCount = Math.max(...bins.map(b => b.count), 1);

  // Draw bars
  const barW = cw / bins.length;
  bins.forEach((bin, i) => {
    const x = pad.l + i * barW;
    const barH = (bin.count / maxCount) * ch;
    const y = pad.t + ch - barH;
    const midPct = (bin.start + bin.end) / 2 / 100;
    ctx.fillStyle = marginColor(midPct);
    ctx.fillRect(x + 2, y, barW - 4, barH);

    if (bin.count > 0) {
      ctx.fillStyle = '#e0e0e8'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
      ctx.fillText(bin.count, x + barW/2, y - 4);
    }
  });

  // X-axis labels
  ctx.fillStyle = '#7a7a8a'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  bins.forEach((bin, i) => {
    if (i % 2 === 0 || bins.length <= 10) {
      ctx.fillText(bin.start+'%', pad.l + i * barW + barW/2, pad.t + ch + 18);
    }
  });
  ctx.fillText('Contribution Margin %', pad.l + cw/2, pad.t + ch + 38);

  // Y-axis
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (i/4)*ch;
    const val = Math.round(maxCount * i / 4);
    ctx.fillText(val, pad.l - 6, y + 3);
    ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
  }

  // Mean line
  const mean = margins.reduce((s,m) => s+m, 0) / margins.length;
  const meanX = pad.l + ((mean - minBin) / (maxBin - minBin)) * cw;
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 2; ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(meanX, pad.t); ctx.lineTo(meanX, pad.t+ch); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#4fc3f7'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Avg: '+mean.toFixed(1)+'%', meanX, pad.t + 12);
}

// ─── RANKINGS ──────────────────────────────────────────
function renderRankings(cells) {
  const sorted = [...cells].sort((a,b) => b.marginPct - a.marginPct);
  const avg = cells.reduce((s,c) => s + c.marginPct, 0) / cells.length;

  function renderTable(el, items) {
    let html = '<tr><th>#</th><th>Product</th><th>Channel</th><th>Margin</th><th>$/unit</th><th>vs Avg</th></tr>';
    items.forEach((c, i) => {
      const delta = c.marginPct - avg;
      const deltaTag = delta >= 0 ? 'tag-green' : 'tag-red';
      html += `<tr>
        <td class="rank-num">${i+1}</td>
        <td>${c.product.name}</td>
        <td>${c.channel.name}</td>
        <td style="color:${c.marginPct>=0.2?'var(--green)':c.marginPct>=0?'var(--amber)':'var(--red)'}">${(c.marginPct*100).toFixed(1)}%</td>
        <td>$${c.contribution.toFixed(2)}</td>
        <td><span class="tag ${deltaTag}">${delta>=0?'+':''}${(delta*100).toFixed(1)}pp</span></td>
      </tr>`;
    });
    document.getElementById(el).innerHTML = html;
  }

  renderTable('topTable', sorted.slice(0, 5));
  renderTable('bottomTable', sorted.slice(-5).reverse());
}

// ─── EXPORT ────────────────────────────────────────────
function exportCSV() {
  const cells = getAllCells();
  const headers = ['Product','Brand','Channel','Retail','COGS','Shipping','Packaging','Platform Fees','CPA','Total Variable','Contribution','Margin %','Mo Revenue','Mo Profit'];
  const rows = cells.map(c => [
    c.product.name, c.product.brand, c.channel.name,
    c.retail.toFixed(2), c.product.cogs.toFixed(2), c.product.ship.toFixed(2), c.product.pkg.toFixed(2),
    c.totalFees.toFixed(2), c.cpa.toFixed(2), c.totalVariable.toFixed(2),
    c.contribution.toFixed(2), (c.marginPct*100).toFixed(1),
    c.monthlyRevenue.toFixed(0), c.monthlyProfit.toFixed(0)
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'margin-heatmap-export.csv';
  a.click(); URL.revokeObjectURL(url);
}

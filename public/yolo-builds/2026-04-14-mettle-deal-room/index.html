<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE Deal Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2332;--border:#1e293b;
  --text:#e2e8f0;--text-dim:#94a3b8;--accent:#3b82f6;--accent-glow:#3b82f640;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
  --cyan:#06b6d4;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.header h1 .logo{color:var(--accent);font-size:22px}
.header-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn:hover{border-color:var(--accent);background:var(--accent)20}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-sm{padding:5px 10px;font-size:12px}

/* Setup Screen */
.setup-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:40px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:560px}
.setup-card h2{font-size:24px;margin-bottom:8px}
.setup-card p{color:var(--text-dim);margin-bottom:28px;font-size:14px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:inherit}
.form-group textarea{height:80px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Main Layout */
.main{display:none;flex:1;overflow:hidden}
.main.active{display:flex}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.content{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--border);overflow:hidden}

/* Sidebar */
.deal-header{padding:20px;border-bottom:1px solid var(--border)}
.deal-header .org{font-size:20px;font-weight:700}
.deal-header .contact{color:var(--text-dim);font-size:13px;margin-top:4px}
.deal-header .meta{display:flex;gap:12px;margin-top:12px;font-size:12px}
.deal-header .meta span{padding:4px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border)}
.deal-header .meta .tier{color:var(--accent);border-color:var(--accent)40}

/* Deal Score */
.score-section{padding:20px;border-bottom:1px solid var(--border)}
.score-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:12px}
.score-gauge{position:relative;width:120px;height:120px;margin:0 auto 12px}
.score-gauge svg{transform:rotate(-90deg)}
.score-gauge .score-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-gauge .score-num{font-size:32px;font-weight:800}
.score-gauge .score-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.score-items{display:flex;flex-direction:column;gap:6px}
.score-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0}
.score-item input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer}
.score-item.checked{color:var(--green)}
.score-item:not(.checked){color:var(--text-dim)}

/* Closing Checklist */
.checklist{padding:20px;flex:1;overflow-y:auto}
.checklist h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:12px}
.check-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.check-item .check-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.check-item .check-title input{accent-color:var(--accent);width:14px;height:14px}
.check-item .check-script{font-size:12px;color:var(--text-dim);margin-top:4px;padding-left:22px;line-height:1.5;display:none}
.check-item.expanded .check-script{display:block}
.check-item.done .check-title{color:var(--green);text-decoration:line-through}

/* Panels */
.panel{background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.panel-header h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.panel-body{padding:18px;flex:1;overflow-y:auto}

/* Objection Cards */
.objection{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.objection:hover{border-color:var(--accent)}
.objection.expanded{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.objection-type{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:3px;margin-bottom:6px}
.objection-type.concern{background:var(--amber)20;color:var(--amber)}
.objection-type.stall{background:var(--purple)20;color:var(--purple)}
.objection-type.smokescreen{background:var(--red)20;color:var(--red)}
.objection h4{font-size:14px;margin-bottom:4px}
.objection .response{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;line-height:1.6;color:var(--text-dim)}
.objection.expanded .response{display:block}
.objection .tactic{font-size:11px;color:var(--cyan);font-weight:600;margin-top:8px}

/* Competitor Table */
.comp-table{width:100%;border-collapse:collapse;font-size:12px}
.comp-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px;position:sticky;top:0;background:var(--surface)}
.comp-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.comp-table .feat{font-weight:600}
.comp-table .yes{color:var(--green)}
.comp-table .no{color:var(--red)}
.comp-table .partial{color:var(--amber)}
.comp-table .mettle-col{background:var(--accent)08}
.comp-highlight{background:var(--green)10 !important}

/* Pricing Calculator */
.tier-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.tier-btn{padding:12px 8px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s}
.tier-btn:hover{border-color:var(--accent)}
.tier-btn.active{border-color:var(--accent);background:var(--accent)15}
.tier-btn .tier-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tier-btn .tier-price{font-size:20px;font-weight:800;color:var(--accent);margin-top:4px}
.tier-btn .tier-freq{font-size:11px;color:var(--text-dim)}
.billing-toggle{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;font-size:13px}
.billing-toggle .toggle{width:44px;height:24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;position:relative;transition:all .2s}
.billing-toggle .toggle.active{background:var(--accent)}
.billing-toggle .toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s}
.billing-toggle .toggle.active::after{left:22px}
.calc-results{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.calc-stat .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.calc-stat .value{font-size:22px;font-weight:800;margin-top:4px}
.calc-stat .value.green{color:var(--green)}
.calc-stat .value.accent{color:var(--accent)}
.calc-stat .sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.teams-input{margin-bottom:16px}
.teams-input label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px}
.teams-input input{width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.teams-input input:focus{outline:none;border-color:var(--accent)}

/* Notes Panel */
.notes-area{width:100%;min-height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;margin-bottom:12px}
.notes-area:focus{outline:none;border-color:var(--accent)}
.note-entry{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px}
.note-entry .note-time{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px}
.followup-template{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;color:var(--text-dim);white-space:pre-wrap;display:none}
.followup-template.visible{display:block}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;display:inline-block}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* Responsive */
@media(max-width:1200px){
  .content{grid-template-columns:1fr;grid-template-rows:auto}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .app .main{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1><span class="logo">⚡</span> METTLE DEAL ROOM</h1>
    <div class="header-actions">
      <button class="btn" onclick="exportNotes()">Export Notes</button>
      <button class="btn" onclick="resetRoom()">New Room</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveRoom()">Save Room</button>
    </div>
  </div>

  <!-- Setup Screen -->
  <div class="setup-screen" id="setup">
    <div class="setup-card">
      <h2>⚡ Open a Deal Room</h2>
      <p>Load your prospect intel. The room configures around the deal.</p>
      <div class="form-group">
        <label>Organization</label>
        <input type="text" id="s-org" placeholder="e.g. Riverside Aquatics Club">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Contact Name</label>
          <input type="text" id="s-contact" placeholder="e.g. Sarah Chen">
        </div>
        <div class="form-group">
          <label>Role / Title</label>
          <input type="text" id="s-role" placeholder="e.g. Head Coach">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Athletes</label>
          <input type="number" id="s-athletes" placeholder="120" min="1">
        </div>
        <div class="form-group">
          <label>Current Solution</label>
          <select id="s-current">
            <option value="none">None / Spreadsheets</option>
            <option value="teamunify">TeamUnify</option>
            <option value="swimtopia">SwimTopia</option>
            <option value="teamsnap">TeamSnap</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Known Pain Points</label>
        <textarea id="s-pain" placeholder="e.g. Athletes leaving for rival clubs, parents want better visibility into progress, coaches can't track workout compliance..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Estimated Deal Value</label>
          <select id="s-tier">
            <option value="starter">Starter — $149/mo</option>
            <option value="pro" selected>Pro — $349/mo</option>
            <option value="platinum">Platinum — $549/mo</option>
            <option value="enterprise">Enterprise — $999/mo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Meeting Type</label>
          <select id="s-meeting">
            <option value="discovery">Discovery Call</option>
            <option value="demo">Demo</option>
            <option value="proposal">Proposal Review</option>
            <option value="negotiation">Negotiation</option>
            <option value="close">Close Attempt</option>
          </select>
        </div>
      </div>
      <br>
      <button class="btn btn-primary" style="width:100%;padding:14px" onclick="launchRoom()">Launch Deal Room →</button>
      <div id="saved-rooms" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- Main Room -->
  <div class="main" id="room">
    <div class="sidebar">
      <div class="deal-header">
        <div class="org" id="r-org"></div>
        <div class="contact" id="r-contact"></div>
        <div class="meta">
          <span class="tier" id="r-tier"></span>
          <span id="r-athletes"></span>
          <span id="r-meeting"></span>
        </div>
      </div>
      <div class="score-section">
        <h3>Deal Score</h3>
        <div class="score-gauge">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327" id="score-ring"/>
          </svg>
          <div class="score-text">
            <div class="score-num" id="score-num">0</div>
            <div class="score-label">Score</div>
          </div>
        </div>
        <div class="score-items" id="score-items"></div>
      </div>
      <div class="checklist">
        <h3>Call Flow Checklist</h3>
        <div id="checklist-items"></div>
      </div>
    </div>
    <div class="content">
      <!-- Objections Panel -->
      <div class="panel">
        <div class="panel-header">
          <h3>🛡️ Objection Playbook</h3>
          <span class="live-dot"></span>
        </div>
        <div class="panel-body" id="objections-panel"></div>
      </div>
      <!-- Competitor Panel -->
      <div class="panel">
        <div class="panel-header">
          <h3>⚔️ Competitor Intel</h3>
        </div>
        <div class="panel-body" id="competitor-panel"></div>
      </div>
      <!-- Pricing Panel -->
      <div class="panel">
        <div class="panel-header">
          <h3>💰 Pricing Calculator</h3>
        </div>
        <div class="panel-body" id="pricing-panel"></div>
      </div>
      <!-- Notes Panel -->
      <div class="panel">
        <div class="panel-header">
          <h3>📝 Live Notes</h3>
          <div>
            <button class="btn btn-sm" onclick="addTimestampNote()">+ Note</button>
            <button class="btn btn-sm" onclick="toggleFollowup()">Follow-up Email</button>
          </div>
        </div>
        <div class="panel-body" id="notes-panel"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── DATA ───
const TIERS = {
  starter: { name: 'Starter', monthly: 149, annual: 1788 },
  pro: { name: 'Pro', monthly: 349, annual: 4188 },
  platinum: { name: 'Platinum', monthly: 549, annual: 6588 },
  enterprise: { name: 'Enterprise', monthly: 999, annual: 11988 }
};

const SCORE_CRITERIA = [
  { id: 'budget', label: 'Budget confirmed' },
  { id: 'timeline', label: 'Timeline exists' },
  { id: 'decision_maker', label: 'Decision-maker identified' },
  { id: 'pain', label: 'Pain articulated' },
  { id: 'competition', label: 'Competition known' }
];

const CHECKLIST = [
  { step: 'Rapport & Warm-up', script: 'Reference something personal — a recent meet result, their team\'s social media post, or a shared connection. "I saw your 200 free relay dropped 3 seconds at regionals — impressive coaching." Goal: prove you did homework.' },
  { step: 'Confirm Agenda', script: '"I want to make sure we cover what matters most to you today. I had [X, Y, Z] — does that match your priorities?" Let them restructure. Their order reveals their priority.' },
  { step: 'Pain Discovery', script: 'Ask open questions. "What\'s the biggest challenge your coaching staff faces right now?" Then go deeper: "What does that cost you — in athletes, in time, in parent satisfaction?" Quantify the pain.' },
  { step: 'Vision of Success', script: '"If we fast-forward 12 months and this is working perfectly — what does that look like for your program?" Let them paint the picture. Their words become your close.' },
  { step: 'Solution Mapping', script: 'Map METTLE features to their specific pains. Don\'t demo everything — demo what solves THEIR problem. "You mentioned retention — let me show you exactly how gamification keeps athletes engaged between seasons."' },
  { step: 'Social Proof', script: 'Drop one case study that mirrors their situation. "Saint Andrew\'s had the same challenge with 240 athletes. In 6 months, their retention went up 22%. Here\'s how." One story > ten features.' },
  { step: 'Trial Close', script: '"Based on what we\'ve covered — does this feel like it could solve the [specific pain] you described?" If yes → move to commitment. If hesitation → ask "What\'s holding you back?" and handle the objection.' },
  { step: 'Commitment & Next Steps', script: 'Be specific: "Let\'s get your pilot started this week. I\'ll send the agreement today — who else needs to sign off?" Lock the timeline. Vague next steps = dead deals.' }
];

const OBJECTIONS = [
  { text: '"It\'s too expensive."', type: 'concern', response: 'Reframe from cost to cost-of-inaction. "I understand budget matters. Let me ask — what does losing 15 athletes a year cost your program? At $2,000/athlete in annual fees, that\'s $30,000 walking out the door. METTLE at $349/month is $4,188/year. If we retain even 3 extra athletes, it pays for itself."', tactic: 'Voss: Label → Reframe → Quantify' },
  { text: '"We already use TeamUnify."', type: 'concern', response: '"TeamUnify runs your office — billing, registration, meet entries. That\'s admin. METTLE transforms your athletes — gamification, engagement, retention. They\'re complementary, not competitive. Your best clubs run both: TeamUnify for operations, METTLE for performance culture."', tactic: 'Pink: Reframe the category' },
  { text: '"I need to think about it."', type: 'stall', response: 'Tactical silence (3 seconds). Then: "That makes sense. To make sure you have everything you need to think it through — what specifically are you weighing?" This surfaces the real objection hiding behind the stall.', tactic: 'Voss: Silence → Open question' },
  { text: '"Can you send me more info?"', type: 'smokescreen', response: '"Absolutely — I want to send you exactly the right info. What specific questions do you want answered?" If they can\'t name specifics, the real issue isn\'t information. It\'s commitment. Handle that instead.', tactic: 'Belfort: Pattern interrupt' },
  { text: '"We need board approval."', type: 'concern', response: '"Completely understand. What does their approval process look like? When do they meet next? I\'d love to prepare a one-pager specifically for the board\'s priorities — usually that\'s ROI and risk. Can we do a quick 10-minute prep call before the board meeting?"', tactic: 'Cardone: Accelerate the timeline' },
  { text: '"We don\'t have budget until next quarter."', type: 'stall', response: '"Got it. Here\'s what I\'d suggest: let\'s lock in current pricing now with a start date of [Q+1]. Pricing adjustments happen quarterly, so securing today\'s rate saves you [X]. I\'ll send a deferred-start agreement."', tactic: 'Belfort: Urgency architecture' },
  { text: '"Our coaches aren\'t tech-savvy."', type: 'concern', response: '"That\'s actually our sweet spot. METTLE was designed for coaches, not IT departments. The onboarding takes 30 minutes, and we assign a dedicated success manager for the first 90 days. Saint Andrew\'s coach told me — \'If I can use it, anyone can.\'"', tactic: 'Ziglar: Serving, not selling' },
  { text: '"What makes you different from [competitor]?"', type: 'concern', response: 'Never trash-talk. "Great question. [Competitor] does [X] well. Where we\'re different: METTLE is built specifically for competitive swim programs. Gamification that keeps athletes engaged between seasons, parent dashboards that reduce coach-parent friction, and retention analytics that show you who\'s at risk before they quit."', tactic: 'Pink: Insight selling' },
  { text: '"We tried something similar and it didn\'t work."', type: 'concern', response: '"What happened?" (Listen fully.) "Thanks for sharing that. What I\'m hearing is [reflect their pain]. The difference with METTLE: [specific feature that addresses their past failure]. And our 90-day pilot option means you can validate before committing."', tactic: 'Voss: Tactical empathy → Mirror' },
  { text: '"Can you do a discount?"', type: 'smokescreen', response: 'No flinch. "I appreciate you asking. Our pricing reflects the value we deliver — and we stand behind it. What I CAN do is add value: extended onboarding, priority support, or a custom dashboard setup. Which would be most useful for your team?"', tactic: 'Mercury Rule: Never discount. Add value.' },
  { text: '"I need to talk to my [spouse/partner/co-coach]."', type: 'stall', response: '"Of course. Would it help if I joined a quick call with both of you? That way I can answer their questions directly and you don\'t have to play messenger. When works for the three of us?"', tactic: 'Cardone: Include the decision-maker' },
  { text: '"We\'re too small for this."', type: 'concern', response: '"Actually, smaller programs often see the biggest impact. With 40 athletes, every single one matters. Losing 5 is losing 12% of your revenue. METTLE\'s Starter tier at $149/month is designed exactly for programs your size — and the per-athlete cost is under $4/month."', tactic: 'Mercury: Right-size the deal' }
];

const COMPETITORS = {
  features: [
    { name: 'Athlete Gamification', mettle: 'yes', teamunify: 'no', swimtopia: 'no', teamsnap: 'no', pain: ['retention', 'engagement'] },
    { name: 'Parent Dashboard', mettle: 'yes', teamunify: 'partial', swimtopia: 'partial', teamsnap: 'no', pain: ['parent', 'visibility'] },
    { name: 'Retention Analytics', mettle: 'yes', teamunify: 'no', swimtopia: 'no', teamsnap: 'no', pain: ['retention', 'churn', 'leaving'] },
    { name: 'Meet Management', mettle: 'no', teamunify: 'yes', swimtopia: 'partial', teamsnap: 'no', pain: [] },
    { name: 'Billing & Registration', mettle: 'no', teamunify: 'yes', swimtopia: 'yes', teamsnap: 'yes', pain: [] },
    { name: 'Workout Tracking', mettle: 'yes', teamunify: 'partial', swimtopia: 'no', teamsnap: 'no', pain: ['workout', 'training', 'compliance'] },
    { name: 'Team Communication', mettle: 'yes', teamunify: 'yes', swimtopia: 'yes', teamsnap: 'yes', pain: ['communication'] },
    { name: 'Competitive Swim Focus', mettle: 'yes', teamunify: 'yes', swimtopia: 'partial', teamsnap: 'no', pain: ['competitive', 'swim'] },
    { name: 'Squad Builder', mettle: 'yes', teamunify: 'no', swimtopia: 'no', teamsnap: 'no', pain: ['squad', 'relay', 'lineup'] },
    { name: 'Achievement System', mettle: 'yes', teamunify: 'no', swimtopia: 'no', teamsnap: 'no', pain: ['motivation', 'engagement', 'fun'] },
    { name: 'Custom Branding', mettle: 'yes', teamunify: 'partial', swimtopia: 'yes', teamsnap: 'partial', pain: ['brand'] },
    { name: 'API Access', mettle: 'yes', teamunify: 'partial', swimtopia: 'no', teamsnap: 'yes', pain: ['integration', 'api'] }
  ]
};

let currentDeal = null;
let isAnnual = false;
let selectedTier = 'pro';
let notes = [];
let callStartTime = null;

// ─── INIT ───
function init() {
  loadSavedRooms();
}

function loadSavedRooms() {
  const saved = JSON.parse(localStorage.getItem('mettle-deal-rooms') || '[]');
  const container = document.getElementById('saved-rooms');
  if (saved.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = '<h3 style="font-size:13px;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Saved Rooms</h3>' +
    saved.map((d, i) => `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer" onclick="loadRoom(${i})">
      <div><div style="font-weight:600;font-size:14px">${d.org}</div><div style="font-size:12px;color:var(--text-dim)">${d.contact} · ${TIERS[d.tier].name} · ${d.athletes} athletes</div></div>
      <button class="btn btn-sm" onclick="event.stopPropagation();deleteRoom(${i})">×</button>
    </div>`).join('');
}

function loadRoom(idx) {
  const saved = JSON.parse(localStorage.getItem('mettle-deal-rooms') || '[]');
  const d = saved[idx];
  document.getElementById('s-org').value = d.org;
  document.getElementById('s-contact').value = d.contact;
  document.getElementById('s-role').value = d.role;
  document.getElementById('s-athletes').value = d.athletes;
  document.getElementById('s-current').value = d.current;
  document.getElementById('s-pain').value = d.pain;
  document.getElementById('s-tier').value = d.tier;
  document.getElementById('s-meeting').value = d.meeting;
  launchRoom(d.scoreState, d.checkState, d.notes);
}

function deleteRoom(idx) {
  const saved = JSON.parse(localStorage.getItem('mettle-deal-rooms') || '[]');
  saved.splice(idx, 1);
  localStorage.setItem('mettle-deal-rooms', JSON.stringify(saved));
  loadSavedRooms();
}

// ─── LAUNCH ───
function launchRoom(savedScores, savedChecks, savedNotes) {
  const org = document.getElementById('s-org').value.trim() || 'Unnamed Prospect';
  const contact = document.getElementById('s-contact').value.trim() || 'Unknown';
  const role = document.getElementById('s-role').value.trim() || '';
  const athletes = parseInt(document.getElementById('s-athletes').value) || 100;
  const current = document.getElementById('s-current').value;
  const pain = document.getElementById('s-pain').value.trim();
  const tier = document.getElementById('s-tier').value;
  const meeting = document.getElementById('s-meeting').value;

  currentDeal = { org, contact, role, athletes, current, pain, tier, meeting };
  selectedTier = tier;
  notes = savedNotes || [];
  callStartTime = new Date();

  // Header
  document.getElementById('r-org').textContent = org;
  document.getElementById('r-contact').textContent = contact + (role ? ` · ${role}` : '');
  document.getElementById('r-tier').textContent = TIERS[tier].name;
  document.getElementById('r-athletes').textContent = `${athletes} athletes`;
  document.getElementById('r-meeting').textContent = meeting.charAt(0).toUpperCase() + meeting.slice(1);

  // Score
  renderScore(savedScores);

  // Checklist
  renderChecklist(savedChecks);

  // Panels
  renderObjections();
  renderCompetitors();
  renderPricing();
  renderNotes();

  // Show room
  document.getElementById('setup').style.display = 'none';
  document.getElementById('room').classList.add('active');
}

// ─── SCORE ───
function renderScore(saved) {
  const container = document.getElementById('score-items');
  container.innerHTML = SCORE_CRITERIA.map(c => {
    const checked = saved ? saved[c.id] : false;
    return `<div class="score-item ${checked ? 'checked' : ''}" onclick="toggleScore('${c.id}', this)">
      <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation();toggleScore('${c.id}', this.parentElement)">
      ${c.label}
    </div>`;
  }).join('');
  updateScoreGauge();
}

function toggleScore(id, el) {
  const cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.classList.toggle('checked', cb.checked);
  updateScoreGauge();
}

function updateScoreGauge() {
  const items = document.querySelectorAll('.score-item input');
  let checked = 0;
  items.forEach(i => { if (i.checked) checked++; });
  const score = Math.round((checked / SCORE_CRITERIA.length) * 100);
  const ring = document.getElementById('score-ring');
  const offset = 327 - (327 * score / 100);
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = score >= 80 ? 'var(--green)' : score >= 40 ? 'var(--amber)' : 'var(--red)';
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = score >= 80 ? 'var(--green)' : score >= 40 ? 'var(--amber)' : 'var(--red)';
}

// ─── CHECKLIST ───
function renderChecklist(saved) {
  const container = document.getElementById('checklist-items');
  container.innerHTML = CHECKLIST.map((c, i) => {
    const done = saved ? saved[i] : false;
    return `<div class="check-item ${done ? 'done' : ''}" data-idx="${i}">
      <div class="check-title" onclick="toggleCheckExpand(this.parentElement)">
        <input type="checkbox" ${done ? 'checked' : ''} onclick="event.stopPropagation();toggleCheck(${i}, this)">
        ${i + 1}. ${c.step}
      </div>
      <div class="check-script">${c.script}</div>
    </div>`;
  }).join('');
}

function toggleCheck(idx, cb) {
  const item = cb.closest('.check-item');
  item.classList.toggle('done', cb.checked);
}

function toggleCheckExpand(el) {
  el.classList.toggle('expanded');
}

// ─── OBJECTIONS ───
function renderObjections() {
  const painLower = (currentDeal.pain || '').toLowerCase();
  // Sort: relevant objections first based on current solution
  const sorted = [...OBJECTIONS].sort((a, b) => {
    const aRelevant = isObjectionRelevant(a) ? 0 : 1;
    const bRelevant = isObjectionRelevant(b) ? 0 : 1;
    return aRelevant - bRelevant;
  });

  document.getElementById('objections-panel').innerHTML = sorted.map(o => {
    const relevant = isObjectionRelevant(o);
    return `<div class="objection ${relevant ? '' : ''}" onclick="this.classList.toggle('expanded')">
      <span class="objection-type ${o.type}">${o.type}</span>
      ${relevant ? '<span style="float:right;font-size:10px;color:var(--amber)">LIKELY</span>' : ''}
      <h4>${o.text}</h4>
      <div class="response">${o.response}<div class="tactic">${o.tactic}</div></div>
    </div>`;
  }).join('');
}

function isObjectionRelevant(o) {
  const current = currentDeal.current;
  const text = o.text.toLowerCase();
  if (current === 'teamunify' && text.includes('teamunify')) return true;
  if (text.includes('expensive') && currentDeal.tier === 'enterprise') return true;
  if (text.includes('too small') && currentDeal.athletes < 50) return true;
  if (text.includes('discount')) return true;
  if (text.includes('board') && currentDeal.meeting === 'negotiation') return true;
  return false;
}

// ─── COMPETITORS ───
function renderCompetitors() {
  const painWords = (currentDeal.pain || '').toLowerCase().split(/[\s,]+/);
  const current = currentDeal.current;
  const icon = (v) => v === 'yes' ? '<span class="yes">✓</span>' : v === 'no' ? '<span class="no">✗</span>' : '<span class="partial">◐</span>';

  let html = `<table class="comp-table"><thead><tr>
    <th>Feature</th><th class="mettle-col">METTLE</th>
    <th ${current==='teamunify'?'style="color:var(--amber)"':''}>TeamUnify</th>
    <th ${current==='swimtopia'?'style="color:var(--amber)"':''}>SwimTopia</th>
    <th ${current==='teamsnap'?'style="color:var(--amber)"':''}>TeamSnap</th>
  </tr></thead><tbody>`;

  COMPETITORS.features.forEach(f => {
    const highlight = f.pain.some(p => painWords.some(w => w.includes(p) || p.includes(w)));
    const advantage = f.mettle === 'yes' && (f[current] === 'no' || f[current] === 'partial');
    html += `<tr class="${highlight ? 'comp-highlight' : ''}">
      <td class="feat">${f.name} ${advantage ? '⭐' : ''}</td>
      <td class="mettle-col">${icon(f.mettle)}</td>
      <td>${icon(f.teamunify)}</td>
      <td>${icon(f.swimtopia)}</td>
      <td>${icon(f.teamsnap)}</td>
    </tr>`;
  });

  html += '</tbody></table>';

  if (current !== 'none') {
    const advantages = COMPETITORS.features.filter(f => f.mettle === 'yes' && (f[current] === 'no' || f[current] === 'partial'));
    if (advantages.length > 0) {
      html += `<div style="margin-top:16px;padding:12px;background:var(--green)10;border:1px solid var(--green)30;border-radius:8px;font-size:13px">
        <strong style="color:var(--green)">⭐ vs ${current.charAt(0).toUpperCase() + current.slice(1)} — METTLE advantages:</strong><br>
        ${advantages.map(a => `• ${a.name}`).join('<br>')}
      </div>`;
    }
  }

  document.getElementById('competitor-panel').innerHTML = html;
}

// ─── PRICING ───
function renderPricing() {
  const panel = document.getElementById('pricing-panel');
  panel.innerHTML = `
    <div class="billing-toggle">
      <span>Monthly</span>
      <div class="toggle ${isAnnual ? 'active' : ''}" onclick="toggleBilling()"></div>
      <span>Annual <span style="color:var(--green);font-size:11px">(save ~17%)</span></span>
    </div>
    <div class="tier-selector">
      ${Object.entries(TIERS).map(([k, v]) => `
        <div class="tier-btn ${k === selectedTier ? 'active' : ''}" onclick="selectTier('${k}')">
          <div class="tier-name">${v.name}</div>
          <div class="tier-price">$${isAnnual ? Math.round(v.annual/12) : v.monthly}</div>
          <div class="tier-freq">/month${isAnnual ? ' (billed annually)' : ''}</div>
        </div>
      `).join('')}
    </div>
    <div class="teams-input">
      <label>Number of Teams / Locations</label>
      <input type="number" id="team-count" value="1" min="1" max="50" onchange="updateCalc()">
    </div>
    <div class="calc-results" id="calc-results"></div>
  `;
  updateCalc();
}

function selectTier(t) {
  selectedTier = t;
  renderPricing();
}

function toggleBilling() {
  isAnnual = !isAnnual;
  renderPricing();
}

function updateCalc() {
  const tier = TIERS[selectedTier];
  const teams = parseInt(document.getElementById('team-count')?.value) || 1;
  const discount = teams >= 5 ? 0.15 : teams >= 3 ? 0.10 : teams >= 2 ? 0.05 : 0;
  const baseMonthly = isAnnual ? Math.round(tier.annual / 12) : tier.monthly;
  const totalMonthly = Math.round(baseMonthly * teams * (1 - discount));
  const totalAnnual = totalMonthly * 12;
  const perAthlete = currentDeal ? (totalMonthly / (currentDeal.athletes || 100)).toFixed(2) : '0.00';
  const retentionValue = Math.round(currentDeal ? currentDeal.athletes * 0.1 * 2000 : 20000);

  document.getElementById('calc-results').innerHTML = `
    <div class="calc-stat">
      <div class="label">Monthly Total</div>
      <div class="value accent">$${totalMonthly.toLocaleString()}</div>
      <div class="sub">${teams > 1 ? `${teams} teams · ${Math.round(discount*100)}% multi-team discount` : 'Single team'}</div>
    </div>
    <div class="calc-stat">
      <div class="label">Annual Value</div>
      <div class="value accent">$${totalAnnual.toLocaleString()}</div>
      <div class="sub">${isAnnual ? 'Billed annually' : 'If billed monthly'}</div>
    </div>
    <div class="calc-stat">
      <div class="label">Per Athlete/Month</div>
      <div class="value green">$${perAthlete}</div>
      <div class="sub">${currentDeal?.athletes || 100} athletes</div>
    </div>
    <div class="calc-stat">
      <div class="label">Retention ROI</div>
      <div class="value green">$${retentionValue.toLocaleString()}</div>
      <div class="sub">10% retention lift × $2K/athlete</div>
    </div>
  `;
}

// ─── NOTES ───
function renderNotes() {
  const panel = document.getElementById('notes-panel');
  panel.innerHTML = `
    <textarea class="notes-area" id="note-input" placeholder="Type live notes during the call..."></textarea>
    <div id="saved-notes">${notes.map(n => `<div class="note-entry"><div class="note-time">${n.time}</div>${n.text}</div>`).join('')}</div>
    <div class="followup-template" id="followup-tpl"></div>
  `;
}

function addTimestampNote() {
  const input = document.getElementById('note-input');
  const text = input.value.trim();
  if (!text) return;
  const elapsed = callStartTime ? Math.round((new Date() - callStartTime) / 60000) : 0;
  const note = { time: `+${elapsed}min — ${new Date().toLocaleTimeString()}`, text };
  notes.push(note);
  input.value = '';
  const container = document.getElementById('saved-notes');
  container.innerHTML += `<div class="note-entry"><div class="note-time">${note.time}</div>${note.text}</div>`;
}

function toggleFollowup() {
  const tpl = document.getElementById('followup-tpl');
  if (tpl.classList.contains('visible')) {
    tpl.classList.remove('visible');
    return;
  }
  const d = currentDeal;
  tpl.textContent = `Hi ${d.contact.split(' ')[0]},

Great speaking with you today about ${d.org}'s program. A few things I want to follow up on:

${notes.length > 0 ? notes.map(n => `• ${n.text}`).join('\n') : '• [Add your call notes above first]'}

As discussed, METTLE's ${TIERS[d.tier].name} tier at $${TIERS[d.tier].monthly}/month would give your ${d.athletes} athletes:
- Gamification that keeps them engaged between seasons
- Parent dashboards with real-time progress visibility
- Retention analytics to catch at-risk athletes early

Next step: [SPECIFIC ACTION + DATE]

Looking forward to helping ${d.org} build something special.

Best,
[Your Name]`;
  tpl.classList.add('visible');
}

// ─── SAVE / EXPORT / RESET ───
function saveRoom() {
  if (!currentDeal) return;
  const scoreState = {};
  document.querySelectorAll('.score-item').forEach((el, i) => {
    scoreState[SCORE_CRITERIA[i].id] = el.querySelector('input').checked;
  });
  const checkState = [];
  document.querySelectorAll('.check-item').forEach(el => {
    checkState.push(el.querySelector('input').checked);
  });

  const room = { ...currentDeal, scoreState, checkState, notes, savedAt: new Date().toISOString() };
  const saved = JSON.parse(localStorage.getItem('mettle-deal-rooms') || '[]');
  const existing = saved.findIndex(s => s.org === room.org);
  if (existing >= 0) saved[existing] = room;
  else saved.push(room);
  localStorage.setItem('mettle-deal-rooms', JSON.stringify(saved));

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Save Room', 1500);
}

function exportNotes() {
  if (!currentDeal || notes.length === 0) { alert('No notes to export.'); return; }
  const text = `METTLE Deal Room — ${currentDeal.org}\n${currentDeal.contact} · ${TIERS[currentDeal.tier].name} · ${currentDeal.athletes} athletes\n${'─'.repeat(50)}\n\n${notes.map(n => `[${n.time}] ${n.text}`).join('\n\n')}`;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `deal-room-${currentDeal.org.toLowerCase().replace(/\s+/g, '-')}.txt`;
  a.click();
}

function resetRoom() {
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('room').classList.remove('active');
  currentDeal = null;
  notes = [];
  callStartTime = null;
  ['s-org','s-contact','s-role','s-athletes','s-pain'].forEach(id => document.getElementById(id).value = '');
  loadSavedRooms();
}

init();
</script>
</body>
</html>

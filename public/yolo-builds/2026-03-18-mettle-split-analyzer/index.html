<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE // Split Analyzer</title>
<style>
  :root {
    --purple: #6B21A8;
    --scarlet: #DC2626;
    --gold: #F59E0B;
    --blue: #2563EB;
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #E5E7EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; background: var(--bg); color: var(--text); min-height:100vh; }

  .header {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff; padding: 24px 32px; display:flex; align-items:center; gap:16px;
  }
  .header .logo { font-size:28px; font-weight:900; letter-spacing:2px; }
  .header .sub { font-size:13px; opacity:0.8; margin-top:2px; }
  .header .badge {
    background: var(--gold); color: #000; font-size:11px; font-weight:700;
    padding: 4px 10px; border-radius:4px; margin-left:auto; letter-spacing:1px;
  }

  .main { padding: 24px 32px; max-width:1200px; margin:0 auto; }

  .input-section {
    background: var(--card); border:2px solid var(--border); border-radius:12px;
    padding:24px; margin-bottom:24px;
  }
  .input-section h2 { font-size:14px; text-transform:uppercase; letter-spacing:2px; color:var(--purple); margin-bottom:16px; }

  .form-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .form-group { flex:1; min-width:200px; }
  .form-group label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:10px 12px; border:2px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:14px; background:#FAFAFA; transition:border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--purple);
  }
  .form-group textarea { min-height:80px; resize:vertical; }

  .split-input-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-bottom:16px; }
  .split-cell {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:#F3F4F6; border:2px solid var(--border); border-radius:8px; padding:12px 8px;
  }
  .split-cell .label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .split-cell input {
    width:80px; text-align:center; padding:8px; border:2px solid var(--border);
    border-radius:6px; font-family:inherit; font-size:16px; font-weight:700;
    background:#fff;
  }
  .split-cell input:focus { border-color:var(--purple); outline:none; }
  .split-cell input.has-value { border-color:var(--gold); background:#FFFBEB; }

  .btn-row { display:flex; gap:12px; flex-wrap:wrap; }
  .btn {
    padding:12px 24px; border:none; border-radius:8px; font-family:inherit;
    font-size:13px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    text-transform:uppercase;
  }
  .btn-primary { background:var(--purple); color:#fff; }
  .btn-primary:hover { background:#581C87; }
  .btn-secondary { background:var(--border); color:var(--text); }
  .btn-secondary:hover { background:#D1D5DB; }
  .btn-gold { background:var(--gold); color:#000; }
  .btn-gold:hover { background:#D97706; }

  /* Results */
  .results { display:none; }
  .results.active { display:block; }

  .result-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--card); border:2px solid var(--border); border-radius:12px; padding:20px;
    text-align:center; position:relative; overflow:hidden;
  }
  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
  }
  .stat-card.purple::before { background:var(--purple); }
  .stat-card.scarlet::before { background:var(--scarlet); }
  .stat-card.gold::before { background:var(--gold); }
  .stat-card.blue::before { background:var(--blue); }
  .stat-card .value { font-size:32px; font-weight:900; margin:8px 0; }
  .stat-card .label { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }

  /* Chart */
  .chart-section {
    background:var(--card); border:2px solid var(--border); border-radius:12px;
    padding:24px; margin-bottom:24px;
  }
  .chart-section h3 { font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--purple); margin-bottom:16px; }
  .chart-container { position:relative; width:100%; height:300px; }
  canvas { width:100% !important; height:100% !important; }

  /* Split Table */
  .split-table {
    width:100%; border-collapse:collapse; margin-top:16px;
  }
  .split-table th {
    font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted);
    padding:10px 12px; border-bottom:2px solid var(--border); text-align:left;
  }
  .split-table td {
    padding:10px 12px; border-bottom:1px solid var(--border); font-size:14px;
  }
  .split-table tr:hover { background:#F9FAFB; }
  .pace-bar {
    height:8px; border-radius:4px; transition:width 0.5s ease;
  }
  .pace-faster { background: linear-gradient(90deg, #10B981, #34D399); }
  .pace-slower { background: linear-gradient(90deg, var(--scarlet), #F87171); }
  .pace-neutral { background: linear-gradient(90deg, var(--gold), #FCD34D); }

  /* Strategy */
  .strategy-card {
    background:var(--card); border:2px solid var(--border); border-radius:12px;
    padding:24px; margin-bottom:24px;
  }
  .strategy-card h3 { font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--purple); margin-bottom:16px; }
  .strategy-badge {
    display:inline-block; padding:6px 16px; border-radius:20px; font-size:12px;
    font-weight:700; letter-spacing:1px; margin-bottom:12px;
  }
  .strategy-negative { background:#D1FAE5; color:#065F46; }
  .strategy-positive { background:#FEE2E2; color:#991B1B; }
  .strategy-even { background:#FEF3C7; color:#92400E; }
  .strategy-fly { background:#EDE9FE; color:#5B21B6; }

  .recommendation {
    background:#F9FAFB; border-left:4px solid var(--purple); padding:16px; border-radius:0 8px 8px 0;
    margin-top:12px; font-size:13px; line-height:1.6;
  }

  /* Presets */
  .presets { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .preset-chip {
    padding:6px 14px; border:2px solid var(--border); border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:1px; cursor:pointer;
    background:#fff; transition:all 0.2s; text-transform:uppercase;
  }
  .preset-chip:hover { border-color:var(--purple); color:var(--purple); }
  .preset-chip.active { background:var(--purple); color:#fff; border-color:var(--purple); }

  /* Paste area */
  .paste-area {
    background:#F3F4F6; border:2px dashed var(--border); border-radius:8px;
    padding:16px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:16px;
  }
  .paste-area:hover { border-color:var(--purple); }
  .paste-area p { font-size:12px; color:var(--muted); }

  @media(max-width:768px) {
    .main { padding:16px; }
    .header { padding:16px; }
    .form-row { flex-direction:column; }
    .split-input-grid { grid-template-columns: repeat(2, 1fr); }
    .result-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">METTLE</div>
    <div class="sub">SPLIT ANALYZER</div>
  </div>
  <div class="badge">BETA</div>
</div>

<div class="main">
  <!-- Input Section -->
  <div class="input-section">
    <h2>Race Setup</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Athlete Name</label>
        <input type="text" id="athleteName" placeholder="e.g. Sarah Chen" />
      </div>
      <div class="form-group">
        <label>Event</label>
        <select id="eventSelect" onchange="updateSplitInputs()">
          <option value="50">50 Free</option>
          <option value="100" selected>100 Free</option>
          <option value="200">200 Free</option>
          <option value="400">400 Free</option>
          <option value="500">500 Free</option>
          <option value="100IM">100 IM</option>
          <option value="200IM">200 IM</option>
          <option value="200BR">200 Breast</option>
          <option value="200BK">200 Back</option>
          <option value="200FL">200 Fly</option>
        </select>
      </div>
      <div class="form-group">
        <label>Course</label>
        <select id="courseSelect">
          <option value="SCY">SCY (25 yards)</option>
          <option value="SCM">SCM (25 meters)</option>
          <option value="LCM">LCM (50 meters)</option>
        </select>
      </div>
    </div>

    <h2 style="margin-top:24px">Quick Entry</h2>
    <div class="presets" id="presetChips"></div>

    <div class="paste-area" onclick="document.getElementById('pasteInput').focus()">
      <p>Paste split times (comma or space separated) — e.g. "12.34, 14.56, 15.01, 14.89"</p>
      <textarea id="pasteInput" style="width:100%;border:none;background:transparent;text-align:center;font-family:inherit;font-size:14px;resize:none;outline:none;margin-top:8px;" rows="2" placeholder="12.34, 14.56, 15.01, 14.89"></textarea>
    </div>

    <h2 style="margin-top:16px">Or Enter Splits Manually</h2>
    <div class="split-input-grid" id="splitGrid"></div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="analyze()">ANALYZE SPLITS</button>
      <button class="btn btn-secondary" onclick="loadDemo()">LOAD DEMO</button>
      <button class="btn btn-secondary" onclick="clearAll()">CLEAR</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="result-grid" id="statCards"></div>

    <div class="chart-section">
      <h3>Pacing Curve</h3>
      <div class="chart-container">
        <canvas id="paceChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <h3>Split Breakdown</h3>
      <table class="split-table" id="splitTable">
        <thead>
          <tr>
            <th>Split</th>
            <th>Time</th>
            <th>Cumulative</th>
            <th>Diff vs Avg</th>
            <th>Pace</th>
          </tr>
        </thead>
        <tbody id="splitTableBody"></tbody>
      </table>
    </div>

    <div class="strategy-card" id="strategyCard">
      <h3>Race Strategy Analysis</h3>
      <div id="strategyContent"></div>
    </div>
  </div>
</div>

<script>
const EVENT_CONFIG = {
  '50':    { splits:2, labels:['1st 25','2nd 25'], dist:50 },
  '100':   { splits:4, labels:['1st 25','2nd 25','3rd 25','4th 25'], dist:100 },
  '200':   { splits:4, labels:['1st 50','2nd 50','3rd 50','4th 50'], dist:200 },
  '400':   { splits:8, labels:['50','100','150','200','250','300','350','400'], dist:400 },
  '500':   { splits:10, labels:['50','100','150','200','250','300','350','400','450','500'], dist:500 },
  '100IM': { splits:4, labels:['Fly 25','Back 25','Breast 25','Free 25'], dist:100 },
  '200IM': { splits:4, labels:['Fly 50','Back 50','Breast 50','Free 50'], dist:200 },
  '200BR': { splits:4, labels:['1st 50','2nd 50','3rd 50','4th 50'], dist:200 },
  '200BK': { splits:4, labels:['1st 50','2nd 50','3rd 50','4th 50'], dist:200 },
  '200FL': { splits:4, labels:['1st 50','2nd 50','3rd 50','4th 50'], dist:200 },
};

const DEMOS = {
  '100': { name:'Katie Ledecky Style', splits:[11.89, 12.34, 12.67, 12.41], athlete:'Demo Swimmer' },
  '200': { name:'Negative Split 200', splits:[27.45, 28.12, 27.89, 26.94], athlete:'Demo Swimmer' },
  '200IM': { name:'IM Race', splits:[27.12, 31.45, 35.67, 28.34], athlete:'Demo Swimmer' },
  '500': { name:'Distance Grind', splits:[27.2,29.8,30.1,30.4,30.6,30.8,30.5,30.2,29.9,28.6], athlete:'Demo Swimmer' },
};

function updateSplitInputs() {
  const ev = document.getElementById('eventSelect').value;
  const cfg = EVENT_CONFIG[ev];
  const grid = document.getElementById('splitGrid');
  grid.innerHTML = '';
  for (let i = 0; i < cfg.splits; i++) {
    const cell = document.createElement('div');
    cell.className = 'split-cell';
    cell.innerHTML = `
      <span class="label">${cfg.labels[i]}</span>
      <input type="text" id="split${i}" placeholder="0.00" oninput="markValue(this)" />
    `;
    grid.appendChild(cell);
  }
  updatePresets();
}

function updatePresets() {
  const ev = document.getElementById('eventSelect').value;
  const chips = document.getElementById('presetChips');
  chips.innerHTML = '';
  if (DEMOS[ev]) {
    const c = document.createElement('span');
    c.className = 'preset-chip';
    c.textContent = DEMOS[ev].name;
    c.onclick = () => loadPreset(ev);
    chips.appendChild(c);
  }
}

function loadPreset(ev) {
  const demo = DEMOS[ev];
  if (!demo) return;
  document.getElementById('athleteName').value = demo.athlete;
  demo.splits.forEach((s, i) => {
    const inp = document.getElementById('split' + i);
    if (inp) { inp.value = s.toFixed(2); markValue(inp); }
  });
}

function markValue(inp) {
  inp.classList.toggle('has-value', inp.value.trim() !== '');
}

function loadDemo() {
  const ev = document.getElementById('eventSelect').value;
  if (DEMOS[ev]) {
    loadPreset(ev);
  } else {
    document.getElementById('eventSelect').value = '100';
    updateSplitInputs();
    loadPreset('100');
  }
}

function clearAll() {
  document.getElementById('athleteName').value = '';
  document.getElementById('pasteInput').value = '';
  updateSplitInputs();
  document.getElementById('results').classList.remove('active');
}

function parseSplits() {
  // Try paste input first
  const paste = document.getElementById('pasteInput').value.trim();
  if (paste) {
    return paste.split(/[,\s\n\t]+/).map(s => parseFloat(s.trim())).filter(n => !isNaN(n) && n > 0);
  }
  // Otherwise read manual inputs
  const ev = document.getElementById('eventSelect').value;
  const cfg = EVENT_CONFIG[ev];
  const splits = [];
  for (let i = 0; i < cfg.splits; i++) {
    const v = parseFloat(document.getElementById('split' + i)?.value);
    if (!isNaN(v) && v > 0) splits.push(v);
  }
  return splits;
}

function formatTime(seconds) {
  if (seconds >= 60) {
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toFixed(2);
    return `${m}:${s.padStart(5, '0')}`;
  }
  return seconds.toFixed(2);
}

function analyze() {
  const splits = parseSplits();
  if (splits.length < 2) { alert('Need at least 2 splits to analyze.'); return; }

  const ev = document.getElementById('eventSelect').value;
  const cfg = EVENT_CONFIG[ev];
  const athlete = document.getElementById('athleteName').value || 'Athlete';

  // Core metrics
  const total = splits.reduce((a, b) => a + b, 0);
  const avg = total / splits.length;
  const fastest = Math.min(...splits);
  const slowest = Math.max(...splits);
  const range = slowest - fastest;
  const firstHalf = splits.slice(0, Math.floor(splits.length / 2)).reduce((a, b) => a + b, 0);
  const secondHalf = splits.slice(Math.floor(splits.length / 2)).reduce((a, b) => a + b, 0);
  const splitDiff = secondHalf - firstHalf;

  // Consistency (coefficient of variation)
  const variance = splits.reduce((sum, s) => sum + Math.pow(s - avg, 2), 0) / splits.length;
  const stddev = Math.sqrt(variance);
  const cv = (stddev / avg * 100);

  // Strategy detection
  let strategy, strategyClass;
  if (splitDiff < -0.5) {
    strategy = 'NEGATIVE SPLIT';
    strategyClass = 'strategy-negative';
  } else if (splitDiff > 1.0) {
    strategy = 'POSITIVE SPLIT';
    strategyClass = 'strategy-positive';
  } else if (splits[0] === fastest && splits[splits.length - 1] <= avg) {
    strategy = 'FLY & DIE (recovered)';
    strategyClass = 'strategy-fly';
  } else if (splits[0] === fastest && splits[splits.length - 1] > avg) {
    strategy = 'FLY & DIE';
    strategyClass = 'strategy-fly';
  } else {
    strategy = 'EVEN SPLIT';
    strategyClass = 'strategy-even';
  }

  // Render stat cards
  const statCards = document.getElementById('statCards');
  statCards.innerHTML = `
    <div class="stat-card purple">
      <div class="label">Final Time</div>
      <div class="value">${formatTime(total)}</div>
      <div class="label">${athlete}</div>
    </div>
    <div class="stat-card gold">
      <div class="label">Fastest Split</div>
      <div class="value">${fastest.toFixed(2)}</div>
      <div class="label">Split ${splits.indexOf(fastest) + 1}</div>
    </div>
    <div class="stat-card scarlet">
      <div class="label">Split Range</div>
      <div class="value">${range.toFixed(2)}s</div>
      <div class="label">Consistency: ${cv.toFixed(1)}% CV</div>
    </div>
    <div class="stat-card blue">
      <div class="label">Half Differential</div>
      <div class="value">${splitDiff > 0 ? '+' : ''}${splitDiff.toFixed(2)}s</div>
      <div class="label">2nd half vs 1st half</div>
    </div>
  `;

  // Render split table
  const tbody = document.getElementById('splitTableBody');
  tbody.innerHTML = '';
  let cumulative = 0;
  splits.forEach((s, i) => {
    cumulative += s;
    const diff = s - avg;
    const pct = Math.abs(diff) / avg * 100;
    const cls = diff < -0.1 ? 'pace-faster' : diff > 0.1 ? 'pace-slower' : 'pace-neutral';
    const lbl = cfg.labels[i] || `Split ${i + 1}`;
    tbody.innerHTML += `
      <tr>
        <td style="font-weight:700">${lbl}</td>
        <td style="font-weight:700;font-size:16px">${s.toFixed(2)}</td>
        <td>${formatTime(cumulative)}</td>
        <td style="color:${diff < -0.1 ? '#059669' : diff > 0.1 ? '#DC2626' : '#D97706'};font-weight:700">
          ${diff > 0 ? '+' : ''}${diff.toFixed(2)}s
        </td>
        <td style="width:120px"><div class="pace-bar ${cls}" style="width:${Math.min(pct * 3 + 20, 100)}%"></div></td>
      </tr>
    `;
  });

  // Strategy content
  const sc = document.getElementById('strategyContent');
  let recText = '';
  if (strategy === 'NEGATIVE SPLIT') {
    recText = `Strong finish by ${athlete}. The second half was ${Math.abs(splitDiff).toFixed(2)}s faster than the first. This is an elite pacing pattern — the athlete had reserves to close hard. Consider slightly more aggressive first-half pacing to optimize total time without sacrificing the strong finish.`;
  } else if (strategy === 'POSITIVE SPLIT') {
    recText = `${athlete} went out fast and faded ${splitDiff.toFixed(2)}s in the second half. This is common in distance events but costs time. Focus on: (1) controlled first 50 — hold back 0.3-0.5s, (2) maintain stroke rate through the back half, (3) breathing pattern consistency. Target even splits before attempting negative.`;
  } else if (strategy.includes('FLY & DIE')) {
    recText = `${athlete} had the fastest opening split but couldn't sustain it. The ${range.toFixed(2)}s range between fastest and slowest splits suggests over-exertion early. Drill: pace work at 80% of race speed for the first 25/50, then build. The goal is to feel "too slow" on the first split in practice.`;
  } else {
    recText = `${athlete} maintained consistent pacing with only ${range.toFixed(2)}s variation (${cv.toFixed(1)}% CV). This is solid race execution. To drop time from here: (1) identify the weakest split and target it in practice, (2) work on turns — a 0.1s faster turn on each wall adds up, (3) consider slightly faster opening to create a cushion.`;
  }

  sc.innerHTML = `
    <span class="strategy-badge ${strategyClass}">${strategy}</span>
    <div class="recommendation">${recText}</div>
  `;

  // Draw chart
  drawChart(splits, avg, cfg.labels);

  // Show results
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior:'smooth' });
}

function drawChart(splits, avg, labels) {
  const canvas = document.getElementById('paceChart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 300 * 2;
  ctx.scale(2, 2);
  const w = rect.width;
  const h = 300;

  ctx.clearRect(0, 0, w, h);

  const padL = 60, padR = 30, padT = 30, padB = 50;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  const minVal = Math.min(...splits) - 0.5;
  const maxVal = Math.max(...splits) + 0.5;
  const range = maxVal - minVal;

  // Grid
  ctx.strokeStyle = '#E5E7EB';
  ctx.lineWidth = 1;
  ctx.font = '11px SF Mono, monospace';
  ctx.fillStyle = '#6B7280';
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const y = padT + (chartH / gridLines) * i;
    const val = maxVal - (range / gridLines) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1) + 's', padL - 8, y + 4);
  }

  // Average line
  const avgY = padT + chartH - ((avg - minVal) / range) * chartH;
  ctx.strokeStyle = '#F59E0B';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(padL, avgY);
  ctx.lineTo(w - padR, avgY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#F59E0B';
  ctx.textAlign = 'left';
  ctx.fillText('AVG ' + avg.toFixed(2), w - padR + 4, avgY + 4);

  // Data line
  const points = splits.map((s, i) => ({
    x: padL + (chartW / (splits.length - 1)) * i,
    y: padT + chartH - ((s - minVal) / range) * chartH,
    val: s,
  }));

  // Area fill
  ctx.beginPath();
  ctx.moveTo(points[0].x, padT + chartH);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, padT + chartH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
  grad.addColorStop(0, 'rgba(107, 33, 168, 0.15)');
  grad.addColorStop(1, 'rgba(107, 33, 168, 0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#6B21A8';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Points
  points.forEach((p, i) => {
    const isFastest = p.val === Math.min(...splits);
    const isSlowest = p.val === Math.max(...splits);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = isFastest ? '#10B981' : isSlowest ? '#DC2626' : '#6B21A8';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Value label
    ctx.fillStyle = '#1A1A2E';
    ctx.font = '700 12px SF Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.val.toFixed(2), p.x, p.y - 14);
  });

  // X-axis labels
  ctx.fillStyle = '#6B7280';
  ctx.font = '10px SF Mono, monospace';
  points.forEach((p, i) => {
    const lbl = labels[i] || `S${i + 1}`;
    ctx.textAlign = 'center';
    ctx.fillText(lbl, p.x, h - 10);
  });
}

// Init
updateSplitInputs();
</script>

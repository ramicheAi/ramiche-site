<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE — Athlete Card Generator</title>
<style>
  :root {
    --purple: #6b21a8;
    --purple-dark: #2d1b4e;
    --scarlet: #dc2626;
    --gold: #f59e0b;
    --blue: #2563eb;
    --bg: #0f0a1a;
    --card-bg: #1a1028;
    --text: #e8e0f0;
    --text-muted: #a89bc0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 30px 20px 10px;
  }

  .header h1 {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--scarlet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .app {
    display: flex;
    gap: 40px;
    padding: 30px 40px;
    max-width: 1400px;
    margin: 0 auto;
    align-items: flex-start;
  }

  @media (max-width: 900px) {
    .app { flex-direction: column; padding: 20px; gap: 24px; }
  }

  /* ─── FORM PANEL ─── */
  .form-panel {
    flex: 1;
    background: var(--card-bg);
    border: 2px solid var(--purple);
    border-radius: 16px;
    padding: 28px;
  }

  .form-panel h2 {
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-group input, .form-group select, .form-group textarea {
    background: var(--bg);
    border: 2px solid var(--purple-dark);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  .form-group textarea { resize: vertical; min-height: 60px; }

  .level-select {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .level-btn {
    padding: 8px 4px;
    border: 2px solid var(--purple-dark);
    background: var(--bg);
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    text-align: center;
  }

  .level-btn:hover { border-color: var(--purple); }

  .level-btn.active {
    border-color: var(--gold);
    background: rgba(245, 158, 11, 0.15);
    color: var(--gold);
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .events-section { margin-bottom: 14px; }

  .event-entry {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 8px;
    align-items: end;
  }

  .event-entry input { font-size: 0.85rem; padding: 8px; }

  .btn-add-event, .btn-remove-event {
    padding: 8px 12px;
    border: 2px solid var(--purple-dark);
    background: var(--bg);
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn-add-event:hover { border-color: var(--gold); color: var(--gold); }
  .btn-remove-event { padding: 8px 10px; color: var(--scarlet); }
  .btn-remove-event:hover { border-color: var(--scarlet); }

  .color-picker-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }

  .action-bar {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn-generate {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, var(--purple), var(--scarlet));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(107, 33, 168, 0.4);
  }

  .btn-download {
    padding: 14px 20px;
    background: var(--bg);
    border: 2px solid var(--gold);
    color: var(--gold);
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-download:hover {
    background: rgba(245, 158, 11, 0.1);
  }

  /* ─── CARD PREVIEW ─── */
  .preview-panel {
    flex: 0 0 420px;
    position: sticky;
    top: 30px;
  }

  @media (max-width: 900px) {
    .preview-panel { flex: none; width: 100%; position: static; }
  }

  .card-container {
    perspective: 1200px;
  }

  .athlete-card {
    width: 380px;
    height: 560px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    margin: 0 auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(107, 33, 168, 0.2);
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .athlete-card:hover {
    transform: rotateY(-5deg) rotateX(3deg);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .card-bg canvas {
    width: 100%;
    height: 100%;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* Card header */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 20px 0;
  }

  .card-logo {
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .card-level-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 2px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.3);
    color: #fff;
  }

  /* Avatar section */
  .card-avatar-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    position: relative;
  }

  .avatar-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4.5rem;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    position: relative;
    overflow: hidden;
  }

  .avatar-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .avatar-initials {
    font-weight: 900;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    font-size: 3.5rem;
  }

  /* Name section */
  .card-name-section {
    text-align: center;
    padding: 0 20px 8px;
  }

  .card-name {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    line-height: 1.2;
  }

  .card-team {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .card-sport-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  /* Stats bar */
  .card-stats-bar {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
  }

  .card-stat {
    text-align: center;
    padding: 10px 8px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .card-stat:last-child { border-right: none; }

  .card-stat-value {
    font-size: 1.3rem;
    font-weight: 900;
    color: #fff;
  }

  .card-stat-label {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* Events strip */
  .card-events {
    background: rgba(0,0,0,0.5);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 80px;
    overflow: hidden;
  }

  .card-event-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.72rem;
  }

  .card-event-name {
    color: rgba(255,255,255,0.7);
    flex: 1;
  }

  .card-event-time {
    color: var(--gold);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .card-event-place {
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 0.65rem;
    margin-left: 8px;
  }

  .place-1 { background: rgba(245, 158, 11, 0.3); color: var(--gold); }
  .place-2 { background: rgba(192, 192, 192, 0.3); color: #c0c0c0; }
  .place-3 { background: rgba(205, 127, 50, 0.3); color: #cd7f32; }
  .place-other { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }

  /* Card footer */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px 10px;
    background: rgba(0,0,0,0.5);
  }

  .card-season {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  .card-mettle-mark {
    font-size: 0.6rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
  }

  /* Holographic shine effect */
  .holo-shine {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(
      135deg,
      transparent 30%,
      rgba(255,255,255,0.05) 45%,
      rgba(255,255,255,0.1) 50%,
      rgba(255,255,255,0.05) 55%,
      transparent 70%
    );
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .athlete-card:hover .holo-shine { opacity: 1; }

  /* Particle canvas in card background */
  #cardBgCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Demo cards gallery */
  .demo-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .demo-btn {
    padding: 8px 16px;
    background: var(--bg);
    border: 2px solid var(--purple-dark);
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .demo-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Photo upload */
  .photo-upload-area {
    border: 2px dashed var(--purple-dark);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }

  .photo-upload-area:hover { border-color: var(--gold); }

  .photo-upload-area span {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  #photoInput { display: none; }

  .photo-preview {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    margin: 8px auto 0;
    display: none;
    border: 2px solid var(--gold);
  }
</style>
</head>
<body>

<div class="header">
  <h1>METTLE</h1>
  <p>Athlete Card Generator</p>
</div>

<div class="app">
  <!-- ─── FORM ─── -->
  <div class="form-panel">
    <h2>Athlete Info</h2>

    <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
      <span>📷 Click to upload athlete photo</span>
      <input type="file" id="photoInput" accept="image/*">
      <img class="photo-preview" id="photoPreview">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" value="Marcus" oninput="liveUpdate()">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" value="Johnson" oninput="liveUpdate()">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Team / Club</label>
        <input type="text" id="teamName" value="Saint Andrew's Aquatics" oninput="liveUpdate()">
      </div>
      <div class="form-group">
        <label>Sport</label>
        <select id="sport" onchange="liveUpdate()">
          <option value="Swimming" selected>Swimming</option>
          <option value="Track & Field">Track & Field</option>
          <option value="Football">Football</option>
          <option value="Basketball">Basketball</option>
          <option value="Soccer">Soccer</option>
          <option value="Baseball">Baseball</option>
          <option value="Volleyball">Volleyball</option>
          <option value="Wrestling">Wrestling</option>
          <option value="Cross Country">Cross Country</option>
          <option value="Lacrosse">Lacrosse</option>
        </select>
      </div>
    </div>

    <div class="form-group" style="margin-bottom: 14px;">
      <label>Season</label>
      <input type="text" id="season" value="2025-26" oninput="liveUpdate()">
    </div>

    <label style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block;">Level</label>
    <div class="level-select">
      <button class="level-btn" data-level="Rookie" onclick="setLevel(this)">Rookie</button>
      <button class="level-btn" data-level="Contender" onclick="setLevel(this)">Contender</button>
      <button class="level-btn active" data-level="Warrior" onclick="setLevel(this)">Warrior</button>
      <button class="level-btn" data-level="Elite" onclick="setLevel(this)">Elite</button>
      <button class="level-btn" data-level="Captain" onclick="setLevel(this)">Captain</button>
      <button class="level-btn" data-level="Legend" onclick="setLevel(this)">Legend</button>
    </div>

    <label style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block;">Stats</label>
    <div class="stat-row">
      <div class="form-group">
        <label>XP</label>
        <input type="number" id="statXP" value="2450" oninput="liveUpdate()">
      </div>
      <div class="form-group">
        <label>Streak</label>
        <input type="number" id="statStreak" value="14" oninput="liveUpdate()">
      </div>
      <div class="form-group">
        <label>Meets</label>
        <input type="number" id="statMeets" value="8" oninput="liveUpdate()">
      </div>
    </div>

    <label style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block;">Top Events</label>
    <div class="events-section" id="eventsSection">
      <div class="event-entry">
        <div class="form-group"><label>Event</label><input type="text" value="50 Free" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Best Time</label><input type="text" value="24.31" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Place</label><input type="number" value="1" min="1" oninput="liveUpdate()"></div>
        <button class="btn-remove-event" onclick="removeEvent(this)">✕</button>
      </div>
      <div class="event-entry">
        <div class="form-group"><label>Event</label><input type="text" value="100 Free" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Best Time</label><input type="text" value="53.87" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Place</label><input type="number" value="2" min="1" oninput="liveUpdate()"></div>
        <button class="btn-remove-event" onclick="removeEvent(this)">✕</button>
      </div>
      <div class="event-entry">
        <div class="form-group"><label>Event</label><input type="text" value="200 IM" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Best Time</label><input type="text" value="2:18.45" oninput="liveUpdate()"></div>
        <div class="form-group"><label>Place</label><input type="number" value="3" min="1" oninput="liveUpdate()"></div>
        <button class="btn-remove-event" onclick="removeEvent(this)">✕</button>
      </div>
    </div>
    <button class="btn-add-event" onclick="addEvent()">+ Add Event</button>

    <label style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block; margin-top:14px;">Card Theme</label>
    <div class="color-picker-row" id="colorPicker">
      <div class="color-swatch active" data-primary="#6b21a8" data-secondary="#dc2626" style="background: linear-gradient(135deg, #6b21a8, #dc2626);" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-primary="#1e40af" data-secondary="#0ea5e9" style="background: linear-gradient(135deg, #1e40af, #0ea5e9);" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-primary="#15803d" data-secondary="#22d3ee" style="background: linear-gradient(135deg, #15803d, #22d3ee);" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-primary="#b91c1c" data-secondary="#f59e0b" style="background: linear-gradient(135deg, #b91c1c, #f59e0b);" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-primary="#7c3aed" data-secondary="#ec4899" style="background: linear-gradient(135deg, #7c3aed, #ec4899);" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-primary="#0f172a" data-secondary="#f59e0b" style="background: linear-gradient(135deg, #0f172a, #f59e0b);" onclick="setTheme(this)"></div>
    </div>

    <div class="action-bar">
      <button class="btn-generate" onclick="renderCard()">Update Card</button>
      <button class="btn-download" onclick="downloadCard()">Save PNG</button>
    </div>

    <div class="demo-row">
      <button class="demo-btn" onclick="loadDemo('swimmer')">Swimmer</button>
      <button class="demo-btn" onclick="loadDemo('sprinter')">Sprinter</button>
      <button class="demo-btn" onclick="loadDemo('football')">Football</button>
      <button class="demo-btn" onclick="loadDemo('legend')">Legend</button>
    </div>
  </div>

  <!-- ─── CARD PREVIEW ─── -->
  <div class="preview-panel">
    <div class="card-container">
      <div class="athlete-card" id="athleteCard">
        <div class="card-bg">
          <canvas id="cardBgCanvas"></canvas>
        </div>
        <div class="card-overlay">
          <div class="card-top">
            <span class="card-logo">METTLE</span>
            <span class="card-level-badge" id="cardLevelBadge">WARRIOR</span>
          </div>
          <div class="card-avatar-section">
            <div class="avatar-circle" id="avatarCircle">
              <span class="avatar-initials" id="avatarInitials">MJ</span>
            </div>
          </div>
          <div class="card-name-section">
            <div class="card-name" id="cardName">MARCUS JOHNSON</div>
            <div class="card-team" id="cardTeam">SAINT ANDREW'S AQUATICS</div>
            <span class="card-sport-tag" id="cardSport">SWIMMING</span>
          </div>
          <div class="card-stats-bar">
            <div class="card-stat">
              <div class="card-stat-value" id="cardXP">2,450</div>
              <div class="card-stat-label">XP</div>
            </div>
            <div class="card-stat">
              <div class="card-stat-value" id="cardStreak">14</div>
              <div class="card-stat-label">Day Streak</div>
            </div>
            <div class="card-stat">
              <div class="card-stat-value" id="cardMeets">8</div>
              <div class="card-stat-label">Meets</div>
            </div>
          </div>
          <div class="card-events" id="cardEvents">
            <div class="card-event-row">
              <span class="card-event-name">50 Free</span>
              <span class="card-event-time">24.31</span>
              <span class="card-event-place place-1">1st</span>
            </div>
            <div class="card-event-row">
              <span class="card-event-name">100 Free</span>
              <span class="card-event-time">53.87</span>

  // ─── EVENT MANAGEMENT ───

  // ─── GATHER FORM DATA ───
  function getFormData() {
    const events = [];
    document.querySelectorAll('.event-entry').forEach(row => {
      const inputs = row.querySelectorAll('input');

        events.push({
          name: inputs[0].value.trim(),

  // ─── PLACE SUFFIX ───
  function placeSuffix(n) {
    if (!n || n < 1) return '';
    const s = ['th','st','nd','rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function placeClass(n) {
    if (n === 1) return 'place-1';
    if (n === 2) return 'place-2';
    if (n === 3) return 'place-3';
    return 'place-other';
  }

  // ─── FORMAT NUMBER ───
  function formatNum(n) {
    return n.toLocaleString();
  }

  // ─── RENDER CARD BACKGROUND ───
  function renderCardBg(canvas, theme, level) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.offsetWidth * 2;
    const h = canvas.height = canvas.offsetHeight * 2;

    // Gradient background
    const grad = ctx.createLinearGradient(0, 0, w * 0.4, h);
    grad.addColorStop(0, theme.primary);
    grad.addColorStop(0.5, mixColors(theme.primary, theme.secondary, 0.4));
    grad.addColorStop(1, theme.secondary);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Geometric pattern overlay
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const size = 30 + Math.random() * 80;
      ctx.beginPath();
      if (i % 3 === 0) {
        // Hexagon
        for (let j = 0; j < 6; j++) {
          const angle = (Math.PI / 3) * j - Math.PI / 6;
          const px = x + size * Math.cos(angle);
          const py = y + size * Math.sin(angle);
          j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
      } else if (i % 3 === 1) {
        // Diamond
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + size * 0.6, y);
        ctx.lineTo(x, y + size);
        ctx.lineTo(x - size * 0.6, y);
        ctx.closePath();
      } else {
        // Circle
        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Level-specific effects
    if (level === 'Legend') {
      // Golden sparkle particles
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 40; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const r = 1 + Math.random() * 3;
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    if (level === 'Elite' || level === 'Captain') {
      // Subtle radial glow
      const levelCol = LEVEL_COLORS[level];
      const glow = ctx.createRadialGradient(w / 2, h * 0.35, 0, w / 2, h * 0.35, w * 0.6);
      glow.addColorStop(0, levelCol.glow);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
    }

    // Vignette
    const vig = ctx.createRadialGradient(w / 2, h / 2, w * 0.25, w / 2, h / 2, w * 0.8);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, w, h);
  }

  function mixColors(c1, c2, ratio) {
    const hex = s => parseInt(s, 16);
    const r1 = hex(c1.slice(1, 3)), g1 = hex(c1.slice(3, 5)), b1 = hex(c1.slice(5, 7));
    const r2 = hex(c2.slice(1, 3)), g2 = hex(c2.slice(3, 5)), b2 = hex(c2.slice(5, 7));
    const r = Math.round(r1 + (r2 - r1) * ratio);
    const g = Math.round(g1 + (g2 - g1) * ratio);
    const b = Math.round(b1 + (b2 - b1) * ratio);
    return `rgb(${r},${g},${b})`;
  }

  // ─── LIVE UPDATE ───
  function liveUpdate() {
    const d = getFormData();

    // Background
    renderCardBg(document.getElementById('cardBgCanvas'), d.theme, d.level);

    // Level badge
    const badge = document.getElementById('cardLevelBadge');

    badge.style.background = lc.glow;

    // Avatar
    const circle = document.getElementById('avatarCircle');
    const initials = document.getElementById('avatarInitials');
    if (d.photo) {
      let img = circle.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        circle.appendChild(img);

      initials.style.display = 'none';
    } else {
      const img = circle.querySelector('img');
      if (img) img.remove();

      initials.textContent = (d.firstName[0] || '') + (d.lastName[0] || '');

    // Name & team

    document.getElementById('cardTeam').textContent = d.team.toUpperCase();
    document.getElementById('cardSport').textContent = d.sport.toUpperCase();

    // Stats

    document.getElementById('cardStreak').textContent = d.streak;
    document.getElementById('cardMeets').textContent = d.meets;

    // Events
    const eventsEl = document.getElementById('cardEvents');
    eventsEl.innerHTML = d.events.map(e => `
      <div class="card-event-row">
        <span class="card-event-name">${e.name}</span>
        <span class="card-event-time">${e.time}</span>

    // Season
    document.getElementById('cardSeason').textContent = d.season + ' SEASON';

  // ─── DOWNLOAD AS PNG ───
  function downloadCard() {
    const d = getFormData();
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d');
    const W = 760, H = 1120;
    const scale = 2; // retina

    // Draw background
    const grad = ctx.createLinearGradient(0, 0, W * 0.4, H);
    grad.addColorStop(0, d.theme.primary);
    grad.addColorStop(0.5, mixColors(d.theme.primary, d.theme.secondary, 0.4));
    grad.addColorStop(1, d.theme.secondary);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Geometric pattern
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const size = 30 + Math.random() * 80;
      ctx.beginPath();
      if (i % 3 === 0) {
        for (let j = 0; j < 6; j++) {
          const angle = (Math.PI / 3) * j - Math.PI / 6;
          const px = x + size * Math.cos(angle);
          const py = y + size * Math.sin(angle);
          j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
      } else if (i % 3 === 1) {
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + size * 0.6, y);
        ctx.lineTo(x, y + size);
        ctx.lineTo(x - size * 0.6, y);
        ctx.closePath();
      } else {
        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Level effects
    if (d.level === 'Legend') {
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 40; i++) {
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, 1 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Vignette
    const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.8);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Header
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '900 26px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('METTLE', 36, 50);

    const lc = LEVEL_COLORS[d.level] || LEVEL_COLORS['Rookie'];
    ctx.textAlign = 'right';
    ctx.font = '800 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = lc.badge;
    const badgeText = d.level.toUpperCase();
    const badgeW = ctx.measureText(badgeText).width + 24;
    const badgeX = W - 36;
    ctx.fillStyle = lc.glow;
    roundRect(ctx, badgeX - badgeW, 30, badgeW, 28, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    roundRect(ctx, badgeX - badgeW, 30, badgeW, 28, 14);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(badgeText, badgeX - badgeW / 2, 50);

    // Avatar circle
    const cx = W / 2, cy = 280, cr = 120;
    ctx.beginPath();
    ctx.arc(cx, cy, cr + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 4;
    ctx.stroke();

    if (d.photo) {
      const img = new Image();
      img.onload = () => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, cx - cr, cy - cr, cr * 2, cr * 2);
        ctx.restore();
        finishExport(ctx, d, W, H);
      };
      img.src = d.photo;
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '900 72px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText((d.firstName[0] || '') + (d.lastName[0] || ''), cx, cy);
      ctx.textBaseline = 'alphabetic';
      finishExport(ctx, d, W, H);
    }
  }

  function finishExport(ctx, d, W, H) {
    // Name
    ctx.fillStyle = '#fff';
    ctx.font = '900 36px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 12;
    ctx.fillText(`${d.firstName} ${d.lastName}`.toUpperCase(), W / 2, 440);
    ctx.shadowBlur = 0;

    // Team
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '400 14px "Segoe UI", system-ui, sans-serif';
    ctx.letterSpacing = '2px';
    ctx.fillText(d.team.toUpperCase(), W / 2, 465);

    // Sport tag
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    const sportText = d.sport.toUpperCase();
    ctx.font = '700 12px "Segoe UI", system-ui, sans-serif';
    const stw = ctx.measureText(sportText).width + 20;
    roundRect(ctx, W / 2 - stw / 2, 475, stw, 22, 11);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(sportText, W / 2, 491);

    // Stats bar background
    const statsY = 520;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, statsY, W, 70);

    // Stats
    const stats = [
      { value: formatNum(d.xp), label: 'XP' },
      { value: String(d.streak), label: 'DAY STREAK' },
      { value: String(d.meets), label: 'MEETS' }
    ];
    const sw = W / 3;
    stats.forEach((s, i) => {
      const sx = sw * i + sw / 2;
      ctx.fillStyle = '#fff';
      ctx.font = '900 28px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.value, sx, statsY + 35);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '400 10px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(s.label, sx, statsY + 55);

      if (i < 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sw * (i + 1), statsY + 10);
        ctx.lineTo(sw * (i + 1), statsY + 60);
        ctx.stroke();
      }
    });

    // Events
    const evY = 600;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, evY, W, d.events.length * 30 + 20);

    d.events.forEach((e, i) => {
      const ey = evY + 20 + i * 30;
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '400 15px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(e.name, 32, ey);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#f59e0b';
      ctx.font = '700 15px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(e.time, W - 100, ey);

      if (e.place) {
        const placeColors = { 1: '#f59e0b', 2: '#c0c0c0', 3: '#cd7f32' };
        ctx.fillStyle = placeColors[e.place] || 'rgba(255,255,255,0.5)';
        ctx.font = '800 13px "Segoe UI", system-ui, sans-serif';
        ctx.fillText(placeSuffix(e.place), W - 32, ey);
      }
    });

    // Footer
    const footY = evY + d.events.length * 30 + 30;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, footY, W, 40);
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '400 11px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(d.season + ' SEASON', 32, footY + 25);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '900 11px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('METTLE', W - 32, footY + 25);

    // Rounded corners mask via composite
    // Clip to rounded rect
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = W;
    tempCanvas.height = H;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.drawImage(ctx.canvas, 0, 0);

    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    roundRect(ctx, 0, 0, W, H, 40);
    ctx.clip();
    ctx.drawImage(tempCanvas, 0, 0);

    // Trigger download
    const link = document.createElement('a');
    const fullName = `${d.firstName}-${d.lastName}`.toLowerCase().replace(/\s+/g, '-');
    link.download = `mettle-card-${fullName}.png`;
    link.href = ctx.canvas.toDataURL('image/png');
    link.click();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

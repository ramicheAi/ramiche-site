<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKG System Vitals — Real-Time Infrastructure Monitor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a12; --surface: #12121e; --surface-2: #1a1a2e;
            --border: rgba(168,85,247,0.15); --green: #22c55e; --purple: #a855f7;
            --blue: #3b82f6; --orange: #f97316; --red: #ef4444; --gold: #eab308;
            --text: #f1f5f9; --text-dim: #94a3b8; --text-muted: #64748b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header .badge { background: var(--purple); color: #fff; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px; }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .metric-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-card .value { font-size: 2rem; font-weight: 800; margin: 8px 0 4px; }
        .metric-card .sub { font-size: 0.8rem; color: var(--text-dim); }
        .metric-card .indicator { position: absolute; top: 16px; right: 16px; width: 10px; height: 10px; border-radius: 50%; }
        .indicator.ok { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
        .indicator.warn { background: var(--orange); box-shadow: 0 0 8px rgba(249,115,22,0.5); }
        .indicator.crit { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 0 32px 24px; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
        .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .chart-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--purple); }
        canvas { width: 100%; height: 180px; }
        .log-section { padding: 0 32px 32px; }
        .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .log-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--purple); }
        .log-entries { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
        .log-entry { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; gap: 12px; }
        .log-entry .ts { color: var(--text-muted); white-space: nowrap; }
        .log-entry .lvl { font-weight: 600; width: 48px; }
        .log-entry .lvl.ok { color: var(--green); }
        .log-entry .lvl.warn { color: var(--orange); }
        .log-entry .lvl.err { color: var(--red); }
    </style>
</head>
<body>
    <div class="header">
        <h1>EKG System Vitals</h1>
        <span class="badge">TRIAGE BUILD</span>
        <span class="pulse" style="color:var(--green);font-size:0.85rem;">LIVE</span>
    </div>
    <div class="grid" id="metrics"></div>
    <div class="charts">
        <div class="chart-card">
            <h2>CPU Usage (60s)</h2>
            <canvas id="cpuChart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Memory Usage (60s)</h2>
            <canvas id="memChart"></canvas>
        </div>
    </div>
    <div class="log-section">
        <div class="log-card">
            <h2>System Log</h2>
            <div class="log-entries" id="logs"></div>
        </div>
    </div>
    <script>
        var metrics = [
            { id: 'cpu', label: 'CPU Usage', unit: '%', min: 15, max: 85, warnAt: 70, critAt: 90 },
            { id: 'mem', label: 'Memory', unit: '%', min: 40, max: 78, warnAt: 75, critAt: 90 },
            { id: 'disk', label: 'Disk I/O', unit: 'MB/s', min: 10, max: 180, warnAt: 150, critAt: 200 },
            { id: 'net', label: 'Network', unit: 'Mbps', min: 20, max: 450, warnAt: 400, critAt: 500 },
            { id: 'latency', label: 'API Latency', unit: 'ms', min: 8, max: 120, warnAt: 100, critAt: 200 },
            { id: 'req', label: 'Requests/s', unit: 'rps', min: 200, max: 2400, warnAt: 2000, critAt: 2500 },
            { id: 'err', label: 'Error Rate', unit: '%', min: 0, max: 3.5, warnAt: 2, critAt: 5 },
            { id: 'up', label: 'Uptime', unit: 'days', min: 42, max: 42, warnAt: 999, critAt: 999 }
        ];
        var state = {};
        var history = { cpu: [], mem: [] };
        var logEntries = [];
        function rand(a, b) { return a + Math.random() * (b - a); }
        function initMetrics() {
            var el = document.getElementById('metrics');
            el.innerHTML = metrics.map(function(m) {
                state[m.id] = rand(m.min, m.max);
                return '<div class="metric-card" id="card-'+m.id+'"><div class="indicator ok" id="ind-'+m.id+'"></div><div class="label">'+m.label+'</div><div class="value" id="val-'+m.id+'">—</div><div class="sub" id="sub-'+m.id+'"></div></div>';
            }).join('');
        }
        function updateMetrics() {
            metrics.forEach(function(m) {
                if (m.id === 'up') { state[m.id] += 1/86400; }
                else { state[m.id] += rand(-3, 3); state[m.id] = Math.max(m.min * 0.5, Math.min(m.max * 1.2, state[m.id])); }
                var v = state[m.id];
                var prec = v < 10 ? 1 : 0;
                document.getElementById('val-'+m.id).textContent = v.toFixed(prec) + ' ' + m.unit;
                var ind = document.getElementById('ind-'+m.id);
                if (v >= m.critAt) { ind.className = 'indicator crit'; }
                else if (v >= m.warnAt) { ind.className = 'indicator warn'; }
                else { ind.className = 'indicator ok'; }
                var pct = ((v - m.min * 0.5) / (m.max * 1.2 - m.min * 0.5) * 100).toFixed(0);
                document.getElementById('sub-'+m.id).textContent = 'Capacity: ' + Math.min(100, Math.max(0, pct)) + '%';
            });
            history.cpu.push(state.cpu); if (history.cpu.length > 60) history.cpu.shift();
            history.mem.push(state.mem); if (history.mem.length > 60) history.mem.shift();
        }
        function drawChart(canvasId, data, color, maxVal) {
            var c = document.getElementById(canvasId);
            var ctx = c.getContext('2d');
            c.width = c.offsetWidth * 2; c.height = c.offsetHeight * 2;
            ctx.scale(2, 2);
            var w = c.offsetWidth, h = c.offsetHeight;
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, w, h);
            if (data.length < 2) return;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for (var i = 0; i < 5; i++) { var y = (h / 5) * i; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
            ctx.beginPath();
            var step = w / 59;
            for (var i = 0; i < data.length; i++) {
                var x = i * step;
                var y = h - (data[i] / maxVal) * h;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
            ctx.lineTo((data.length - 1) * step, h); ctx.lineTo(0, h); ctx.closePath();
            ctx.fillStyle = color.replace('1)', '0.1)'); ctx.fill();
        }
        function addLog() {
            var msgs = [
                ['OK', 'ok', 'Health check passed — all systems nominal'],
                ['OK', 'ok', 'Database connection pool: 12/50 active'],
                ['OK', 'ok', 'Cache hit ratio: 94.2%'],
                ['WARN', 'warn', 'CPU spike detected on worker-3 (82%)'],
                ['WARN', 'warn', 'Slow query detected: 340ms on /api/athletes'],
                ['ERR', 'err', 'Connection timeout to Redis replica-2'],
                ['OK', 'ok', 'SSL certificate valid — 47 days remaining'],
                ['OK', 'ok', 'Firestore read quota: 22% used'],
                ['WARN', 'warn', 'Memory pressure on pod-7: 76% utilized'],
                ['OK', 'ok', 'CDN cache purge completed in 1.2s']
            ];
            var m = msgs[Math.floor(Math.random() * msgs.length)];
            var now = new Date();
            var ts = now.toLocaleTimeString('en-US', { hour12: false });
            logEntries.unshift({ ts: ts, lvl: m[0], cls: m[1], msg: m[2] });
            if (logEntries.length > 50) logEntries.pop();
            var el = document.getElementById('logs');
            el.innerHTML = logEntries.map(function(e) {
                return '<div class="log-entry"><span class="ts">' + e.ts + '</span><span class="lvl ' + e.cls + '">' + e.lvl + '</span><span>' + e.msg + '</span></div>';
            }).join('');
        }
        initMetrics();
        updateMetrics();
        addLog(); addLog(); addLog(); addLog(); addLog();
        setInterval(function() {
            updateMetrics();
            drawChart('cpuChart', history.cpu, 'rgba(168,85,247,1)', 100);
            drawChart('memChart', history.mem, 'rgba(59,130,246,1)', 100);
        }, 1000);
        setInterval(addLog, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE Deal Pipeline Kanban</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --purple: #a855f7;
    --purple-bg: rgba(168,85,247,0.12);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,0.12);
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: auto;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }

  /* Pipeline Stats Bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    min-width: 160px;
    flex: 1;
  }
  .stat-card .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .stat-value { font-size: 22px; font-weight: 700; }
  .stat-card .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .stat-green { color: var(--green); }
  .stat-yellow { color: var(--yellow); }
  .stat-blue { color: var(--blue); }
  .stat-purple { color: var(--purple); }

  /* Kanban Board */
  .board {
    display: flex;
    gap: 16px;
    padding: 20px 28px;
    min-height: calc(100vh - 200px);
    overflow-x: auto;
  }

  /* Columns */
  .column {
    min-width: 300px;
    max-width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .column-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
  }
  .column-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .column-revenue {
    font-size: 12px;
    font-weight: 600;
  }
  .column-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow-y: auto;
    min-height: 100px;
  }
  .column-body.drag-over {
    background: var(--accent-glow);
    border-radius: 0 0 var(--radius) var(--radius);
  }

  /* Deal Cards */
  .deal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: grab;
    transition: all 0.2s ease;
    position: relative;
  }
  .deal-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-glow);
    transform: translateY(-1px);
  }
  .deal-card.dragging {
    opacity: 0.4;
    transform: rotate(2deg);
  }
  .deal-card .deal-org {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .deal-card .deal-contact {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .deal-card .deal-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 8px;
  }
  .deal-tier {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tier-starter { background: var(--blue-bg); color: var(--blue); }
  .tier-pro { background: var(--purple-bg); color: var(--purple); }
  .tier-platinum { background: var(--orange-bg); color: var(--orange); }
  .tier-enterprise { background: var(--green-bg); color: var(--green); }

  .deal-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .deal-meta-item {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Health Score */
  .health-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .health-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .health-hot { background: var(--green); }
  .health-warm { background: var(--yellow); }
  .health-cold { background: var(--red); }

  /* Next Action Badge */
  .next-action {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 8px;
    font-size: 11px;
    color: var(--accent);
    line-height: 1.4;
  }
  .next-action strong { color: var(--text); }

  /* Add Deal Button */
  .add-deal-btn {
    margin: 12px;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .add-deal-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(99,102,241,0.05);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    box-shadow: var(--shadow);
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--accent);
  }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

  /* Deal Detail Panel */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: flex-end;
  }
  .detail-overlay.active { display: flex; }
  .detail-panel {
    width: 440px;
    max-width: 90vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 28px;
    overflow-y: auto;
    height: 100vh;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .detail-panel h2 { font-size: 20px; margin-bottom: 4px; }
  .detail-panel .detail-contact { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
  .detail-section { margin-bottom: 24px; }
  .detail-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .detail-row .label { color: var(--text-dim); }
  .activity-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .activity-item .activity-date { color: var(--text-dim); font-size: 11px; }
  .close-detail {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
  }

  /* Weighted Pipeline Bar */
  .pipeline-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--border);
  }
  .pipeline-segment {
    height: 100%;
    transition: width 0.3s ease;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 13px;
    z-index: 300;
    box-shadow: var(--shadow);
    animation: fadeUp 0.3s ease;
    display: none;
  }
  .toast.active { display: block; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .stats-bar { flex-direction: column; }
    .board { padding: 12px; gap: 12px; }
    .column { min-width: 280px; }
  }
</style>
</head>

<div class="header">
  <div class="header-left">
    <div>
      <h1>METTLE Deal Pipeline</h1>
      <div class="subtitle">Drag deals between stages &bull; Click for details &bull; Real-time weighted revenue</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn btn-primary" onclick="openAddDeal()">+ New Deal</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="board" id="board"></div>

<!-- Add Deal Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>New Deal</h2>
    <label>Organization</label>
    <input type="text" id="newOrg" placeholder="e.g., Dolphins Swim Club">
    <label>Contact Name</label>
    <input type="text" id="newContact" placeholder="e.g., Sarah Johnson, Head Coach">
    <label>Tier</label>
    <select id="newTier">
      <option value="Starter">Starter — $149/mo</option>
      <option value="Pro" selected>Pro — $349/mo</option>
      <option value="Platinum">Platinum — $549/mo</option>
      <option value="Enterprise">Enterprise — Custom</option>
    </select>
    <label>Athletes (est.)</label>
    <input type="number" id="newAthletes" placeholder="50" value="50">
    <label>Notes</label>
    <textarea id="newNotes" placeholder="How did this lead come in? Key details..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddDeal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDeal()">Add to Pipeline</button>
    </div>
  </div>
</div>

<!-- Deal Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel" onclick="event.stopPropagation()"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// Render the entire board
function render() {

function renderStats() {
  const bar = document.getElementById('statsBar');
  const activeDeals = deals.filter(d => !['closed_won','closed_lost'].includes(d.stage));
  const totalPipeline = activeDeals.reduce((s, d) => s + d.value, 0);
  const weightedPipeline = activeDeals.reduce((s, d) => {
    const stage = STAGES.find(st => st.id === d.stage);
    return s + (d.value * (stage ? stage.weight : 0));
  }, 0);
  const wonDeals = deals.filter(d => d.stage === 'closed_won');
  const wonRevenue = wonDeals.reduce((s, d) => s + d.value, 0);
  const avgHealth = activeDeals.length > 0
    ? Math.round(activeDeals.reduce((s, d) => s + d.health, 0) / activeDeals.length)
    : 0;
  const avgDays = activeDeals.length > 0
    ? Math.round(activeDeals.reduce((s, d) => s + d.daysInStage, 0) / activeDeals.length)
    : 0;

  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Pipeline</div>
      <div class="stat-value stat-blue">$${(totalPipeline).toLocaleString()}</div>
      <div class="stat-sub">${activeDeals.length} active deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Weighted Pipeline</div>
      <div class="stat-value stat-purple">$${Math.round(weightedPipeline).toLocaleString()}</div>
      <div class="stat-sub">Probability-adjusted ARR</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Closed Won (MTD)</div>
      <div class="stat-value stat-green">$${wonRevenue.toLocaleString()}</div>
      <div class="stat-sub">${wonDeals.length} deal${wonDeals.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Deal Health</div>
      <div class="stat-value" style="color:${avgHealth >= 60 ? 'var(--green)' : avgHealth >= 40 ? 'var(--yellow)' : 'var(--red)'}">${avgHealth}%</div>
      <div class="stat-sub">Across active pipeline</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Days in Stage</div>
      <div class="stat-value stat-yellow">${avgDays}d</div>
      <div class="stat-sub">${avgDays > 10 ? '⚠️ Some deals stalling' : '✅ Velocity healthy'}</div>
    </div>
    <div class="stat-card" style="flex:2;">
      <div class="stat-label">Pipeline Distribution</div>
      <div class="pipeline-bar" style="margin-top:8px;">
        ${STAGES.filter(s => !['closed_won','closed_lost'].includes(s.id)).map(s => {
          const stageDeals = deals.filter(d => d.stage === s.id);
          const stageVal = stageDeals.reduce((sum, d) => sum + d.value, 0);
          const pct = totalPipeline > 0 ? (stageVal / totalPipeline * 100) : 0;
          return `<div class="pipeline-segment" style="width:${pct}%;background:${s.color};" title="${s.name}: $${stageVal.toLocaleString()}"></div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
        ${STAGES.filter(s => !['closed_won','closed_lost'].includes(s.id)).map(s => {
          const count = deals.filter(d => d.stage === s.id).length;
          return count > 0 ? `<div style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${s.color};display:inline-block;"></span>
            ${s.name} (${count})
          </div>` : '';
        }).join('')}
      </div>
    </div>
  `;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  STAGES.forEach(stage => {
    const stageDeals = deals.filter(d => d.stage === stage.id);
    const stageRevenue = stageDeals.reduce((s, d) => s + d.value, 0);
    const weightedRev = stageDeals.reduce((s, d) => s + d.value * stage.weight, 0);

    const col = document.createElement('div');
    col.className = 'column';
    col.innerHTML = `
      <div class="column-header">
        <div class="column-title">
          <span>${stage.icon}</span>
          <span>${stage.name}</span>
          <span class="column-count">${stageDeals.length}</span>
        </div>
        <div class="column-revenue" style="color:${stage.color}">
          $${Math.round(weightedRev).toLocaleString()}
        </div>
      </div>
      <div class="column-body" data-stage="${stage.id}"
        ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${stage.id}')">
        ${stageDeals.map(deal => renderDealCard(deal, stage)).join('')}
      </div>
      ${stage.id !== 'closed_won' && stage.id !== 'closed_lost' ?
        `<button class="add-deal-btn" onclick="openAddDeal('${stage.id}')">+ Add Deal</button>` : ''}
    `;
    board.appendChild(col);
  });
}

function renderDealCard(deal, stage) {
  const healthClass = deal.health >= 60 ? 'health-hot' : deal.health >= 40 ? 'health-warm' : 'health-cold';
  const actions = NEXT_ACTIONS[deal.stage] || [];
  const nextAction = actions[Math.floor(Math.abs(hashStr(deal.org)) % actions.length)];
  const staleDays = deal.daysInStage;
  const staleWarning = staleDays > 10 && !['closed_won','closed_lost'].includes(deal.stage)
    ? `<span style="color:var(--red);font-size:11px;">⚠️ ${staleDays}d — stalling</span>` : '';

  return `
    <div class="deal-card" draggable="true"
      ondragstart="handleDragStart(event, ${deal.id})"
      ondragend="handleDragEnd(event)"
      onclick="openDetail(${deal.id})">
      <div class="deal-org">
        <span>${deal.org}</span>
        <span class="deal-tier ${TIER_CLASSES[deal.tier]}">${deal.tier}</span>
      </div>
      <div class="deal-contact">${deal.contact}</div>
      <div class="deal-value">$${deal.value.toLocaleString()}<span style="font-size:11px;color:var(--text-dim);font-weight:400;">/yr</span></div>
      <div class="deal-meta">
        <div class="deal-meta-item">👥 ${deal.athletes} athletes</div>
        <div class="deal-meta-item">📅 ${staleDays}d in stage</div>
        ${staleWarning}
      </div>
      <div class="health-bar"><div class="health-fill ${healthClass}" style="width:${deal.health}%"></div></div>
      ${nextAction && !['closed_won','closed_lost'].includes(deal.stage) ? `
        <div class="next-action">
          <strong>Next:</strong> ${nextAction}
        </div>
      ` : ''}
    </div>
  `;
}

// Simple string hash for deterministic action selection
function hashStr(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}

// Drag and Drop
function handleDragStart(e, dealId) {
  draggedDealId = dealId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.column-body').forEach(el => el.classList.remove('drag-over'));
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function handleDrop(e, newStage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (draggedDealId === null) return;

  const deal = deals.find(d => d.id === draggedDealId);
  if (!deal || deal.stage === newStage) return;

  const oldStage = deal.stage;
  deal.stage = newStage;
  deal.daysInStage = 0;

  // Update health based on forward/backward movement
  const oldIdx = STAGES.findIndex(s => s.id === oldStage);
  const newIdx = STAGES.findIndex(s => s.id === newStage);
  if (newStage === 'closed_won') {
    deal.health = 100;
  } else if (newStage === 'closed_lost') {
    deal.health = 0;
  } else if (newIdx > oldIdx) {
    deal.health = Math.min(100, deal.health + 15);
  } else {
    deal.health = Math.max(10, deal.health - 20);
  }

  // Add activity
  const today = new Date().toISOString().split('T')[0];
  const stageName = STAGES.find(s => s.id === newStage)?.name || newStage;
  deal.activity.unshift({ date: today, text: `Moved to ${stageName}` });

  showToast(`${deal.org} → ${stageName}`);
  draggedDealId = null;
  render();
  saveToLocal();
}

// Detail Panel
function openDetail(dealId) {
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;

  const stage = STAGES.find(s => s.id === deal.stage);
  const actions = NEXT_ACTIONS[deal.stage] || [];
  const panel = document.getElementById('detailPanel');

  panel.innerHTML = `
    <button class="close-detail" onclick="closeDetailPanel()">✕</button>
    <h2>${deal.org}</h2>
    <div class="detail-contact">${deal.contact}</div>
    <div style="margin-bottom:20px;">
      <span class="deal-tier ${TIER_CLASSES[deal.tier]}" style="font-size:12px;padding:4px 12px;">${deal.tier} — $${TIER_PRICING[deal.tier]}/mo</span>
    </div>

    <div class="detail-section">
      <h3>Deal Overview</h3>
      <div class="detail-row"><span class="label">Annual Value</span><span style="color:var(--green);font-weight:600;">$${deal.value.toLocaleString()}</span></div>
      <div class="detail-row"><span class="label">Weighted Value</span><span>$${Math.round(deal.value * (stage?.weight || 0)).toLocaleString()}</span></div>
      <div class="detail-row"><span class="label">Athletes</span><span>${deal.athletes}</span></div>
      <div class="detail-row"><span class="label">Stage</span><span style="color:${stage?.color || 'inherit'}">${stage?.icon} ${stage?.name}</span></div>
      <div class="detail-row"><span class="label">Win Probability</span><span>${Math.round((stage?.weight || 0) * 100)}%</span></div>
      <div class="detail-row"><span class="label">Days in Stage</span><span>${deal.daysInStage}d</span></div>
      <div class="detail-row"><span class="label">Deal Health</span><span style="color:${deal.health >= 60 ? 'var(--green)' : deal.health >= 40 ? 'var(--yellow)' : 'var(--red)'}">${deal.health}%</span></div>
      <div class="detail-row"><span class="label">Created</span><span>${deal.created}</span></div>
    </div>

    <div class="detail-section">
      <h3>Notes</h3>
      <div style="font-size:13px;line-height:1.5;color:var(--text-dim);padding:8px 0;">${deal.notes}</div>
    </div>

    ${actions.length > 0 ? `
    <div class="detail-section">
      <h3>Recommended Actions</h3>
      ${actions.map(a => `
        <div style="padding:8px 10px;margin-bottom:6px;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:8px;font-size:12px;color:var(--accent);">
          → ${a}
        </div>
      `).join('')}
    </div>` : ''}

    <div class="detail-section">
      <h3>Activity Log</h3>
      ${deal.activity.map(a => `
        <div class="activity-item">
          <div class="activity-date">${a.date}</div>
          <div>${a.text}</div>
        </div>
      `).join('')}
    </div>

    <div style="display:flex;gap:10px;margin-top:20px;">
      ${deal.stage !== 'closed_won' ? `<button class="btn btn-primary" style="flex:1;" onclick="moveDealForward(${deal.id})">Move Forward →</button>` : ''}
      ${deal.stage !== 'closed_lost' && deal.stage !== 'closed_won' ? `<button class="btn btn-ghost" style="flex:1;color:var(--red);border-color:var(--red);" onclick="markLost(${deal.id})">Mark Lost</button>` : ''}
    </div>
  `;

  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) {
    closeDetailPanel();
  }
}

function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('active');
}

function moveDealForward(dealId) {
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;
  const currentIdx = STAGES.findIndex(s => s.id === deal.stage);
  if (currentIdx < STAGES.length - 2) { // Skip closed_lost
    const nextStage = STAGES[currentIdx + 1];
    deal.stage = nextStage.id;
    deal.daysInStage = 0;
    deal.health = Math.min(100, deal.health + 15);
    const today = new Date().toISOString().split('T')[0];
    deal.activity.unshift({ date: today, text: `Moved to ${nextStage.name}` });
    showToast(`${deal.org} → ${nextStage.name}`);
    render();
    openDetail(dealId);
    saveToLocal();
  }
}

function markLost(dealId) {
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;
  deal.stage = 'closed_lost';
  deal.health = 0;
  deal.daysInStage = 0;
  const today = new Date().toISOString().split('T')[0];
  deal.activity.unshift({ date: today, text: '❌ Marked as closed lost' });
  showToast(`${deal.org} → Closed Lost`);
  render();
  closeDetailPanel();
  saveToLocal();
}

// Add Deal Modal
let addToStage = 'prospect';

function openAddDeal(stage) {
  addToStage = stage || 'prospect';
  document.getElementById('addModal').classList.add('active');
  document.getElementById('newOrg').focus();
}

function closeAddDeal() {
  document.getElementById('addModal').classList.remove('active');
}

function saveDeal() {
  const org = document.getElementById('newOrg').value.trim();
  const contact = document.getElementById('newContact').value.trim();
  const tier = document.getElementById('newTier').value;
  const athletes = parseInt(document.getElementById('newAthletes').value) || 50;
  const notes = document.getElementById('newNotes').value.trim();

  if (!org) { showToast('Organization name required'); return; }

  const today = new Date().toISOString().split('T')[0];
  deals.push({
    id: nextId++,
    org, contact: contact || 'TBD',
    tier, athletes,
    stage: addToStage,
    value: (TIER_PRICING[tier] || 349) * 12,
    health: 40,
    daysInStage: 0,
    created: today,
    notes: notes || '',
    activity: [{ date: today, text: 'Deal created' }]
  });

  closeAddDeal();
  document.getElementById('newOrg').value = '';
  document.getElementById('newContact').value = '';
  document.getElementById('newNotes').value = '';
  showToast(`${org} added to pipeline`);
  render();
  saveToLocal();
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('active');
  setTimeout(() => toast.classList.remove('active'), 2500);
}

// LocalStorage persistence
function saveToLocal() {
  try { localStorage.setItem('mettle-pipeline', JSON.stringify(deals)); } catch(e) {}
}

function loadFromLocal() {
  try {
    const saved = localStorage.getItem('mettle-pipeline');
    if (saved) {
      deals = JSON.parse(saved);
      nextId = Math.max(...deals.map(d => d.id)) + 1;
    }
  } catch(e) {}
}

// Init
loadFromLocal();
render();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeAddDeal();
    closeDetailPanel();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE Churn Risk Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;
  --text:#e4e4ef;--muted:#8888a0;--accent:#6366f1;--accent-soft:#6366f133;
  --red:#ef4444;--red-soft:#ef444422;--orange:#f59e0b;--orange-soft:#f59e0b22;
  --green:#22c55e;--green-soft:#22c55e22;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:1400px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
h1{font-size:24px;font-weight:700;letter-spacing:-0.5px}
h1 span{color:var(--accent);margin-right:8px}
.subtitle{color:var(--muted);font-size:13px;margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-live{background:var(--green-soft);color:var(--green)}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.summary-card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.summary-card .value{font-size:28px;font-weight:700}
.summary-card .change{font-size:12px;margin-top:4px}
.change-up{color:var(--red)}
.change-down{color:var(--green)}

/* Risk Distribution */
.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600}
.section-badge{font-size:12px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:8px}

/* Risk Bar */
.risk-bar-container{display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:8px}
.risk-bar-segment{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:width .6s ease}
.risk-bar-segment.high{background:var(--red)}
.risk-bar-segment.medium{background:var(--orange)}
.risk-bar-segment.low{background:var(--green)}
.risk-bar-legend{display:flex;gap:20px;font-size:12px;color:var(--muted)}
.risk-bar-legend span{display:flex;align-items:center;gap:6px}
.risk-bar-legend .dot{width:8px;height:8px;border-radius:50%}

/* Table */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;width:260px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}
.filter-group{display:flex;gap:8px}
.filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:12px 20px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted::after{content:' ▼';font-size:9px}
thead th.sorted.asc::after{content:' ▲'}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:14px 20px;font-size:13px}
.team-name{font-weight:600}
.team-tier{color:var(--muted);font-size:11px}
.risk-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.risk-high{background:var(--red-soft);color:var(--red)}
.risk-medium{background:var(--orange-soft);color:var(--orange)}
.risk-low{background:var(--green-soft);color:var(--green)}
.score-bar{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}
.signal-list{display:flex;flex-wrap:wrap;gap:4px}
.signal-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--muted)}
.signal-tag.negative{background:var(--red-soft);color:var(--red)}
.signal-tag.positive{background:var(--green-soft);color:var(--green)}
.action-btn{background:var(--accent);color:white;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .2s}
.action-btn:hover{opacity:.85}

/* Detail Panel */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.detail-overlay.open{display:flex}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:640px;max-height:85vh;overflow-y:auto;padding:32px}
.detail-panel h2{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-panel .meta{color:var(--muted);font-size:13px;margin-bottom:24px}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.metric-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.metric-row:last-child{border-bottom:none}
.metric-label{color:var(--muted)}
.close-btn{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.relative{position:relative}
.rec-list{list-style:none;padding:0}
.rec-list li{padding:8px 12px;margin-bottom:6px;background:var(--surface2);border-radius:8px;font-size:13px;border-left:3px solid var(--accent)}
.timeline{position:relative;padding-left:20px;border-left:2px solid var(--border)}
.timeline-event{margin-bottom:16px;position:relative}
.timeline-event::before{content:'';position:absolute;left:-25px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.timeline-event .event-date{font-size:11px;color:var(--muted)}
.timeline-event .event-text{font-size:13px;margin-top:2px}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px}
canvas{width:100%!important;height:200px!important}

@media(max-width:768px){
  .chart-grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .detail-panel{width:95%;margin:20px}
  .table-toolbar{flex-direction:column}
  .search-box{width:100%}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1><span>⚡</span>METTLE Churn Predictor</h1>
      <div class="subtitle">Real-time retention risk scoring · Powered by Mercury</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="badge badge-live">Live Scoring</span>
      <span style="color:var(--muted);font-size:12px" id="last-updated"></span>
    </div>
  </header>

  <!-- Summary Cards -->
  <div class="summary-grid" id="summary-cards"></div>

  <!-- Risk Distribution Bar -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Risk Distribution</span>
      <span class="section-badge" id="total-accounts"></span>
    </div>
    <div class="risk-bar-container" id="risk-bar"></div>
    <div class="risk-bar-legend">
      <span><span class="dot" style="background:var(--red)"></span>High Risk</span>
      <span><span class="dot" style="background:var(--orange)"></span>Medium Risk</span>
      <span><span class="dot" style="background:var(--green)"></span>Low Risk</span>
    </div>
  </div>

  <!-- Trend Charts -->
  <div class="chart-grid">
    <div class="chart-card">
      <h3>Monthly Churn Risk Trend</h3>
      <canvas id="trend-chart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Revenue at Risk by Tier</h3>
      <canvas id="revenue-chart"></canvas>
    </div>
  </div>

  <!-- Customer Table -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Customer Risk Scorecard</span>
    </div>
    <div class="table-container">
      <div class="table-toolbar">
        <input type="text" class="search-box" placeholder="Search teams..." id="search-input">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="high">High Risk</button>
          <button class="filter-btn" data-filter="medium">Medium</button>
          <button class="filter-btn" data-filter="low">Low Risk</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th data-sort="name">Team</th>
            <th data-sort="score" class="sorted">Risk Score</th>
            <th data-sort="risk">Risk Level</th>
            <th data-sort="mrr">MRR</th>
            <th>Key Signals</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="customer-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel relative" id="detail-panel">
    <button class="close-btn" id="close-detail">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ─── SYNTHETIC DATA ENGINE ───
const TIERS = ['Starter','Program','Platinum','Enterprise'];
const TIER_MRR = {Starter:149,Program:349,Platinum:549,Enterprise:899};
const TEAM_NAMES = [
  'Saint Andrew\'s Aquatics','Coral Springs Swim Club','Blue Wave Athletics','Mako Racing','Tampa Bay Tidal','Riptide Performance',
  'Golden State Aquatics','Pacific Coast Swim','Iron Fish Swimming','Dolphin Elite','South Florida Surge','Carolina Aqua Force',
  'Lone Star Swim Academy','Mountain View Aquatics','Harbor Lights Swim','Anchor Swim Club','Bayshore Racing','North Shore Fins',
  'Lake Effect Aquatics','Desert Storm Swimming','Cascade Swim Club','Riverdale Aquatics','Summit Performance','Thunderbolt Swim',
  'Phoenix Rising Aquatics','Deep Blue Athletics','Silver Creek Swim','Tidewater Racing','Sunset Swim Club','Coral Reef Aquatics',
  'Emerald City Swim','Prairie Storm Aquatics','Hurricane Swim Club','Neptune\'s Trident','Arctic Fox Swimming'
];

const POSITIVE_SIGNALS = [
  'High login frequency','Active gamification usage','Growing athlete count','Regular competition entries',
  'Coaching staff engaged','Parent portal active','Recent feature adoption','Consistent payment history',
  'Referred another team','Expanded tier recently','High workout completion','Strong retention metrics'
];
const NEGATIVE_SIGNALS = [
  'Login frequency declining','Support tickets increasing','Missed last payment','Athlete count dropping',
  'No feature adoption (60d)','Coach login inactive (30d)','Downgrade inquiry','Competitor evaluation mentioned',
  'Parent complaints rising','Contract renewal approaching','Budget concerns raised','Low engagement score',
  'Seasonal risk (summer)','Key coach departing','Reduced workout uploads'
];

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateCustomers() {
  const rng = seededRandom(42);
  return TEAM_NAMES.map((name, i) => {
    const tierIdx = Math.min(Math.floor(rng() * 4), 3);
    const tier = TIERS[tierIdx];
    const athletes = Math.floor(rng() * 280) + 20;
    const monthsActive = Math.floor(rng() * 36) + 1;

    // Churn score: composite of multiple weighted signals
    const loginDecay = rng();
    const paymentRisk = rng() * 0.3;
    const engagementDrop = rng();
    const supportLoad = rng() * 0.4;
    const contractProximity = rng() * 0.5;
    const rawScore = (loginDecay * 0.3 + paymentRisk * 0.2 + engagementDrop * 0.25 + supportLoad * 0.15 + contractProximity * 0.1);
    const score = Math.round(rawScore * 100);

    const risk = score >= 65 ? 'high' : score >= 35 ? 'medium' : 'low';

    // Pick signals based on risk
    const numNeg = risk === 'high' ? 3 : risk === 'medium' ? 2 : 0;
    const numPos = risk === 'low' ? 3 : risk === 'medium' ? 1 : 0;
    const signals = [];
    const usedNeg = new Set();
    const usedPos = new Set();
    for (let j = 0; j < numNeg; j++) {
      let idx;
      do { idx = Math.floor(rng() * NEGATIVE_SIGNALS.length); } while (usedNeg.has(idx));
      usedNeg.add(idx);
      signals.push({ text: NEGATIVE_SIGNALS[idx], type: 'negative' });
    }
    for (let j = 0; j < numPos; j++) {
      let idx;
      do { idx = Math.floor(rng() * POSITIVE_SIGNALS.length); } while (usedPos.has(idx));
      usedPos.add(idx);
      signals.push({ text: POSITIVE_SIGNALS[idx], type: 'positive' });
    }

    const mrr = TIER_MRR[tier];
    const lastLogin = Math.floor(rng() * 30);
    const nps = risk === 'high' ? Math.floor(rng() * 4) + 1 : risk === 'medium' ? Math.floor(rng() * 3) + 5 : Math.floor(rng() * 2) + 8;

    return {
      id: i,
      name,
      tier,
      athletes,
      monthsActive,
      score,
      risk,
      signals,
      mrr,
      lastLogin,
      nps,
      loginDecay: Math.round(loginDecay * 100),
      paymentRisk: Math.round(paymentRisk / 0.3 * 100),
      engagementDrop: Math.round(engagementDrop * 100),
      supportLoad: Math.round(supportLoad / 0.4 * 100),
      contractProximity: Math.round(contractProximity / 0.5 * 100)
    };
  });
}

const customers = generateCustomers();

// ─── RENDER FUNCTIONS ───
function renderSummary() {
  const high = customers.filter(c => c.risk === 'high');
  const medium = customers.filter(c => c.risk === 'medium');
  const atRiskMRR = high.reduce((s,c) => s + c.mrr, 0) + Math.round(medium.reduce((s,c) => s + c.mrr, 0) * 0.3);
  const avgScore = Math.round(customers.reduce((s,c) => s + c.score, 0) / customers.length);
  const totalMRR = customers.reduce((s,c) => s + c.mrr, 0);

  const cards = [
    { label: 'Total Accounts', value: customers.length, change: '+3 this month', up: false },
    { label: 'High Risk Accounts', value: high.length, change: `${Math.round(high.length/customers.length*100)}% of total`, up: true },
    { label: 'MRR at Risk', value: '$' + atRiskMRR.toLocaleString(), change: `of $${totalMRR.toLocaleString()} total`, up: true },
    { label: 'Avg Risk Score', value: avgScore + '/100', change: 'Lower is better', up: avgScore > 45 },
  ];

  document.getElementById('summary-cards').innerHTML = cards.map(c => `
    <div class="summary-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="change ${c.up ? 'change-up' : 'change-down'}">${c.change}</div>
    </div>
  `).join('');
}

function renderRiskBar() {
  const high = customers.filter(c => c.risk === 'high').length;
  const medium = customers.filter(c => c.risk === 'medium').length;
  const low = customers.filter(c => c.risk === 'low').length;
  const total = customers.length;

  document.getElementById('risk-bar').innerHTML = `
    <div class="risk-bar-segment high" style="width:${high/total*100}%">${high}</div>
    <div class="risk-bar-segment medium" style="width:${medium/total*100}%">${medium}</div>
    <div class="risk-bar-segment low" style="width:${low/total*100}%">${low}</div>
  `;
  document.getElementById('total-accounts').textContent = `${total} accounts scored`;
}

function scoreColor(score) {
  if (score >= 65) return 'var(--red)';
  if (score >= 35) return 'var(--orange)';
  return 'var(--green)';
}

let currentSort = { key: 'score', asc: false };
let currentFilter = 'all';
let searchTerm = '';

function sortedFiltered() {
  let data = [...customers];
  if (currentFilter !== 'all') data = data.filter(c => c.risk === currentFilter);
  if (searchTerm) data = data.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
  data.sort((a, b) => {
    let va = a[currentSort.key], vb = b[currentSort.key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return currentSort.asc ? -1 : 1;
    if (va > vb) return currentSort.asc ? 1 : -1;
    return 0;
  });
  return data;
}

function renderTable() {
  const data = sortedFiltered();
  document.getElementById('customer-table').innerHTML = data.map(c => `
    <tr data-id="${c.id}">
      <td>
        <div class="team-name">${c.name}</div>
        <div class="team-tier">${c.tier} · ${c.athletes} athletes · ${c.monthsActive}mo</div>
      </td>
      <td>
        <span class="score-bar"><span class="score-fill" style="width:${c.score}%;background:${scoreColor(c.score)}"></span></span>
        <strong>${c.score}</strong>
      </td>
      <td><span class="risk-badge risk-${c.risk}">${c.risk.charAt(0).toUpperCase() + c.risk.slice(1)}</span></td>
      <td><strong>$${c.mrr}</strong>/mo</td>
      <td>
        <div class="signal-list">
          ${c.signals.map(s => `<span class="signal-tag ${s.type}">${s.text}</span>`).join('')}
        </div>
      </td>
      <td><button class="action-btn" onclick="openDetail(${c.id})">View</button></td>
    </tr>
  `).join('');
}

// ─── DETAIL PANEL ───
function generateRecommendations(c) {
  const recs = [];
  if (c.risk === 'high') {
    recs.push('Schedule immediate executive check-in call within 48 hours');
    recs.push('Offer complimentary onboarding refresh session for coaching staff');
    if (c.signals.some(s => s.text.includes('payment'))) recs.push('Review billing — offer flexible payment schedule if needed');
    if (c.signals.some(s => s.text.includes('Competitor'))) recs.push('Prepare competitive comparison deck — emphasize unique differentiators');
    recs.push('Assign dedicated success manager for next 90 days');
  } else if (c.risk === 'medium') {
    recs.push('Send personalized check-in email from account manager');
    recs.push('Share recent feature updates and success stories');
    if (c.signals.some(s => s.text.includes('engagement'))) recs.push('Offer gamification workshop to boost athlete engagement');
    recs.push('Schedule quarterly business review');
  } else {
    recs.push('Identify upsell opportunity — explore next tier benefits');
    recs.push('Request testimonial or case study participation');
    recs.push('Invite to beta program for new features');
  }
  return recs;
}

function generateTimeline(c) {
  const events = [];
  const now = new Date(2026, 3, 10);
  events.push({ date: new Date(now - c.lastLogin * 86400000), text: 'Last admin login' });
  if (c.risk === 'high') {
    events.push({ date: new Date(now - 14 * 86400000), text: 'Risk score crossed 65 threshold' });
    events.push({ date: new Date(now - 21 * 86400000), text: 'Support ticket spike detected' });
  }
  events.push({ date: new Date(now - c.monthsActive * 30 * 86400000), text: 'Account created' });
  if (c.signals.some(s => s.text.includes('payment'))) {
    events.push({ date: new Date(now - 7 * 86400000), text: 'Payment failed — retrying' });
  }
  events.sort((a, b) => b.date - a.date);
  return events;
}

function openDetail(id) {
  const c = customers.find(x => x.id === id);
  if (!c) return;
  const recs = generateRecommendations(c);
  const timeline = generateTimeline(c);

  document.getElementById('detail-content').innerHTML = `
    <h2>${c.name}</h2>
    <div class="meta">${c.tier} Tier · ${c.athletes} athletes · ${c.monthsActive} months active · NPS: ${c.nps}/10</div>

    <div class="detail-section">
      <h3>Risk Score Breakdown</h3>
      <div class="metric-row"><span class="metric-label">Overall Risk Score</span><span><strong style="color:${scoreColor(c.score)}">${c.score}/100</strong></span></div>
      <div class="metric-row"><span class="metric-label">Login Frequency Decay (30%)</span><span>${c.loginDecay}/100</span></div>
      <div class="metric-row"><span class="metric-label">Payment Risk (20%)</span><span>${c.paymentRisk}/100</span></div>
      <div class="metric-row"><span class="metric-label">Engagement Drop (25%)</span><span>${c.engagementDrop}/100</span></div>
      <div class="metric-row"><span class="metric-label">Support Load (15%)</span><span>${c.supportLoad}/100</span></div>
      <div class="metric-row"><span class="metric-label">Contract Proximity (10%)</span><span>${c.contractProximity}/100</span></div>
      <div class="metric-row"><span class="metric-label">Last Login</span><span>${c.lastLogin === 0 ? 'Today' : c.lastLogin + ' days ago'}</span></div>
      <div class="metric-row"><span class="metric-label">Monthly Revenue</span><span>$${c.mrr}/mo ($${(c.mrr*12).toLocaleString()}/yr)</span></div>
    </div>

    <div class="detail-section">
      <h3>Retention Playbook</h3>
      <ul class="rec-list">
        ${recs.map(r => `<li>${r}</li>`).join('')}
      </ul>
    </div>

    <div class="detail-section">
      <h3>Account Timeline</h3>
      <div class="timeline">
        ${timeline.map(e => `
          <div class="timeline-event">
            <div class="event-date">${e.date.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}</div>
            <div class="event-text">${e.text}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail-overlay').classList.remove('open');
});
document.getElementById('detail-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ─── CHARTS (Canvas-based, no dependencies) ───
function drawTrendChart() {
  const canvas = document.getElementById('trend-chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = 200;
  const pad = { top: 20, right: 20, bottom: 30, left: 40 };

  // Synthetic monthly data
  const months = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
  const highData = [4, 5, 6, 5, 7, 8, customers.filter(c=>c.risk==='high').length];
  const medData = [10, 9, 11, 12, 11, 13, customers.filter(c=>c.risk==='medium').length];
  const maxVal = Math.max(...highData, ...medData) + 2;

  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  ctx.fillStyle = '#8888a0';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  months.forEach((m, i) => {
    const x = pad.left + (i / (months.length - 1)) * plotW;
    ctx.fillText(m, x, h - 8);
  });

  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * plotH;
    const val = Math.round(maxVal - (i / 4) * maxVal);
    ctx.fillText(val, pad.left - 8, y + 4);
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
  }

  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = pad.left + (i / (data.length - 1)) * plotW;
      const y = pad.top + (1 - v / maxVal) * plotH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots
    data.forEach((v, i) => {
      const x = pad.left + (i / (data.length - 1)) * plotW;
      const y = pad.top + (1 - v / maxVal) * plotH;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  drawLine(highData, '#ef4444');
  drawLine(medData, '#f59e0b');
}

function drawRevenueChart() {
  const canvas = document.getElementById('revenue-chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = 200;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };

  const tiers = TIERS;
  const tierRisk = tiers.map(t => {
    const tierCustomers = customers.filter(c => c.tier === t);
    const highMRR = tierCustomers.filter(c => c.risk === 'high').reduce((s,c) => s + c.mrr, 0);
    const medMRR = tierCustomers.filter(c => c.risk === 'medium').reduce((s,c) => s + c.mrr, 0);
    const safeMRR = tierCustomers.filter(c => c.risk === 'low').reduce((s,c) => s + c.mrr, 0);
    return { tier: t, high: highMRR, medium: medMRR, safe: safeMRR, total: highMRR + medMRR + safeMRR };
  });

  const maxVal = Math.max(...tierRisk.map(t => t.total)) * 1.15;
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;
  const barW = plotW / tiers.length * 0.6;
  const gap = plotW / tiers.length;

  // Y-axis
  ctx.fillStyle = '#8888a0';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * plotH;
    const val = Math.round(maxVal - (i / 4) * maxVal);
    ctx.fillText('$' + val.toLocaleString(), pad.left - 8, y + 4);
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
  }

  tierRisk.forEach((t, i) => {
    const x = pad.left + i * gap + (gap - barW) / 2;

    // Stacked bar: safe (bottom), medium, high (top)
    const segments = [
      { val: t.safe, color: '#22c55e' },
      { val: t.medium, color: '#f59e0b' },
      { val: t.high, color: '#ef4444' },
    ];

    let yPos = pad.top + plotH;
    segments.forEach(seg => {
      const segH = (seg.val / maxVal) * plotH;
      ctx.fillStyle = seg.color;
      ctx.beginPath();
      ctx.roundRect(x, yPos - segH, barW, segH, [0,0,0,0]);
      ctx.fill();
      yPos -= segH;
    });

    ctx.fillStyle = '#8888a0';
    ctx.textAlign = 'center';
    ctx.fillText(t.tier, x + barW / 2, h - 8);
  });
}

// ─── EVENT HANDLERS ───
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

document.getElementById('search-input').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderTable();
});

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (currentSort.key === key) {
      currentSort.asc = !currentSort.asc;
    } else {
      currentSort = { key, asc: true };
    }
    document.querySelectorAll('thead th').forEach(t => { t.classList.remove('sorted','asc'); });
    th.classList.add('sorted');
    if (currentSort.asc) th.classList.add('asc');
    renderTable();
  });
});

// ─── INIT ───
document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
renderSummary();
renderRiskBar();
renderTable();
setTimeout(() => { drawTrendChart(); drawRevenueChart(); }, 100);
window.addEventListener('resize', () => { drawTrendChart(); drawRevenueChart(); });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercury Velocity Engine — Sales Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#6C2BD9;--scarlet:#E63946;--gold:#F5A623;--dark:#0A0A14;--card:#12121F;--card-hover:#1A1A2E;--text:#E8E8F0;--muted:#7878AA;--green:#22C55E;--border:#222240}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:960px;margin:0 auto;padding:24px 20px}

/* Header */
.header{padding:48px 0 40px;text-align:center;border-bottom:1px solid var(--border)}
.header .badge{display:inline-block;background:rgba(108,43,217,.15);color:var(--purple);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:6px 14px;border-radius:20px;margin-bottom:16px}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--scarlet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:.95rem;margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto}

/* Stats */
.stats{display:grid;grid-template-columns: 1fr;gap:12px;margin-top:32px}
@media(max-width:640px){.stats{grid-template-columns: 1fr}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center}
.stat .num{font-size:1.8rem;font-weight:800;color:var(--gold)}
.stat .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Section */
.section{margin-top:40px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-header h2{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.section-header h2 span{font-size:1.2rem}

/* Signal Cards */
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .2s}
.signal-card:hover{border-color:var(--purple)}
.signal-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.signal-company{font-weight:700;font-size:1rem}
.signal-tag{display:inline-block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:20px}
.tag-funding{background:rgba(34,197,94,.12);color:var(--green)}
.tag-hire{background:rgba(245,166,35,.12);color:var(--gold)}
.tag-dtc{background:rgba(108,43,217,.12);color:var(--purple)}
.signal-meta{color:var(--muted);font-size:.85rem;margin-top:6px}
.signal-amount{font-weight:700;color:var(--green);font-size:.95rem}

/* Deck Cards */
.deck-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.deck-card:hover{border-color:var(--scarlet);transform:translateY(-1px)}
.deck-name{font-weight:700;font-size:1rem}
.deck-preview{color:var(--muted);font-size:.85rem;margin-top:6px}
.deck-colors{display:flex;gap:6px;margin-top:10px}
.color-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border)}

/* Input Section */
.input-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:40px}
.input-section h3{font-size:1rem;font-weight:700;margin-bottom:12px}
.input-row{display:flex;gap:12px}
@media(max-width:640px){.input-row{flex-direction:column}}
.input-row input{flex:1;background:var(--dark);border:2px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--purple)}
.input-row input::placeholder{color:var(--muted)}
.btn{padding:12px 28px;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--scarlet));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-sm{padding:8px 18px;font-size:.8rem;border-radius:6px}

/* Deck Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center;padding:24px}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:1.2rem;font-weight:800;margin-bottom:16px}
.modal pre{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:.85rem;overflow-x:auto;white-space:pre-wrap;line-height:1.7}
.modal .close-btn{margin-top:16px}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="badge">Mercury Sales Intelligence</div>
  <h1>Velocity Engine</h1>
  <p>Monitor funding rounds, exec hires, and DTC signals. Auto-generate pitch decks from any URL.</p>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="stat-signals">0</div><div class="label">Signals</div></div>
  <div class="stat"><div class="num" id="stat-decks">0</div><div class="label">Decks</div></div>
  <div class="stat"><div class="num" id="stat-value">$0</div><div class="label">Pipeline Value</div></div>
  <div class="stat"><div class="num" id="stat-filter">&gt;$10M</div><div class="label">Min. Round</div></div>
</div>

<div class="section">
  <div class="section-header">
    <h2><span>&#x1F4E1;</span> High-Value Signals</h2>
  </div>
  <div id="signals-list"></div>
</div>

<div class="section">
  <div class="section-header">
    <h2><span>&#x1F3A8;</span> Generated Decks</h2>
  </div>
  <div id="decks-list"></div>
</div>

<div class="input-section">
  <h3>Generate Deck from URL</h3>
  <div class="input-row">
    <input type="text" id="url-input" placeholder="Enter company URL (e.g., vuoriclothing.com)" />
    <button class="btn btn-primary" onclick="generateDeck()">Generate</button>
  </div>
</div>

</div>

<div class="modal-overlay" id="deck-modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <pre id="modal-content"></pre>
    <button class="btn btn-primary close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// Sample signals (populated by signal_watcher.py output)
const SIGNALS = [
  {company:"Rhode Skin",signal:"DTC",funding:null,funding_usd:null,key_person:null,title:"Rhode Skin — skincare essentials by Hailey Bieber",link:"https://rhodeskin.com",source:"Manual",detected_at:"2026-03-01T02:40:00"},
  {company:"Vuori Clothing",signal:"DTC, Series A",funding:"$400 million",funding_usd:400000000,key_person:null,title:"Vuori raises $400M to fuel global expansion",link:"https://vuoriclothing.com",source:"TechCrunch",detected_at:"2026-03-01T02:45:00"},
  {company:"Liquid Death",signal:"DTC",funding:"$67 million",funding_usd:67000000,key_person:null,title:"Liquid Death continues murderous growth",link:"https://liquiddeath.com",source:"Manual",detected_at:"2026-03-01T03:00:00"},
  {company:"Cuts Clothing",signal:"DTC, Head of Brand",funding:null,funding_usd:null,key_person:"Marcus Chen",title:"Cuts Clothing hires Marcus Chen as Head of Brand",link:"https://cutsclothing.com",source:"PRNewswire",detected_at:"2026-03-01T03:10:00"},
  {company:"On Running",signal:"DTC, Series A",funding:"$110 million",funding_usd:110000000,key_person:null,title:"On Running raises $110M for North American expansion",link:"https://on-running.com",source:"TechCrunch",detected_at:"2026-03-01T03:20:00"},
];

const DECKS = [
  {name:"Rhode Skin",colors:["#272d45","#676986","#f4f4f6"],adjective:"essential",generated:"2026-03-01",outline:"============================================================\n  DECK OUTLINE  —  RHODESKIN\n============================================================\n\nBrand Vibe     : Rhode Skin — skincare essentials by Hailey Rhode Bieber\nMeta Desc      : Designed to nourish your skin barrier...\nPrimary Colors : #272d45, #676986, #f4f4f6\n\n------------------------------------------------------------\n\nSLIDE 1 — TITLE\n  The Rhode Skin Canon\n\nSLIDE 2 — THE PROBLEM\n  Your brand feels essential.\n  Your competitors feel the same.\n\nSLIDE 3 — THE SOLUTION\n  Ramiche Studio 48h Sprint\n  → Strategy, identity, and launch assets delivered in 48 hours.\n\nSLIDE 4 — THE VISION\n  Turn Rhode Skin into a religion.\n\n------------------------------------------------------------\n  Generated by Velocity Engine  |  Mercury"},
  {name:"Vuori Clothing",colors:["#1a3c34","#d4a574","#f0ebe3"],adjective:"comfortable",generated:"2026-03-01",outline:"============================================================\n  DECK OUTLINE  —  VUORI\n============================================================\n\nBrand Vibe     : Vuori — Investment in Happiness\nMeta Desc      : Performance apparel inspired by the active California lifestyle...\nPrimary Colors : #1a3c34, #d4a574, #f0ebe3\n\n------------------------------------------------------------\n\nSLIDE 1 — TITLE\n  The Vuori Canon\n\nSLIDE 2 — THE PROBLEM\n  Your brand feels comfortable.\n  Your competitors feel the same.\n\nSLIDE 3 — THE SOLUTION\n  Ramiche Studio 48h Sprint\n  → Strategy, identity, and launch assets delivered in 48 hours.\n\nSLIDE 4 — THE VISION\n  Turn Vuori into a religion.\n\n------------------------------------------------------------\n  Generated by Velocity Engine  |  Mercury"},
];

function init(){
  document.getElementById('stat-signals').textContent=SIGNALS.length;
  document.getElementById('stat-decks').textContent=DECKS.length;
  const totalVal=SIGNALS.reduce((s,x)=>s+(x.funding_usd||0),0);
  document.getElementById('stat-value').textContent='$'+(totalVal/1e6).toFixed(0)+'M';
  renderSignals();
  renderDecks();
}

function renderSignals(){
  const el=document.getElementById('signals-list');
  if(!SIGNALS.length){el.innerHTML='<div class="empty">No signals captured yet. Run signal_watcher.py to scan feeds.</div>';return}
  el.innerHTML=SIGNALS.map(s=>{
    let tagClass='tag-dtc', tagText=s.signal;
    if(s.funding_usd)tagClass='tag-funding';
    else if(s.key_person)tagClass='tag-hire';
    const amount=s.funding?`<span class="signal-amount">${s.funding}</span>`:'';
    const person=s.key_person?` · ${s.key_person}`:'';
    return `<div class="signal-card">
      <div class="signal-row">
        <div><div class="signal-company">${s.company}</div>
        <div class="signal-meta">${s.source} · ${s.detected_at.split('T')[0]}${person}</div></div>
        <div style="text-align:right"><span class="signal-tag ${tagClass}">${tagText}</span>
        <div style="margin-top:6px">${amount}</div></div>
      </div>
    </div>`}).join('');
}

function renderDecks(){
  const el=document.getElementById('decks-list');
  if(!DECKS.length){el.innerHTML='<div class="empty">No decks generated yet. Enter a URL below.</div>';return}
  el.innerHTML=DECKS.map((d,i)=>`<div class="deck-card" onclick="showDeck(${i})">
    <div class="signal-row">
      <div><div class="deck-name">${d.name}</div>
      <div class="deck-preview">Brand adjective: ${d.adjective} · Generated ${d.generated}</div>
      <div class="deck-colors">${d.colors.map(c=>`<div class="color-dot" style="background:${c}"></div>`).join('')}</div></div>
      <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();showDeck(${i})">View</button>
    </div>
  </div>`).join('');
}

function showDeck(i){
  const d=DECKS[i];
  document.getElementById('modal-title').textContent=d.name+' — Pitch Deck Outline';
  document.getElementById('modal-content').textContent=d.outline;
  document.getElementById('deck-modal').classList.add('active');
}

function closeModal(){document.getElementById('deck-modal').classList.remove('active')}

function generateDeck(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){alert('Enter a company URL');return}
  const name=url.replace(/https?:\/\//,'').replace(/www\./,'').split('.')[0];
  const capName=name.charAt(0).toUpperCase()+name.slice(1);
  const newDeck={name:capName,colors:['#333','#666','#999'],adjective:'unique',generated:new Date().toISOString().split('T')[0],
    outline:`============================================================\n  DECK OUTLINE  —  ${capName.toUpperCase()}\n============================================================\n\nBrand Vibe     : ${capName}\nPrimary Colors : #333, #666, #999\n\n------------------------------------------------------------\n\nSLIDE 1 — TITLE\n  The ${capName} Canon\n\nSLIDE 2 — THE PROBLEM\n  Your brand feels unique.\n  Your competitors feel the same.\n\nSLIDE 3 — THE SOLUTION\n  Ramiche Studio 48h Sprint\n  → Strategy, identity, and launch assets in 48 hours.\n\nSLIDE 4 — THE VISION\n  Turn ${capName} into a religion.\n\n------------------------------------------------------------\n  Generated by Velocity Engine  |  Mercury`};
  DECKS.push(newDeck);
  document.getElementById('stat-decks').textContent=DECKS.length;
  renderDecks();
  document.getElementById('url-input').value='';
}

document.getElementById('deck-modal').addEventListener('click',e=>{if(e.target===document.getElementById('deck-modal'))closeModal()});
init();
</script>
</body>
</html>

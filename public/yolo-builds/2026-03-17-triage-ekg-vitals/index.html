<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE EKG — OpenClaw Ecosystem Vitals</title>
<style>
  :root {
    --bg: #050508;
    --card: #0a0d14;
    --border: #141924;
    --ekg-green: #00ff88;
    --ekg-dim: #00ff8825;
    --pulse-red: #ff3366;
    --pulse-dim: #ff336625;
    --warn: #ffaa00;
    --warn-dim: #ffaa0025;
    --text: #c8d0dc;
    --muted: #4a5568;
    --accent: #00d4ff;
    --accent-dim: #00d4ff20;
    --grid: #0d1117;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ═══ SCANLINE OVERLAY ═══ */
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
    );
    pointer-events: none; z-index: 9999;
  }

  /* ═══ GRID BACKGROUND ═══ */
  .grid-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1440px; margin: 0 auto; padding: 20px;
  }

  /* ═══ HEADER ═══ */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-pulse {
    width: 44px; height: 44px; border-radius: 50%;
    border: 2px solid var(--ekg-green);
    display: flex; align-items: center; justify-content: center;
    animation: logoPulse 2s ease-in-out infinite;
    position: relative;
  }
  .logo-pulse::after {
    content: '';
    position: absolute; width: 100%; height: 100%; border-radius: 50%;
    border: 1px solid var(--ekg-green);
    animation: logoRing 2s ease-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 8px var(--ekg-dim); }
    50% { box-shadow: 0 0 24px var(--ekg-dim), 0 0 48px rgba(0,255,136,0.1); }
  }
  @keyframes logoRing {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .logo-pulse svg { width: 22px; height: 22px; }
  .title { font-size: 18px; font-weight: 700; letter-spacing: 0.15em; color: var(--ekg-green); }
  .subtitle { font-size: 9px; letter-spacing: 0.3em; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ekg-green);
    animation: liveBlink 1.5s ease-in-out infinite;
  }
  @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .timestamp { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

  /* ═══ ECOSYSTEM PULSE — main EKG line ═══ */
  .ekg-strip {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; position: relative; overflow: hidden;
  }
  .ekg-strip-label {
    position: absolute; top: 12px; left: 16px; font-size: 9px;
    letter-spacing: 0.25em; color: var(--ekg-green); opacity: 0.7;
  }
  .ekg-strip-bpm {
    position: absolute; top: 8px; right: 16px; font-size: 28px;
    font-weight: 700; color: var(--ekg-green);
    text-shadow: 0 0 20px var(--ekg-dim);
  }
  .ekg-strip-bpm span { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; }
  #ekgCanvas { width: 100%; height: 120px; display: block; }

  /* ═══ VITALS ROW ═══ */
  .vitals-row {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  .vital-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; position: relative; overflow: hidden;
  }
  .vital-card::before {
    content: '';
    position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    border-radius: 3px 0 0 3px;
  }
  .vital-label { font-size: 8px; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 6px; }
  .vital-value { font-size: 22px; font-weight: 700; line-height: 1; }
  .vital-unit { font-size: 9px; color: var(--muted); margin-top: 4px; }
  .vital-spark { position: absolute; bottom: 8px; right: 12px; opacity: 0.4; }

  /* ═══ AGENT GRID ═══ */
  .agent-section-title {
    font-size: 10px; letter-spacing: 0.3em; color: var(--ekg-green); opacity: 0.6;
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .agent-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .agent-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; position: relative; overflow: hidden;
    transition: all 0.3s ease; cursor: default;
  }
  .agent-card:hover {
    border-color: var(--ekg-green);
    box-shadow: 0 0 20px var(--ekg-dim);
    transform: translateY(-1px);
  }
  .agent-card.critical { border-color: var(--pulse-red); }
  .agent-card.critical:hover { box-shadow: 0 0 20px var(--pulse-dim); }
  .agent-card.warning { border-color: var(--warn); }
  .agent-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .agent-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; }
  .agent-status {
    width: 7px; height: 7px; border-radius: 50%;
    animation: liveBlink 2s ease-in-out infinite;
  }
  .agent-role { font-size: 8px; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 10px; }
  .agent-mini-ekg { height: 28px; width: 100%; opacity: 0.8; }
  .agent-stats {
    display: flex; gap: 12px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .agent-stat { font-size: 9px; color: var(--muted); }
  .agent-stat strong { color: var(--text); font-weight: 600; }

  /* ═══ BOTTOM: TOKEN FLOW + COST BURN ═══ */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; position: relative;
  }
  .panel-title {
    font-size: 9px; letter-spacing: 0.25em; color: var(--accent); opacity: 0.7;
    margin-bottom: 14px;
  }
  #tokenFlowCanvas, #costBurnCanvas { width: 100%; height: 160px; display: block; }

  /* ═══ FOOTER ═══ */
  .footer {
    text-align: center; padding: 16px 0; border-top: 1px solid var(--border);
    font-size: 8px; letter-spacing: 0.3em; color: var(--muted);
  }
  .footer a { color: var(--ekg-green); text-decoration: none; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 1024px) {
    .vitals-row { grid-template-columns: repeat(3, 1fr); }
    .bottom-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .vitals-row { grid-template-columns: repeat(2, 1fr); }
    .agent-grid { grid-template-columns: 1fr 1fr; }
    .ekg-strip-bpm { font-size: 22px; }
  }
  @media (max-width: 480px) {
    .vitals-row { grid-template-columns: 1fr; }
    .agent-grid { grid-template-columns: 1fr; }
  }
</style>

// ─── EKG Canvas Drawing ───
function drawEKG(canvas, color, speed, amplitude, noiseLevel) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  let offset = 0;
  const ekgData = [];
  const dataLen = Math.ceil(w / 2);

  // Generate EKG-like waveform
  function generateEKGPoint(t) {
    const cycle = t % 1;
    let val = 0;
    // P wave
    if (cycle > 0.0 && cycle < 0.08) val = Math.sin((cycle / 0.08) * Math.PI) * 0.15;
    // QRS complex
    else if (cycle > 0.12 && cycle < 0.14) val = -0.15;
    else if (cycle > 0.14 && cycle < 0.18) val = 1.0;
    else if (cycle > 0.18 && cycle < 0.22) val = -0.3;
    // T wave
    else if (cycle > 0.28 && cycle < 0.42) val = Math.sin(((cycle - 0.28) / 0.14) * Math.PI) * 0.25;
    // Add noise
    val += (Math.random() - 0.5) * noiseLevel;
    return val;
  }

  for (let i = 0; i < dataLen; i++) {
    ekgData.push(generateEKGPoint(i / dataLen * 3));
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = "rgba(0,255,136,0.04)";
    ctx.lineWidth = 0.5;
    for (let y = 0; y < h; y += 20) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    for (let x = 0; x < w; x += 20) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }

    // EKG line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.8;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;

    const mid = h / 2;
    for (let i = 0; i < dataLen; i++) {
      const idx = (i + offset) % dataLen;
      const x = (i / dataLen) * w;
      const y = mid - ekgData[idx] * amplitude * (h * 0.4);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Trailing glow fade
    const gradient = ctx.createLinearGradient(0, 0, w, 0);
    gradient.addColorStop(0, "rgba(5,5,8,0.95)");
    gradient.addColorStop(0.15, "rgba(5,5,8,0)");
    gradient.addColorStop(1, "rgba(5,5,8,0)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    // Scan line
    const scanX = ((offset * 2) % w);
    ctx.beginPath();
    ctx.strokeStyle = color + "40";
    ctx.lineWidth = 2;
    ctx.moveTo(scanX, 0);
    ctx.lineTo(scanX, h);
    ctx.stroke();

    offset += speed;
    if (offset >= dataLen) offset = 0;

    // Shift in new data point
    ekgData.push(generateEKGPoint((offset + dataLen) / dataLen * 3));
    ekgData.shift();
  }

  return draw;
}

// ─── Initialize main EKG ───
const mainEKG = drawEKG(document.getElementById("ekgCanvas"), "#00ff88", 1.5, 1.0, 0.02);

// ─── Initialize mini EKGs for each agent ───
const miniDraws = [];
document.querySelectorAll(".agent-mini-ekg").forEach(canvas => {
  const color = canvas.dataset.color;
  const health = parseInt(canvas.dataset.health);
  const noise = health > 70 ? 0.02 : health > 40 ? 0.06 : 0.12;
  const amp = health > 70 ? 0.8 : health > 40 ? 0.5 : 0.3;
  miniDraws.push(drawEKG(canvas, color, 0.8 + Math.random() * 0.4, amp, noise));
});

// ─── BPM Counter ───
let bpm = 72;
let bpmDir = 1;
function updateBPM() {
  bpm += (Math.random() - 0.48) * 2;
  bpm = Math.max(58, Math.min(96, bpm));
  document.getElementById("bpmDisplay").innerHTML = `${Math.round(bpm)} <span>EPM</span>`;
}
setInterval(updateBPM, 2000);

// ─── Token Flow Chart ───
function drawTokenFlow(canvas) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  // 24 hours of simulated throughput
  const hours = 24;
  const data = [];
  for (let i = 0; i < hours; i++) {
    // Higher activity during work hours, spikes at night (YOLO builds)
    let base;
    if (i >= 0 && i <= 4) base = 18 + Math.random() * 8; // YOLO build time
    else if (i >= 9 && i <= 17) base = 12 + Math.random() * 6; // Work hours
    else base = 4 + Math.random() * 4; // Quiet
    data.push(base);
  }
  const max = Math.max(...data);

  // Grid
  ctx.strokeStyle = "rgba(0,212,255,0.06)";
  ctx.lineWidth = 0.5;
  for (let y = 0; y < h; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // Bars
  const barW = (w - 40) / hours;
  data.forEach((val, i) => {
    const barH = (val / max) * (h - 30);
    const x = 20 + i * barW;
    const y = h - 10 - barH;
    const gradient = ctx.createLinearGradient(x, y, x, h - 10);
    gradient.addColorStop(0, "#00d4ff");
    gradient.addColorStop(1, "#00d4ff15");
    ctx.fillStyle = gradient;
    ctx.fillRect(x + 1, y, barW - 2, barH);

    // Hour label
    if (i % 4 === 0) {
      ctx.fillStyle = "#4a5568";
      ctx.font = "8px monospace";
      ctx.textAlign = "center";
      ctx.fillText(`${String(i).padStart(2, "0")}:00`, x + barW / 2, h - 1);
    }
  });

  // Peak annotation
  const peakIdx = data.indexOf(max);
  const peakX = 20 + peakIdx * barW + barW / 2;
  ctx.fillStyle = "#00d4ff";
  ctx.font = "bold 9px monospace";
  ctx.textAlign = "center";
  ctx.fillText(`▲ ${max.toFixed(1)}M`, peakX, 14);
}

// ─── Cost Burn Chart ───
function drawCostBurn(canvas) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  // Top 8 spenders
  const spenders = AGENTS.slice().sort((a, b) => b.cost - a.cost).slice(0, 8);
  const maxCost = spenders[0].cost;
  const barH = (h - 20) / spenders.length;

  spenders.forEach((agent, i) => {
    const y = 10 + i * barH;
    const barW = (agent.cost / maxCost) * (w - 120);
    const color = TIER_COLORS[agent.tier];

    // Bar
    const gradient = ctx.createLinearGradient(80, y, 80 + barW, y);
    gradient.addColorStop(0, color);
    gradient.addColorStop(1, color + "30");
    ctx.fillStyle = gradient;
    ctx.fillRect(80, y + 2, barW, barH - 6);

    // Agent name
    ctx.fillStyle = color;
    ctx.font = "bold 9px monospace";
    ctx.textAlign = "right";
    ctx.fillText(agent.name, 74, y + barH / 2 + 3);

    // Cost label
    ctx.fillStyle = "#c8d0dc";
    ctx.font = "9px monospace";
    ctx.textAlign = "left";
    ctx.fillText(`$${agent.cost.toFixed(2)}`, 84 + barW, y + barH / 2 + 3);
  });
}

// ─── Animation Loop ───
let frame = 0;
function animate() {
  mainEKG();
  if (frame % 2 === 0) { // Mini EKGs at half rate for performance
    miniDraws.forEach(draw => draw());
  }
  frame++;
  requestAnimationFrame(animate);
}

// ─── Init ───
window.addEventListener("load", () => {
  animate();
  drawTokenFlow(document.getElementById("tokenFlowCanvas"));
  drawCostBurn(document.getElementById("costBurnCanvas"));
});

window.addEventListener("resize", () => {
  drawTokenFlow(document.getElementById("tokenFlowCanvas"));
  drawCostBurn(document.getElementById("costBurnCanvas"));
});
</script>

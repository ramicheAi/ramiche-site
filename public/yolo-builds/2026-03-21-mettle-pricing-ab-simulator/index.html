<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE // Pricing A/B Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a12;--surface:#12121e;--border:#2a2a3e;
--purple:#7c3aed;--scarlet:#ef4444;--gold:#f59e0b;--blue:#3b82f6;--green:#10b981;
--text:#e2e8f0;--muted:#94a3b8;--dim:#475569;
}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
h1{font-size:1.4rem;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--muted);font-size:.75rem;margin-bottom:24px}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.control-group input,.control-group select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:.8rem;width:160px}
.control-group input:focus,.control-group select:focus{outline:none;border-color:var(--purple)}
.ab-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.ab-container{grid-template-columns:1fr}}
.panel{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:20px;position:relative;transition:border-color .3s}
.panel.winner{border-color:var(--green)}
.panel-label{position:absolute;top:-10px;left:16px;background:var(--surface);padding:0 8px;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.panel-label.a{color:var(--purple)}
.panel-label.b{color:var(--blue)}
.strategy-name{font-size:1.1rem;font-weight:700;margin:8px 0 4px}
.strategy-desc{font-size:.72rem;color:var(--muted);margin-bottom:16px;line-height:1.5}
.price-display{text-align:center;padding:20px;background:var(--bg);border-radius:8px;margin-bottom:16px}
.price-main{font-size:2.2rem;font-weight:800;color:var(--gold)}
.price-sub{font-size:.7rem;color:var(--muted);margin-top:4px}
.price-anchor{font-size:.85rem;color:var(--dim);text-decoration:line-through;margin-bottom:4px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.metric{background:var(--bg);padding:10px;border-radius:6px;text-align:center}
.metric-value{font-size:1.2rem;font-weight:700}
.metric-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.metric-value.green{color:var(--green)}
.metric-value.purple{color:var(--purple)}
.metric-value.gold{color:var(--gold)}
.metric-value.blue{color:var(--blue)}
.metric-value.scarlet{color:var(--scarlet)}
.psychology{margin-top:12px}
.psychology h3{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.psych-tag{display:inline-block;padding:3px 8px;border-radius:12px;font-size:.65rem;margin:2px;border:1px solid var(--border)}
.psych-tag.positive{border-color:var(--green);color:var(--green)}
.psych-tag.negative{border-color:var(--scarlet);color:var(--scarlet)}
.psych-tag.neutral{border-color:var(--gold);color:var(--gold)}
.revenue-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.revenue-section h2{font-size:.85rem;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.rev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:700px){.rev-grid{grid-template-columns:1fr 1fr}}
.rev-card{background:var(--bg);padding:14px;border-radius:8px;text-align:center}
.rev-card .label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.rev-card .val{font-size:1.3rem;font-weight:700;margin:6px 0}
.rev-card .sub{font-size:.65rem;color:var(--dim)}
.bar-compare{margin-top:20px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:60px;font-size:.7rem;color:var(--muted);text-align:right}
.bar-track{flex:1;height:24px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:.65rem;font-weight:600}
.bar-fill.a{background:linear-gradient(90deg,var(--purple),#9333ea)}
.bar-fill.b{background:linear-gradient(90deg,var(--blue),#2563eb)}
.winner-badge{display:inline-block;padding:4px 12px;background:var(--green);color:#000;font-size:.7rem;font-weight:700;border-radius:12px;text-transform:uppercase;letter-spacing:1px}
.verdict{text-align:center;padding:20px;background:var(--surface);border:2px solid var(--green);border-radius:12px;margin-bottom:24px}
.verdict h2{color:var(--green);font-size:1rem;margin-bottom:8px}
.verdict p{font-size:.8rem;color:var(--muted);line-height:1.6;max-width:600px;margin:0 auto}
.objection-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.objection-section h2{font-size:.85rem;color:var(--purple);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.objection{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px}
.objection .q{font-size:.75rem;color:var(--scarlet);font-weight:600;margin-bottom:4px}
.objection .handle-a,.objection .handle-b{font-size:.7rem;color:var(--muted);line-height:1.5;margin-top:4px}
.objection .handle-a span{color:var(--purple);font-weight:600}
.objection .handle-b span{color:var(--blue);font-weight:600}
.footer{text-align:center;padding:20px;color:var(--dim);font-size:.6rem;letter-spacing:1px}
</style>
</head>
<body>

<h1>METTLE // PRICING A/B SIMULATOR</h1>
<p class="subtitle">Test pricing psychology before going live. Compare frames. Project revenue. Close smarter.</p>

<div class="controls">
  <div class="control-group">
    <label>Team Size (athletes)</label>
    <input type="number" id="teamSize" value="120" min="10" max="1000">
  </div>
  <div class="control-group">
    <label>Strategy A</label>
    <select id="stratA">
      <option value="anchor">Anchor High</option>
      <option value="perAthlete">Per-Athlete</option>
      <option value="valueStack">Value Stack</option>
      <option value="flatRate">Flat Rate</option>
      <option value="freemium">Freemium + Upsell</option>
      <option value="competitor">Competitor Undercut</option>
    </select>
  </div>
  <div class="control-group">
    <label>Strategy B</label>
    <select id="stratB">
      <option value="valueStack" selected>Value Stack</option>
      <option value="anchor">Anchor High</option>
      <option value="perAthlete">Per-Athlete</option>
      <option value="flatRate">Flat Rate</option>
      <option value="freemium">Freemium + Upsell</option>
      <option value="competitor">Competitor Undercut</option>
    </select>
  </div>
  <div class="control-group">
    <label>Tier</label>
    <select id="tier">
      <option value="starter">Starter ($149/mo)</option>
      <option value="program" selected>Program ($349/mo)</option>
      <option value="elite">Elite ($549/mo)</option>
      <option value="enterprise">Enterprise ($899/mo)</option>
    </select>
  </div>
  <div class="control-group">
    <label>Monthly Dues/Athlete</label>
    <input type="number" id="duesPerAthlete" value="125" min="50" max="500">
  </div>
</div>

<div class="ab-container">
  <div class="panel" id="panelA">
    <div class="panel-label a">VARIANT A</div>
    <div id="contentA"></div>
  </div>
  <div class="panel" id="panelB">
    <div class="panel-label b">VARIANT B</div>
    <div id="contentB"></div>
  </div>
</div>

<div class="verdict" id="verdict"></div>

<div class="revenue-section">
  <h2>12-Month Revenue Projection</h2>
  <div class="rev-grid" id="revGrid"></div>
  <div class="bar-compare" id="barCompare"></div>
</div>

<div class="objection-section">
  <h2>Objection Handling by Strategy</h2>
  <div id="objections"></div>
</div>

<p class="footer">METTLE PRICING A/B SIMULATOR — MERCURY SALES INTELLIGENCE — PARALLAX VENTURES 2026</p>

<script>
const TIERS = {
  starter: { base: 149, label: 'Starter' },
  program: { base: 349, label: 'Program' },
  elite: { base: 549, label: 'Elite' },
  enterprise: { base: 899, label: 'Enterprise' }
};

const STRATEGIES = {
  anchor: {
    name: 'Anchor High',
    desc: 'Show premium price first, then reveal the actual tier price as a "deal." Anchoring bias makes the real price feel like a steal.',
    getDisplay: (base, teamSize, dues) => {
      const anchor = Math.round(base * 2.2);
      return {
        anchor: `$${anchor}/mo`,
        price: `$${base}/mo`,
        sub: `Save $${anchor - base}/mo — limited beta pricing`,
        perAthlete: (base / teamSize).toFixed(2)
      };
    },
    closeRate: 0.32,
    psychology: [
      { tag: 'Anchoring Bias', type: 'positive' },
      { tag: 'Scarcity Frame', type: 'positive' },
      { tag: 'Discount Dependency', type: 'negative' },
      { tag: 'Price Skepticism Risk', type: 'negative' }
    ],
    churnRisk: 0.12,
    upsellRate: 0.15,
    avgDealCycle: 14
  },
  perAthlete: {
    name: 'Per-Athlete Pricing',
    desc: 'Price per swimmer per month. Scales with team. Feels fair — coaches pay for what they use. Risk: sticker shock at scale.',
    getDisplay: (base, teamSize, dues) => {
      const perAth = Math.max(1.49, (base / 120).toFixed(2));
      const total = (perAth * teamSize).toFixed(0);
      return {
        anchor: null,
        price: `$${perAth}/athlete/mo`,
        sub: `${teamSize} athletes = $${total}/mo total`,
        perAthlete: perAth
      };
    },
    closeRate: 0.28,
    psychology: [
      { tag: 'Fairness Heuristic', type: 'positive' },
      { tag: 'Transparent Scaling', type: 'positive' },
      { tag: 'Sticker Shock at Scale', type: 'negative' },
      { tag: 'Penny-wise Framing', type: 'neutral' }
    ],
    churnRisk: 0.08,
    upsellRate: 0.22,
    avgDealCycle: 10
  },
  valueStack: {
    name: 'Value Stack',
    desc: 'Show the total value of all features individually ($X), then present the bundled price. Value-to-price ratio sells itself.',
    getDisplay: (base, teamSize, dues) => {
      const features = [
        { name: 'Gamified XP System', val: 89 },
        { name: 'Meet Management Suite', val: 149 },
        { name: 'Practice Builder', val: 79 },
        { name: 'Parent Portal', val: 59 },
        { name: 'Analytics Dashboard', val: 129 },
        { name: 'Retention AI', val: 199 }
      ];
      const totalVal = features.reduce((s, f) => s + f.val, 0);
      return {
        anchor: `$${totalVal}/mo if bought separately`,
        price: `$${base}/mo`,
        sub: `${Math.round((1 - base / totalVal) * 100)}% savings — all features included`,
        perAthlete: (base / teamSize).toFixed(2),
        features
      };
    },
    closeRate: 0.38,
    psychology: [
      { tag: 'Value Contrast', type: 'positive' },
      { tag: 'Bundle Effect', type: 'positive' },
      { tag: 'Comprehension Load', type: 'neutral' },
      { tag: 'Feature Overwhelm', type: 'negative' }
    ],
    churnRisk: 0.06,
    upsellRate: 0.08,
    avgDealCycle: 18
  },
  flatRate: {
    name: 'Flat Rate — No Tiers',
    desc: 'One price. Everything included. No decisions, no analysis paralysis. Simple, but no upsell path.',
    getDisplay: (base, teamSize, dues) => ({
      anchor: null,
      price: `$${base}/mo`,
      sub: 'Everything included. No tiers. No surprises.',
      perAthlete: (base / teamSize).toFixed(2)
    }),
    closeRate: 0.35,
    psychology: [
      { tag: 'Decision Simplicity', type: 'positive' },
      { tag: 'No Analysis Paralysis', type: 'positive' },
      { tag: 'No Upsell Path', type: 'negative' },
      { tag: 'Value Ambiguity', type: 'neutral' }
    ],
    churnRisk: 0.10,
    upsellRate: 0.03,
    avgDealCycle: 8
  },
  freemium: {
    name: 'Freemium + Upsell',
    desc: 'Free tier with core features. Paid unlocks advanced analytics, meet tools, parent portal. Land-and-expand model.',
    getDisplay: (base, teamSize, dues) => ({
      anchor: 'Free tier available',
      price: `$${base}/mo`,
      sub: `Free → Basic → Pro ($${base}/mo). Upgrade when you're ready.`,
      perAthlete: (base / teamSize).toFixed(2)
    }),
    closeRate: 0.52,
    psychology: [
      { tag: 'Zero-Risk Entry', type: 'positive' },
      { tag: 'Endowment Effect', type: 'positive' },
      { tag: 'Free-Tier Ceiling', type: 'negative' },
      { tag: 'Conversion Friction', type: 'negative' }
    ],
    churnRisk: 0.18,
    upsellRate: 0.35,
    avgDealCycle: 45
  },
  competitor: {
    name: 'Competitor Undercut',
    desc: 'Price 20% below TeamUnify/SwimTopia equivalent. Win on price. Risk: race to bottom, perceived as "cheap."',
    getDisplay: (base, teamSize, dues) => {
      const comp = Math.round(base * 1.25);
      return {
        anchor: `TeamUnify equivalent: ~$${comp}/mo`,
        price: `$${base}/mo`,
        sub: `${Math.round((1 - base / comp) * 100)}% less than legacy platforms`,
        perAthlete: (base / teamSize).toFixed(2)
      };
    },
    closeRate: 0.30,
    psychology: [
      { tag: 'Price Advantage', type: 'positive' },
      { tag: 'Comparison Anchor', type: 'positive' },
      { tag: 'Cheap Perception Risk', type: 'negative' },
      { tag: 'Race to Bottom', type: 'negative' }
    ],
    churnRisk: 0.14,
    upsellRate: 0.10,
    avgDealCycle: 12
  }
};

const OBJECTIONS = [
  {
    q: '"We already use TeamUnify — why switch?"',
    handles: {
      anchor: 'At this beta price, you can run both in parallel for 90 days. Zero risk.',
      perAthlete: 'You only pay for active swimmers. TeamUnify charges flat regardless of season size.',
      valueStack: 'TeamUnify runs your admin. METTLE transforms your athletes. Look at the feature stack — gamification, retention AI, parent engagement. They\'re complementary.',
      flatRate: 'One price, everything included. No module add-ons like TeamUnify. What you see is what you get.',
      freemium: 'Start free. Run it alongside TeamUnify. When your coaches can\'t live without it, upgrade.',
      competitor: 'Same core features, 20% less, plus gamification and retention tools TeamUnify doesn\'t have.'
    }
  },
  {
    q: '"It\'s too expensive for our budget."',
    handles: {
      anchor: 'The full platform is $ANCHOR. You\'re getting beta pricing at $PRICE — that\'s locked for 12 months.',
      perAthlete: 'At $PER_ATH per athlete, that\'s less than a single practice snack. The ROI on retention alone covers it.',
      valueStack: 'If you bought these features separately, you\'d spend $STACK_VAL/mo. This is everything for $PRICE.',
      flatRate: '$PRICE/mo. No surprises, no overages. Budget it once, done.',
      freemium: 'Start free. Literally zero budget needed today. Upgrade only when you see the value.',
      competitor: 'You\'re paying more for less with your current platform. This saves you $SAVE/mo on day one.'
    }
  },
  {
    q: '"I need to think about it / talk to the board."',
    handles: {
      anchor: 'This beta price expires in 14 days. I can hold your slot, but I can\'t hold the price.',
      perAthlete: 'Absolutely. Here\'s the math for your board: $PER_ATH × TEAM_SIZE athletes = $TOTAL/mo. I\'ll send a one-pager.',
      valueStack: 'I\'ll send a feature-value breakdown your board can review. The numbers speak for themselves.',
      flatRate: 'Simple decision for the board: one price, everything included. No line-item debates.',
      freemium: 'No decision needed yet. Start the free tier now, show the board results in 30 days.',
      competitor: 'Pull up your current invoice. I\'ll build a side-by-side your treasurer will love.'
    }
  }
];

function renderPanel(containerId, stratKey, teamSize, tier, dues) {
  const strat = STRATEGIES[stratKey];
  const base = TIERS[tier].base;
  const display = strat.getDisplay(base, teamSize, dues);
  const monthlyRev = Math.round(base * strat.closeRate * 10);
  const ltv = Math.round(base * (1 / strat.churnRisk));

  let html = `<div class="strategy-name">${strat.name}</div>`;
  html += `<div class="strategy-desc">${strat.desc}</div>`;
  html += `<div class="price-display">`;
  if (display.anchor) html += `<div class="price-anchor">${display.anchor}</div>`;
  html += `<div class="price-main">${display.price}</div>`;
  html += `<div class="price-sub">${display.sub}</div>`;
  html += `</div>`;

  html += `<div class="metrics">`;
  html += `<div class="metric"><div class="metric-value green">${Math.round(strat.closeRate * 100)}%</div><div class="metric-label">Est. Close Rate</div></div>`;
  html += `<div class="metric"><div class="metric-value scarlet">${Math.round(strat.churnRisk * 100)}%</div><div class="metric-label">Monthly Churn</div></div>`;
  html += `<div class="metric"><div class="metric-value gold">$${display.perAthlete}</div><div class="metric-label">Per Athlete</div></div>`;
  html += `<div class="metric"><div class="metric-value blue">${strat.avgDealCycle}d</div><div class="metric-label">Avg Deal Cycle</div></div>`;
  html += `<div class="metric"><div class="metric-value purple">${Math.round(strat.upsellRate * 100)}%</div><div class="metric-label">Upsell Rate</div></div>`;
  html += `<div class="metric"><div class="metric-value green">$${ltv.toLocaleString()}</div><div class="metric-label">Customer LTV</div></div>`;
  html += `</div>`;

  html += `<div class="psychology"><h3>Psychological Triggers</h3>`;
  strat.psychology.forEach(p => {
    html += `<span class="psych-tag ${p.type}">${p.tag}</span>`;
  });
  html += `</div>`;

  document.getElementById(containerId).innerHTML = html;
  return { closeRate: strat.closeRate, churnRisk: strat.churnRisk, upsellRate: strat.upsellRate, ltv, base, stratKey };
}

function renderRevenue(a, b) {
  const grid = document.getElementById('revGrid');
  const pipelineA = Math.round(a.base * a.closeRate * 120);
  const pipelineB = Math.round(b.base * b.closeRate * 120);
  const arrA = pipelineA * 12;
  const arrB = pipelineB * 12;

  grid.innerHTML = `
    <div class="rev-card"><div class="label">Monthly Pipeline A</div><div class="val" style="color:var(--purple)">$${pipelineA.toLocaleString()}</div><div class="sub">${Math.round(a.closeRate * 100)}% close × 10 prospects</div></div>
    <div class="rev-card"><div class="label">Monthly Pipeline B</div><div class="val" style="color:var(--blue)">$${pipelineB.toLocaleString()}</div><div class="sub">${Math.round(b.closeRate * 100)}% close × 10 prospects</div></div>
    <div class="rev-card"><div class="label">Projected ARR (A)</div><div class="val" style="color:var(--purple)">$${arrA.toLocaleString()}</div><div class="sub">12mo × pipeline</div></div>
    <div class="rev-card"><div class="label">Projected ARR (B)</div><div class="val" style="color:var(--blue)">$${arrB.toLocaleString()}</div><div class="sub">12mo × pipeline</div></div>
  `;

  const maxArr = Math.max(arrA, arrB);
  document.getElementById('barCompare').innerHTML = `
    <div class="bar-row"><div class="bar-label">ARR A</div><div class="bar-track"><div class="bar-fill a" style="width:${(arrA / maxArr * 100)}%">$${arrA.toLocaleString()}</div></div></div>
    <div class="bar-row"><div class="bar-label">ARR B</div><div class="bar-track"><div class="bar-fill b" style="width:${(arrB / maxArr * 100)}%">$${arrB.toLocaleString()}</div></div></div>
    <div class="bar-row"><div class="bar-label">LTV A</div><div class="bar-track"><div class="bar-fill a" style="width:${(a.ltv / Math.max(a.ltv, b.ltv) * 100)}%">$${a.ltv.toLocaleString()}</div></div></div>
    <div class="bar-row"><div class="bar-label">LTV B</div><div class="bar-track"><div class="bar-fill b" style="width:${(b.ltv / Math.max(a.ltv, b.ltv) * 100)}%">$${b.ltv.toLocaleString()}</div></div></div>
  `;
  return { arrA, arrB };
}

function renderVerdict(a, b, arrA, arrB) {
  const v = document.getElementById('verdict');
  // Composite score: 40% ARR + 30% LTV + 20% close rate + 10% low churn
  const scoreA = arrA * 0.4 + a.ltv * 0.3 + a.closeRate * 10000 * 0.2 + (1 - a.churnRisk) * 10000 * 0.1;
  const scoreB = arrB * 0.4 + b.ltv * 0.3 + b.closeRate * 10000 * 0.2 + (1 - b.churnRisk) * 10000 * 0.1;

  const winner = scoreA > scoreB ? 'A' : 'B';
  const winStrat = winner === 'A' ? STRATEGIES[a.stratKey] : STRATEGIES[b.stratKey];
  const loseStrat = winner === 'A' ? STRATEGIES[b.stratKey] : STRATEGIES[a.stratKey];
  const pctDiff = Math.abs(Math.round((scoreA - scoreB) / Math.min(scoreA, scoreB) * 100));

  document.getElementById('panelA').classList.toggle('winner', winner === 'A');
  document.getElementById('panelB').classList.toggle('winner', winner === 'B');

  let verdictText = '';
  if (pctDiff < 5) {
    verdictText = `Near-tie. Both strategies viable. ${winStrat.name} edges out by ${pctDiff}% on composite score. Test both in market — the real A/B starts with live prospects.`;
  } else if (pctDiff < 20) {
    verdictText = `${winStrat.name} wins by ${pctDiff}%. Better revenue profile with ${winStrat.churnRisk < loseStrat.churnRisk ? 'lower churn' : 'higher close rate'}. Lead with Variant ${winner} for the next 10 prospects, track conversion.`;
  } else {
    verdictText = `Clear winner: ${winStrat.name} dominates by ${pctDiff}%. ${loseStrat.name} underperforms on ${loseStrat.closeRate < winStrat.closeRate ? 'close rate' : 'retention'}. Deploy Variant ${winner} immediately.`;
  }

  v.innerHTML = `<h2><span class="winner-badge">Winner: Variant ${winner}</span></h2><p>${verdictText}</p>`;
}

function renderObjections(stratA, stratB) {
  const cont = document.getElementById('objections');
  const base = TIERS[document.getElementById('tier').value].base;
  const teamSize = parseInt(document.getElementById('teamSize').value);
  const displayA = STRATEGIES[stratA].getDisplay(base, teamSize);
  const displayB = STRATEGIES[stratB].getDisplay(base, teamSize);

  cont.innerHTML = OBJECTIONS.map(obj => {
    let handleA = obj.handles[stratA]
      .replace('$ANCHOR', displayA.anchor || '')
      .replace('$PRICE', `$${base}`)
      .replace('$PER_ATH', `$${displayA.perAthlete}`)
      .replace('$STACK_VAL', displayA.features ? `$${displayA.features.reduce((s,f)=>s+f.val,0)}` : '')
      .replace('$SAVE', `$${Math.round(base * 0.25)}`)
      .replace('TEAM_SIZE', teamSize)
      .replace('$TOTAL', `$${Math.round(displayA.perAthlete * teamSize)}`);

    let handleB = obj.handles[stratB]
      .replace('$ANCHOR', displayB.anchor || '')
      .replace('$PRICE', `$${base}`)
      .replace('$PER_ATH', `$${displayB.perAthlete}`)
      .replace('$STACK_VAL', displayB.features ? `$${displayB.features.reduce((s,f)=>s+f.val,0)}` : '')
      .replace('$SAVE', `$${Math.round(base * 0.25)}`)
      .replace('TEAM_SIZE', teamSize)
      .replace('$TOTAL', `$${Math.round(displayB.perAthlete * teamSize)}`);

    return `<div class="objection">
      <div class="q">${obj.q}</div>
      <div class="handle-a"><span>A (${STRATEGIES[stratA].name}):</span> ${handleA}</div>
      <div class="handle-b"><span>B (${STRATEGIES[stratB].name}):</span> ${handleB}</div>
    </div>`;
  }).join('');
}

function update() {
  const teamSize = parseInt(document.getElementById('teamSize').value) || 120;
  const stratA = document.getElementById('stratA').value;
  const stratB = document.getElementById('stratB').value;
  const tier = document.getElementById('tier').value;
  const dues = parseInt(document.getElementById('duesPerAthlete').value) || 125;

  const a = renderPanel('contentA', stratA, teamSize, tier, dues);
  const b = renderPanel('contentB', stratB, teamSize, tier, dues);
  const { arrA, arrB } = renderRevenue(a, b);
  renderVerdict(a, b, arrA, arrB);
  renderObjections(stratA, stratB);
}

document.querySelectorAll('input, select').forEach(el => el.addEventListener('change', update));
document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Regime Shift Detector — DR STRANGE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;
  --accent:#8b5cf6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --cyan:#06b6d4;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',Monaco,'Cascadia Code',monospace;min-height:100vh;padding:0}
h1{font-size:1.1rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
h2{font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
h3{font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}

.header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:16px}
.header .badge{font-size:.65rem;padding:3px 10px;border-radius:12px;background:var(--accent);color:#fff;letter-spacing:.06em;text-transform:uppercase}
.header .time{font-size:.7rem;color:var(--dim)}

.layout{display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto 1fr;height:calc(100vh - 65px)}

/* Left panel */
.left-panel{grid-row:1/3;border-right:1px solid var(--border);padding:20px;overflow-y:auto}
.regime-selector{margin-bottom:24px}
.regime-btn{display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.75rem;transition:all .15s}
.regime-btn:hover{border-color:var(--accent)}
.regime-btn.active{border-color:var(--accent);background:rgba(139,92,246,.1)}
.regime-btn .label{font-weight:600;margin-bottom:2px}
.regime-btn .sub{color:var(--dim);font-size:.65rem}

.indicator-list{margin-top:16px}
.indicator{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.7rem}
.indicator .name{color:var(--dim)}
.indicator .val{font-weight:600}
.indicator .val.up{color:var(--green)}
.indicator .val.down{color:var(--red)}
.indicator .val.neutral{color:var(--amber)}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border)}
.regime-badge{padding:6px 16px;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.04em}
.regime-badge.growth{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.regime-badge.inflation{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.regime-badge.recession{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.regime-badge.transition{background:rgba(139,92,246,.15);color:var(--accent);border:1px solid rgba(139,92,246,.3)}
.regime-badge.deflation{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.confidence-bar{flex:1;max-width:200px}
.confidence-bar .track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.confidence-bar .fill{height:100%;border-radius:3px;transition:width .6s}
.confidence-bar .lbl{font-size:.6rem;color:var(--dim);margin-top:3px;display:flex;justify-content:space-between}
.shift-alert{margin-left:auto;font-size:.7rem;padding:5px 12px;border-radius:6px}
.shift-alert.warning{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.shift-alert.danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.shift-alert.stable{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}

/* Main content */
.main{padding:20px 24px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.card.full{grid-column:1/3}
.card canvas{width:100%!important;max-height:260px}

/* Transition matrix */
.matrix{width:100%;border-collapse:collapse;font-size:.65rem;margin-top:8px}
.matrix th,.matrix td{padding:6px 8px;text-align:center;border:1px solid var(--border)}
.matrix th{color:var(--dim);font-weight:600;background:rgba(255,255,255,.02)}
.matrix td{font-weight:600}
.matrix .highlight{background:rgba(139,92,246,.15);color:var(--accent)}

/* Asset allocation */
.alloc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:8px}
.alloc-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.alloc-item .asset{font-size:.65rem;color:var(--dim);margin-bottom:4px}
.alloc-item .weight{font-size:1.1rem;font-weight:700}
.alloc-item .change{font-size:.6rem;margin-top:2px}
.alloc-item .change.pos{color:var(--green)}
.alloc-item .change.neg{color:var(--red)}

/* Signal timeline */
.timeline{margin-top:8px}
.tl-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.7rem}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tl-item .tl-time{color:var(--dim);width:60px;flex-shrink:0;font-size:.6rem}
.tl-item .tl-text{flex:1}

/* Responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
  .left-panel{grid-row:auto;border-right:none;border-bottom:1px solid var(--border)}
  .main{grid-template-columns:1fr}
  .card.full{grid-column:1}
}
</style>
</head>

// === RENDERING ===

let activeScenario = SCENARIOS[0];
let probChart, compositeChart;

function init() {
  renderScenarioList();
  selectScenario('current');
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function renderScenarioList() {
  const el = document.getElementById('scenarioList');
  el.innerHTML = SCENARIOS.map(s => `
    <button class="regime-btn" data-id="${s.id}" onclick="selectScenario('${s.id}')">
      <div class="label">${s.label}</div>
      <div class="sub">${s.sub}</div>
    </button>
  `).join('');
}

function selectScenario(id) {
  activeScenario = SCENARIOS.find(s => s.id === id);
  document.querySelectorAll('.regime-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  renderAll();
}

function renderAll() {
  const s = activeScenario;
  const r = REGIMES[s.regime];

  // Regime badge
  const badge = document.getElementById('regimeBadge');
  badge.textContent = r.label;
  badge.className = 'regime-badge ' + r.class;

  // Confidence
  const fill = document.getElementById('confFill');
  fill.style.width = s.confidence + '%';
  fill.style.background = s.confidence > 75 ? '#10b981' : s.confidence > 50 ? '#f59e0b' : '#ef4444';
  document.getElementById('confPct').textContent = s.confidence + '%';

  // Shift alert
  const alert = document.getElementById('shiftAlert');
  if (s.shiftRisk === 'critical') {
    alert.innerHTML = '<span class="shift-alert danger">⚠ REGIME SHIFT IMMINENT</span>';
  } else if (s.shiftRisk === 'high') {
    alert.innerHTML = '<span class="shift-alert warning">◈ ELEVATED SHIFT RISK</span>';
  } else if (s.shiftRisk === 'moderate') {
    alert.innerHTML = '<span class="shift-alert warning">◇ MODERATE SHIFT RISK</span>';
  } else {
    alert.innerHTML = '<span class="shift-alert stable">● STABLE</span>';
  }

  renderIndicators();
  renderProbChart();
  renderMatrix();
  renderAllocation();
  renderTimeline();
  renderCompositeChart();
}

function renderIndicators() {
  const el = document.getElementById('indicatorList');
  const inds = activeScenario.indicators;
  el.innerHTML = Object.entries(inds).map(([name, d]) => `
    <div class="indicator">
      <span class="name">${name}</span>
      <span class="val ${d.dir}">${d.dir === 'up' ? '▲' : d.dir === 'down' ? '▼' : '●'} ${d.val}</span>
    </div>
  `).join('');
}

function renderProbChart() {
  const ctx = document.getElementById('probChart').getContext('2d');
  if (probChart) probChart.destroy();

  const p = activeScenario.probs;
  // Generate 12-month trajectory with regime as dominant
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const datasets = Object.entries(REGIMES).map(([key, r]) => {
    const base = p[key];
    const data = months.map((_, i) => {
      const noise = (Math.sin(i * 1.3 + key.length) * 0.08) + (Math.cos(i * 0.7) * 0.04);
      return Math.max(0.01, Math.min(0.95, base + noise * (1 - base)));
    });
    return {
      label: r.label,
      data,
      borderColor: r.color,
      backgroundColor: r.color + '20',
      fill: true,
      tension: 0.4,
      pointRadius: 2,
      borderWidth: 2
    };
  });

  probChart = new Chart(ctx, {
    type: 'line',
    data: { labels: months, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } },
        y: {
          grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 },
            callback: v => (v * 100).toFixed(0) + '%'
          },
          min: 0, max: 1
        }
      },
      plugins: {
        legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 12 } },
        tooltip: {
          callbacks: { label: ctx => `${ctx.dataset.label}: ${(ctx.raw * 100).toFixed(1)}%` }
        }
      }
    }
  });
}

function renderMatrix() {
  const el = document.getElementById('matrixContainer');
  const m = activeScenario.matrix;
  const labels = Object.values(REGIMES).map(r => r.label);
  const currentIdx = Object.keys(REGIMES).indexOf(activeScenario.regime);

  let html = '<table class="matrix"><tr><th>From \\ To</th>';
  labels.forEach(l => html += `<th>${l.slice(0,6)}</th>`);
  html += '</tr>';

  m.forEach((row, i) => {
    html += `<tr><th>${labels[i].slice(0,6)}</th>`;
    row.forEach((v, j) => {
      const isHighlight = i === currentIdx;
      const intensity = Math.round(v * 255);
      const color = v > 0.3 ? `rgba(139,92,246,${v * 0.6})` : `rgba(255,255,255,${v * 0.15})`;
      html += `<td style="background:${color}" class="${isHighlight ? 'highlight' : ''}">${(v * 100).toFixed(0)}%</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  el.innerHTML = html;
}

function renderAllocation() {
  const el = document.getElementById('allocGrid');
  el.innerHTML = activeScenario.allocation.map(a => `
    <div class="alloc-item">
      <div class="asset">${a.asset}</div>
      <div class="weight" style="color:${a.weight > 20 ? '#10b981' : a.weight > 10 ? '#e2e8f0' : '#64748b'}">${a.weight}%</div>
      <div class="change ${a.change > 0 ? 'pos' : a.change < 0 ? 'neg' : ''}">${a.change > 0 ? '+' : ''}${a.change}%</div>
    </div>
  `).join('');
}

function renderTimeline() {
  const el = document.getElementById('signalTimeline');
  el.innerHTML = activeScenario.signals.map(s => `
    <div class="tl-item">
      <div class="tl-dot" style="background:${s.color}"></div>
      <div class="tl-time">${s.time}</div>
      <div class="tl-text">${s.text}</div>
    </div>
  `).join('');
}

function renderCompositeChart() {
  const ctx = document.getElementById('compositeChart').getContext('2d');
  if (compositeChart) compositeChart.destroy();

  // Generate composite index from indicators
  const p = activeScenario.probs;
  const composite = p.growth * 1.0 + p.inflation * (-0.3) + p.recession * (-1.0) + p.transition * 0.0 + p.deflation * (-0.5);

  const months = [];
  const values = [];
  const thresholds = [];
  for (let i = -11; i <= 0; i++) {
    const d = new Date();
    d.setMonth(d.getMonth() + i);
    months.push(d.toLocaleString('en-US', { month: 'short', year: '2-digit' }));
    const noise = Math.sin(i * 0.8) * 0.15 + Math.cos(i * 1.2) * 0.1;
    values.push(composite + noise + (i * 0.01));
    thresholds.push(0);
  }

  compositeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        {
          label: 'Composite Index',
          data: values,
          borderColor: '#8b5cf6',
          backgroundColor: values.map(v => v > 0 ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'),
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          borderWidth: 2.5
        },
        {
          label: 'Zero Line',
          data: thresholds,
          borderColor: '#64748b',
          borderDash: [5, 5],
          borderWidth: 1,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } },
        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } }
      },
      plugins: {
        legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 12 } },
        annotation: {}
      }
    }
  });
}

init();
</script>
</body>
</html>

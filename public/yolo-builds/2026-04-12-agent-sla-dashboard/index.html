<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent SLA Dashboard — RAMICHE OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e8;--dim:#6b6b80;
  --green:#00e676;--yellow:#ffd740;--red:#ff5252;--blue:#448aff;--purple:#b388ff;
  --accent:#00e676;
}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:18px;font-weight:600;letter-spacing:1px}
.header .subtitle{color:var(--dim);font-size:12px}
.header .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;margin-right:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-card .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .value.green{color:var(--green)}.stat-card .value.yellow{color:var(--yellow)}.stat-card .value.red{color:var(--red)}.stat-card .value.blue{color:var(--blue)}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls select,.controls input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:inherit;font-size:12px}
.controls button{background:var(--accent);color:#000;border:none;padding:8px 16px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600}
.controls button:hover{opacity:.85}
.controls button.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.agent-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.agent-card:hover{border-color:var(--accent)}
.agent-card .status-strip{position:absolute;top:0;left:0;right:0;height:3px}
.agent-card .status-strip.healthy{background:var(--green)}
.agent-card .status-strip.warning{background:var(--yellow)}
.agent-card .status-strip.breached{background:var(--red)}
.agent-card .status-strip.offline{background:var(--dim)}
.agent-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.agent-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.agent-lane{font-size:10px;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.lane-infra{background:rgba(68,138,255,.15);color:var(--blue)}
.lane-creative{background:rgba(179,136,255,.15);color:var(--purple)}
.lane-business{background:rgba(255,215,64,.15);color:var(--yellow)}
.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.metric{text-align:center}
.metric .metric-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric .metric-value{font-size:16px;font-weight:700}
.sla-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden}
.sla-bar .fill{height:100%;border-radius:3px;transition:width .5s ease}
.sla-info{display:flex;justify-content:space-between;font-size:10px;color:var(--dim)}
.breach-log{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.breach-log .breach-title{font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.breach-item{font-size:11px;color:var(--dim);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.breach-item .breach-time{color:var(--red);font-weight:600}
.timeline-section{margin-top:24px}
.timeline-section h2{font-size:14px;margin-bottom:16px;color:var(--dim)}
.timeline-chart{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;position:relative}
.timeline-canvas{width:100%;height:200px}
.footer{text-align:center;padding:20px 0;color:var(--dim);font-size:10px;border-top:1px solid var(--border);margin-top:24px}
.toast{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--red);border-radius:8px;padding:12px 20px;font-size:12px;opacity:0;transform:translateY(-10px);transition:all .3s;z-index:100;max-width:350px}
.toast.show{opacity:1;transform:translateY(0)}
.toast .toast-title{color:var(--red);font-weight:700;margin-bottom:4px;font-size:11px;text-transform:uppercase}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="live-dot"></span>AGENT SLA DASHBOARD</h1>
    <div class="subtitle">RAMICHE OS — Service Level Agreement Monitor</div>
  </div>
  <div style="text-align:right">
    <div class="subtitle" id="clock"></div>
    <div class="subtitle" id="uptime"></div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <select id="laneFilter">
    <option value="all">All Lanes</option>
    <option value="infra">Infra</option>
    <option value="creative">Creative</option>
    <option value="business">Business</option>
  </select>
  <select id="statusFilter">
    <option value="all">All Statuses</option>
    <option value="healthy">Healthy</option>
    <option value="warning">Warning</option>
    <option value="breached">Breached</option>
    <option value="offline">Offline</option>
  </select>
  <select id="timeWindow">
    <option value="1h">Last 1 Hour</option>
    <option value="6h" selected>Last 6 Hours</option>
    <option value="24h">Last 24 Hours</option>
    <option value="7d">Last 7 Days</option>
  </select>
  <button onclick="simulateBreach()">Simulate Breach</button>
  <button class="secondary" onclick="exportReport()">Export CSV</button>
</div>

<div class="agent-grid" id="agentGrid"></div>

<div class="timeline-section">
  <h2>Response Time Heatmap (Last 6h)</h2>
  <div class="timeline-chart">
    <canvas class="timeline-canvas" id="heatmapCanvas"></canvas>
  </div>
</div>

<div class="timeline-section">
  <h2>SLA Compliance Trend</h2>
  <div class="timeline-chart">
    <canvas class="timeline-canvas" id="trendCanvas"></canvas>
  </div>
</div>

<div class="footer">
  PROXIMON — R&D Architect • YOLO Build #36 • Agent SLA Dashboard v1.0 • Built 2026-04-12
</div>

<div class="toast" id="toast">
  <div class="toast-title">SLA BREACH ALERT</div>
  <div class="toast-body" id="toastBody"></div>
</div>

<script>
// ─── Agent Registry ───
const AGENTS = [
  { id:'atlas', name:'Atlas', lane:'infra', role:'Main Orchestrator', slaMs:3000 },
  { id:'proximon', name:'Proximon', lane:'infra', role:'R&D Architect', slaMs:5000 },
  { id:'shuri', name:'Shuri', lane:'creative', role:'Frontend Engineer', slaMs:4000 },
  { id:'aetherion', name:'Aetherion', lane:'creative', role:'Design Director', slaMs:5000 },
  { id:'triage', name:'Triage', lane:'infra', role:'System Debugger', slaMs:2000 },
  { id:'widow', name:'Widow', lane:'infra', role:'Security', slaMs:3000 },
  { id:'vee', name:'Vee', lane:'creative', role:'Marketing', slaMs:6000 },
  { id:'mercury', name:'Mercury', lane:'business', role:'Sales', slaMs:5000 },
  { id:'simons', name:'Simons', lane:'business', role:'Analytics', slaMs:4000 },
  { id:'echo', name:'ECHO', lane:'business', role:'Community', slaMs:5000 },
  { id:'ink', name:'INK', lane:'creative', role:'Content', slaMs:6000 },
  { id:'nova', name:'NOVA', lane:'creative', role:'Fabrication', slaMs:5000 },
  { id:'themis', name:'Themis', lane:'business', role:'Legal', slaMs:8000 },
  { id:'kiyosaki', name:'Kiyosaki', lane:'business', role:'Finance', slaMs:6000 },
  { id:'selah', name:'Selah', lane:'business', role:'Wellness', slaMs:8000 },
  { id:'strange', name:'Dr. Strange', lane:'business', role:'Forecasting', slaMs:7000 },
  { id:'haven', name:'Haven', lane:'business', role:'Support', slaMs:3000 },
  { id:'michael', name:'Michael', lane:'business', role:'Swim Coach', slaMs:5000 },
  { id:'maestro', name:'TheMAESTRO', lane:'creative', role:'Music', slaMs:6000 },
  { id:'prophets', name:'Prophets', lane:'business', role:'Spiritual', slaMs:10000 },
];

// ─── Simulated Telemetry ───
class AgentTelemetry {
  constructor(agent) {
    this.agent = agent;
    this.history = [];
    this.breaches = [];
    this.online = Math.random() > 0.08;
    this.generateHistory();
  }

  generateHistory() {
    const now = Date.now();
    for (let i = 0; i < 72; i++) {
      const ts = now - (72 - i) * 5 * 60000;
      const base = this.agent.slaMs * 0.5;
      const jitter = Math.random() * this.agent.slaMs * 0.8;
      const spike = Math.random() > 0.92 ? this.agent.slaMs * (1 + Math.random() * 1.5) : 0;
      const responseMs = Math.round(base + jitter + spike);
      const breached = responseMs > this.agent.slaMs;
      this.history.push({ ts, responseMs, breached });
      if (breached) {
        this.breaches.push({ ts, responseMs, delta: responseMs - this.agent.slaMs });
      }
    }
  }

  get avgResponse() {
    const vals = this.history.map(h => h.responseMs);
    return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  }

  get p99Response() {
    const sorted = [...this.history.map(h => h.responseMs)].sort((a, b) => a - b);
    return sorted[Math.floor(sorted.length * 0.99)];
  }

  get compliancePct() {
    const ok = this.history.filter(h => !h.breached).length;
    return Math.round((ok / this.history.length) * 1000) / 10;
  }

  get status() {
    if (!this.online) return 'offline';
    if (this.compliancePct >= 99) return 'healthy';
    if (this.compliancePct >= 95) return 'warning';
    return 'breached';
  }
}

// ─── State ───
let telemetry = AGENTS.map(a => new AgentTelemetry(a));

// ─── Render Stats Bar ───
function renderStats() {
  const total = telemetry.length;
  const healthy = telemetry.filter(t => t.status === 'healthy').length;
  const warning = telemetry.filter(t => t.status === 'warning').length;
  const breached = telemetry.filter(t => t.status === 'breached').length;
  const offline = telemetry.filter(t => t.status === 'offline').length;
  const avgCompliance = (telemetry.reduce((s, t) => s + t.compliancePct, 0) / total).toFixed(1);
  const totalBreaches = telemetry.reduce((s, t) => s + t.breaches.length, 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="label">Agents Online</div><div class="value green">${total - offline}/${total}</div></div>
    <div class="stat-card"><div class="label">Healthy</div><div class="value green">${healthy}</div></div>
    <div class="stat-card"><div class="label">Warning</div><div class="value yellow">${warning}</div></div>
    <div class="stat-card"><div class="label">Breached</div><div class="value red">${breached}</div></div>
    <div class="stat-card"><div class="label">Avg Compliance</div><div class="value ${parseFloat(avgCompliance)>=99?'green':parseFloat(avgCompliance)>=95?'yellow':'red'}">${avgCompliance}%</div></div>
    <div class="stat-card"><div class="label">Total Breaches (6h)</div><div class="value ${totalBreaches===0?'green':'red'}">${totalBreaches}</div></div>
  `;
}

// ─── Render Agent Cards ───
function renderAgents() {
  const lane = document.getElementById('laneFilter').value;
  const status = document.getElementById('statusFilter').value;
  let filtered = telemetry;
  if (lane !== 'all') filtered = filtered.filter(t => t.agent.lane === lane);
  if (status !== 'all') filtered = filtered.filter(t => t.status === status);

  document.getElementById('agentGrid').innerHTML = filtered.map(t => {
    const barColor = t.status === 'healthy' ? 'var(--green)' : t.status === 'warning' ? 'var(--yellow)' : t.status === 'breached' ? 'var(--red)' : 'var(--dim)';
    const barWidth = Math.min(t.compliancePct, 100);
    const recentBreaches = t.breaches.slice(-3).reverse();
    const breachHtml = recentBreaches.length > 0 ? `
      <div class="breach-log">
        <div class="breach-title">Recent Breaches (${t.breaches.length} total)</div>
        ${recentBreaches.map(b => `
          <div class="breach-item">
            <span class="breach-time">${new Date(b.ts).toLocaleTimeString()}</span>
            — ${b.responseMs}ms (${b.delta > 0 ? '+' : ''}${b.delta}ms over SLA)
          </div>
        `).join('')}
      </div>
    ` : '';

    return `
      <div class="agent-card">
        <div class="status-strip ${t.status}"></div>
        <div class="agent-header">
          <div>
            <div class="agent-name">${t.agent.name}</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${t.agent.role}</div>
          </div>
          <span class="agent-lane lane-${t.agent.lane}">${t.agent.lane}</span>
        </div>
        <div class="metrics-row">
          <div class="metric">
            <div class="metric-label">Avg Response</div>
            <div class="metric-value" style="color:${t.avgResponse <= t.agent.slaMs * 0.7 ? 'var(--green)' : t.avgResponse <= t.agent.slaMs ? 'var(--yellow)' : 'var(--red)'}">${t.avgResponse}ms</div>
          </div>
          <div class="metric">
            <div class="metric-label">P99</div>
            <div class="metric-value" style="color:${t.p99Response <= t.agent.slaMs ? 'var(--green)' : 'var(--red)'}">${t.p99Response}ms</div>
          </div>
          <div class="metric">
            <div class="metric-label">SLA Target</div>
            <div class="metric-value" style="color:var(--blue)">${t.agent.slaMs}ms</div>
          </div>
        </div>
        <div class="sla-bar"><div class="fill" style="width:${barWidth}%;background:${barColor}"></div></div>
        <div class="sla-info">
          <span>Compliance: ${t.compliancePct}%</span>
          <span>Target: 99.0%</span>
        </div>
        ${breachHtml}
      </div>
    `;
  }).join('');
}

// ─── Heatmap Canvas ───
function renderHeatmap() {
  const canvas = document.getElementById('heatmapCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  const agents = telemetry.filter(t => t.online);
  const rows = agents.length;
  const cols = 72;
  const cellW = (w - 100) / cols;
  const cellH = Math.min((h - 30) / rows, 12);

  ctx.font = '9px monospace';
  ctx.fillStyle = '#6b6b80';

  agents.forEach((t, row) => {
    const y = 20 + row * cellH;
    ctx.fillStyle = '#6b6b80';
    ctx.textAlign = 'right';
    ctx.fillText(t.agent.name.slice(0, 8), 88, y + cellH - 2);
    t.history.forEach((pt, col) => {
      const x = 100 + col * cellW;
      const ratio = pt.responseMs / t.agent.slaMs;
      let color;
      if (ratio < 0.5) color = 'rgba(0,230,118,0.3)';
      else if (ratio < 0.8) color = 'rgba(0,230,118,0.6)';
      else if (ratio < 1.0) color = 'rgba(255,215,64,0.6)';
      else if (ratio < 1.5) color = 'rgba(255,82,82,0.6)';
      else color = 'rgba(255,82,82,0.9)';
      ctx.fillStyle = color;
      ctx.fillRect(x, y, cellW - 1, cellH - 1);
    });
  });

  // Time labels
  ctx.fillStyle = '#6b6b80';
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  for (let i = 0; i < cols; i += 12) {
    const t = telemetry[0].history[i];
    if (t) ctx.fillText(new Date(t.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 100 + i * cellW, h - 2);
  }
}

// ─── Trend Canvas ───
function renderTrend() {
  const canvas = document.getElementById('trendCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  // Compute overall compliance per time bucket
  const buckets = 72;
  const data = [];
  for (let i = 0; i < buckets; i++) {
    const compliant = telemetry.filter(t => t.online && !t.history[i].breached).length;
    const total = telemetry.filter(t => t.online).length;
    data.push((compliant / total) * 100);
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let pct = 90; pct <= 100; pct += 2) {
    const y = pad.top + ph - ((pct - 88) / 12) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pw, y); ctx.stroke();
    ctx.fillStyle = '#6b6b80'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
    ctx.fillText(pct + '%', pad.left - 6, y + 3);
  }

  // SLA target line
  const targetY = pad.top + ph - ((99 - 88) / 12) * ph;
  ctx.strokeStyle = 'rgba(255,82,82,0.4)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, targetY); ctx.lineTo(pad.left + pw, targetY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'var(--red)'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SLA Target 99%', pad.left + pw - 80, targetY - 5);

  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'var(--green)';
  ctx.lineWidth = 2;
  data.forEach((v, i) => {
    const x = pad.left + (i / (buckets - 1)) * pw;
    const y = pad.top + ph - ((Math.max(v, 88) - 88) / 12) * ph;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill under
  const lastX = pad.left + pw;
  const lastY = pad.top + ph - ((Math.max(data[data.length-1], 88) - 88) / 12) * ph;
  ctx.lineTo(lastX, pad.top + ph);
  ctx.lineTo(pad.left, pad.top + ph);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,230,118,0.08)';
  ctx.fill();

  // Time labels
  ctx.fillStyle = '#6b6b80'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  for (let i = 0; i < buckets; i += 12) {
    const t = telemetry[0].history[i];
    if (t) {
      const x = pad.left + (i / (buckets - 1)) * pw;
      ctx.fillText(new Date(t.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), x, h - 8);
    }
  }
}

// ─── Simulate Breach ───
function simulateBreach() {
  const online = telemetry.filter(t => t.online);
  const target = online[Math.floor(Math.random() * online.length)];
  const spikeMs = target.agent.slaMs * (2 + Math.random() * 3);
  target.history.push({
    ts: Date.now(),
    responseMs: Math.round(spikeMs),
    breached: true
  });
  target.breaches.push({
    ts: Date.now(),
    responseMs: Math.round(spikeMs),
    delta: Math.round(spikeMs - target.agent.slaMs)
  });
  if (target.history.length > 72) target.history.shift();

  showToast(`${target.agent.name} — Response ${Math.round(spikeMs)}ms exceeds SLA of ${target.agent.slaMs}ms (+${Math.round(spikeMs - target.agent.slaMs)}ms)`);
  renderAll();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastBody').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// ─── Export ───
function exportReport() {
  let csv = 'Agent,Lane,Role,SLA(ms),Avg(ms),P99(ms),Compliance(%),Breaches,Status\n';
  telemetry.forEach(t => {
    csv += `${t.agent.name},${t.agent.lane},${t.agent.role},${t.agent.slaMs},${t.avgResponse},${t.p99Response},${t.compliancePct},${t.breaches.length},${t.status}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `agent-sla-report-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── Clock ───
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString();
}

// ─── Render All ───
function renderAll() {
  renderStats();
  renderAgents();
  renderHeatmap();
  renderTrend();
  updateClock();
}

// ─── Init ───
document.getElementById('laneFilter').addEventListener('change', renderAgents);
document.getElementById('statusFilter').addEventListener('change', renderAgents);
window.addEventListener('resize', () => { renderHeatmap(); renderTrend(); });
renderAll();
setInterval(updateClock, 1000);

// Live simulation — inject new data every 30s
setInterval(() => {
  telemetry.forEach(t => {
    if (!t.online) return;
    const base = t.agent.slaMs * 0.5;
    const jitter = Math.random() * t.agent.slaMs * 0.8;
    const spike = Math.random() > 0.94 ? t.agent.slaMs * (1 + Math.random() * 1.5) : 0;
    const responseMs = Math.round(base + jitter + spike);
    const breached = responseMs > t.agent.slaMs;
    t.history.push({ ts: Date.now(), responseMs, breached });
    if (breached) {
      t.breaches.push({ ts: Date.now(), responseMs, delta: responseMs - t.agent.slaMs });
      showToast(`${t.agent.name} — ${responseMs}ms exceeds SLA of ${t.agent.slaMs}ms`);
    }
    if (t.history.length > 72) t.history.shift();
  });
  renderAll();
}, 30000);
</script>
</body>
</html>

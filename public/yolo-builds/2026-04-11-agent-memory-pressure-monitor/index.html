<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Memory Pressure Monitor — RAMICHE OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#06080d;--surface:#0d1117;--surface2:#151b26;--surface3:#1c2333;
--border:#1e2d3d;--text:#e6edf3;--muted:#7d8590;--accent:#58a6ff;
--accent2:#3fb950;--warn:#d29922;--danger:#f85149;--purple:#bc8cff;
--cyan:#39d2c0;--orange:#f0883e;--pink:#f778ba;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.4}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* LAYOUT */
.app{display:grid;grid-template-rows:56px 1fr 200px;grid-template-columns:1fr 320px;height:100vh;gap:0}
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:10}
.main-area{grid-column:1/2;display:flex;flex-direction:column;overflow:hidden}
.sidebar{grid-column:2/3;grid-row:2/3;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bottom-panel{grid-column:1/-1;border-top:1px solid var(--border);background:var(--surface);overflow:auto;padding:12px 16px}

/* HEADER */
.header h1{font-size:15px;font-weight:600;white-space:nowrap;color:var(--text)}
.header h1 span{color:var(--accent);font-weight:700}
.header-controls{display:flex;align-items:center;gap:12px;margin-left:auto}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface3);border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.85}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.speed-control{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.speed-control input[type=range]{width:80px;accent-color:var(--accent);height:4px}
.sim-day-label{font-size:12px;color:var(--cyan);font-weight:600;font-variant-numeric:tabular-nums}
.filter-group{display:flex;gap:2px}
.filter-group .btn{padding:4px 10px;font-size:11px;border-radius:4px}
.sort-select{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;cursor:pointer}

/* TOP STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 16px;flex-shrink:0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:2px}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-card .sub{font-size:11px;color:var(--muted)}
.stat-card.critical .value{color:var(--danger)}
.stat-card.warn .value{color:var(--warn)}
.stat-card.ok .value{color:var(--accent2)}
.stat-card.info .value{color:var(--accent)}

/* AGENT GRID */
.agent-grid-wrap{flex:1;overflow-y:auto;padding:0 16px 12px}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.agent-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(88,166,255,.08)}
.agent-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(88,166,255,.12)}
.agent-card.critical-glow{border-color:var(--danger);box-shadow:0 0 12px rgba(248,81,73,.15)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-header .name{font-size:13px;font-weight:600}
.card-header .emoji{font-size:16px}
.gauge-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.gauge-container{position:relative;width:52px;height:52px;flex-shrink:0}
.gauge-container canvas{width:52px;height:52px}
.gauge-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.gauge-info{flex:1;min-width:0}
.gauge-info .row{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:3px}
.gauge-info .row .lbl{color:var(--muted)}
.gauge-info .row .val{font-weight:600;font-variant-numeric:tabular-nums}
.token-bar-wrap{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.token-bar{height:100%;border-radius:3px;transition:width .5s ease}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.card-footer .trend{font-size:12px;font-weight:600}
.card-footer .ts{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.trend-up{color:var(--danger)}
.trend-down{color:var(--accent2)}
.trend-flat{color:var(--muted)}

/* EXPANDED CARD */
.card-details{max-height:0;overflow:hidden;transition:max-height .3s ease}
.agent-card.expanded .card-details{max-height:300px}
.detail-files{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.detail-file{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;color:var(--muted)}
.detail-file .fname{color:var(--text)}
.detail-file .fsize{font-variant-numeric:tabular-nums}
.sparkline-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.sparkline-row canvas{border-radius:2px}
.sparkline-label{font-size:10px;color:var(--muted)}

/* SIDEBAR */
.sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.chart-wrap{width:100%;height:200px;position:relative}
.chart-wrap canvas{width:100%;height:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ALERTS */
.alert-feed{flex:1;overflow-y:auto;padding:0 14px 14px}
.alert-item{padding:8px 10px;border-radius:6px;background:var(--surface2);margin-bottom:6px;font-size:11px;line-height:1.5;border-left:3px solid var(--border)}
.alert-item.warn{border-left-color:var(--warn)}
.alert-item.danger{border-left-color:var(--danger)}
.alert-item.ok{border-left-color:var(--accent2)}
.alert-item.info{border-left-color:var(--accent)}
.alert-ts{font-size:10px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}

/* BOTTOM TIMELINE */
.timeline-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.timeline-grid{display:flex;flex-direction:column;gap:3px;overflow-y:auto;max-height:160px}
.timeline-row{display:flex;align-items:center;gap:8px;height:16px}
.timeline-row .tl-name{font-size:10px;width:90px;text-align:right;flex-shrink:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-row.highlighted .tl-name{color:var(--accent);font-weight:600}
.timeline-bar{flex:1;height:10px;border-radius:3px;display:flex;overflow:hidden}
.timeline-seg{height:100%;transition:opacity .2s}
.timeline-row.dimmed .timeline-bar{opacity:.3}
.timeline-row.highlighted .timeline-bar{opacity:1;box-shadow:0 0 6px rgba(88,166,255,.3)}
.tl-hours{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding-left:98px;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <h1>Agent Memory Pressure Monitor — <span>RAMICHE OS</span></h1>
    <div class="header-controls">
      <div class="filter-group">
        <button class="btn active" data-filter="all">All</button>
        <button class="btn" data-filter="critical">Critical</button>
        <button class="btn" data-filter="warning">Warning</button>
        <button class="btn" data-filter="healthy">Healthy</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="name">Sort: Name</option>
        <option value="pressure">Sort: Pressure</option>
        <option value="growth">Sort: Growth</option>
      </select>
      <button class="btn primary" id="simDayBtn">Simulate Day</button>
      <div class="speed-control">
        <span>Auto</span>
        <input type="range" id="speedSlider" min="0" max="5" value="0" step="1">
        <span id="speedLabel">Off</span>
      </div>
      <div class="sim-day-label">Day <span id="simDayNum">1</span></div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="stats-bar" id="statsBar"></div>
    <div class="agent-grid-wrap">
      <div class="agent-grid" id="agentGrid"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Memory Growth — Top 5 Agents</h3>
      <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
    <div class="sidebar-section" style="flex-shrink:0">
      <h3>Alert Feed</h3>
    </div>
    <div class="alert-feed" id="alertFeed"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="timeline-title">Context Pressure Timeline — Last 24 Hours</div>
    <div class="timeline-grid" id="timelineGrid"></div>
    <div class="tl-hours" id="tlHours"></div>
  </div>
</div>

<script>
// ========== AGENT DATA ==========
const AGENTS_DEF = [
  { name:'Atlas',       emoji:'🗺️', role:'Navigator',      baseCtxMax:200000, baseUsage:.72, baseFiles:12, baseKB:485, growthRate:1.8, volatility:.12, pattern:'high' },
  { name:'Proximon',    emoji:'📡', role:'Proximity',      baseCtxMax:180000, baseUsage:.55, baseFiles:8,  baseKB:290, growthRate:.6,  volatility:.05, pattern:'stable' },
  { name:'Shuri',       emoji:'⚡', role:'Tech Lead',      baseCtxMax:192000, baseUsage:.78, baseFiles:14, baseKB:620, growthRate:2.4, volatility:.2,  pattern:'spiky' },
  { name:'Aetherion',   emoji:'🌀', role:'Architect',      baseCtxMax:200000, baseUsage:.65, baseFiles:10, baseKB:380, growthRate:1.1, volatility:.08, pattern:'growing' },
  { name:'Vee',         emoji:'💎', role:'Voice',          baseCtxMax:128000, baseUsage:.42, baseFiles:5,  baseKB:120, growthRate:.3,  volatility:.04, pattern:'stable' },
  { name:'Mercury',     emoji:'🏃', role:'Messenger',      baseCtxMax:150000, baseUsage:.58, baseFiles:7,  baseKB:210, growthRate:.9,  volatility:.1,  pattern:'growing' },
  { name:'Simons',      emoji:'📊', role:'Analyst',        baseCtxMax:180000, baseUsage:.61, baseFiles:9,  baseKB:340, growthRate:1.2, volatility:.07, pattern:'growing' },
  { name:'Widow',       emoji:'🕸️', role:'Security',       baseCtxMax:160000, baseUsage:.48, baseFiles:6,  baseKB:175, growthRate:.4,  volatility:.06, pattern:'stable' },
  { name:'ECHO',        emoji:'🔊', role:'Feedback',       baseCtxMax:140000, baseUsage:.52, baseFiles:5,  baseKB:145, growthRate:.5,  volatility:.05, pattern:'stable' },
  { name:'INK',         emoji:'✒️', role:'Writer',         baseCtxMax:180000, baseUsage:.69, baseFiles:11, baseKB:410, growthRate:1.5, volatility:.09, pattern:'growing' },
  { name:'TRIAGE',      emoji:'🏥', role:'Prioritizer',    baseCtxMax:150000, baseUsage:.44, baseFiles:4,  baseKB:95,  growthRate:.2,  volatility:.03, pattern:'stable' },
  { name:'NOVA',        emoji:'💫', role:'Innovator',      baseCtxMax:200000, baseUsage:.73, baseFiles:13, baseKB:520, growthRate:2.0, volatility:.15, pattern:'high' },
  { name:'HAVEN',       emoji:'🏠', role:'Safe Space',     baseCtxMax:128000, baseUsage:.38, baseFiles:3,  baseKB:72,  growthRate:.1,  volatility:.02, pattern:'stable' },
  { name:'THEMIS',      emoji:'⚖️', role:'Justice',        baseCtxMax:170000, baseUsage:.56, baseFiles:7,  baseKB:235, growthRate:.7,  volatility:.06, pattern:'stable' },
  { name:'KIYOSAKI',    emoji:'💰', role:'Finance',        baseCtxMax:160000, baseUsage:.63, baseFiles:8,  baseKB:310, growthRate:1.3, volatility:.1,  pattern:'growing' },
  { name:'SELAH',       emoji:'🙏', role:'Meditation',     baseCtxMax:128000, baseUsage:.35, baseFiles:3,  baseKB:58,  growthRate:.05, volatility:.02, pattern:'stable' },
  { name:'Dr. Strange', emoji:'🔮', role:'Strategist',     baseCtxMax:200000, baseUsage:.81, baseFiles:15, baseKB:680, growthRate:2.8, volatility:.18, pattern:'accelerating' },
  { name:'Prophets',    emoji:'📜', role:'Foresight',      baseCtxMax:140000, baseUsage:.32, baseFiles:4,  baseKB:88,  growthRate:.15, volatility:.03, pattern:'stable' },
  { name:'MICHAEL',     emoji:'🗡️', role:'Protector',      baseCtxMax:180000, baseUsage:.67, baseFiles:9,  baseKB:355, growthRate:1.0, volatility:.08, pattern:'growing' },
  { name:'TheMAESTRO',  emoji:'🎼', role:'Orchestrator',   baseCtxMax:200000, baseUsage:.76, baseFiles:14, baseKB:590, growthRate:2.2, volatility:.14, pattern:'high' }
];

const MEM_FILE_NAMES = [
  'context_cache.bin','session_log.json','embeddings.vec','prompt_history.jsonl',
  'tool_results.db','conversation_state.bin','scratchpad.md','knowledge_index.idx',
  'agent_config.yaml','task_queue.json','memory_graph.bin','reflection_log.md',
  'planning_buffer.json','observation_store.bin','goal_tree.json'
];

// ========== STATE ==========
let simDay = 1;
let autoSpeed = 0;
let autoTimer = null;
let selectedAgent = null;
let currentFilter = 'all';
let currentSort = 'name';
let agents = [];
let alerts = [];

function initAgents() {
  agents = AGENTS_DEF.map((def, i) => {
    const fileCount = def.baseFiles;
    const files = [];
    const shuffled = [...MEM_FILE_NAMES].sort(() => Math.random() - .5);
    let totalKB = 0;
    for (let f = 0; f < fileCount; f++) {
      const sz = Math.round((def.baseKB / fileCount) * (.5 + Math.random()));
      files.push({ name: shuffled[f], sizeKB: sz });
      totalKB += sz;
    }
    const ctxUsed = Math.round(def.baseCtxMax * def.baseUsage);
    const history = [];
    for (let d = 0; d < 7; d++) {
      const noise = (Math.random() - .5) * def.volatility;
      const dayUsage = Math.max(.15, Math.min(.98, def.baseUsage + noise * (d / 6)));
      history.push(dayUsage);
    }
    const memHistory = [];
    for (let d = 0; d < 30; d++) {
      const growth = def.growthRate * (d / 30) * (1 + (Math.random() - .5) * .3);
      memHistory.push(Math.max(10, totalKB - def.growthRate * 15 + growth * d));
    }
    const pressureTimeline = [];
    for (let h = 0; h < 24; h++) {
      const base = def.baseUsage;
      const hourNoise = (Math.random() - .5) * def.volatility * 1.5;
      pressureTimeline.push(Math.max(.1, Math.min(.99, base + hourNoise)));
    }
    const minsAgo = Math.floor(Math.random() * 120);
    return {
      ...def, id: i, ctxUsed, totalKB, files,
      usageHistory: history,
      memHistory,
      pressureTimeline,
      lastActive: minsAgo,
      currentUsage: def.baseUsage
    };
  });
  generateInitialAlerts();
}

function generateInitialAlerts() {
  alerts = [];
  const templates = [
    { agent:'Atlas', type:'danger', msg:'exceeded 80% context pressure', icon:'🔴' },
    { agent:'Shuri', type:'warn',   msg:'memory files grew 15% in 24h', icon:'⚠️' },
    { agent:'TRIAGE', type:'ok',    msg:'context pressure normalized', icon:'✅' },
    { agent:'Dr. Strange', type:'danger', msg:'reached 81% context utilization — approaching overflow', icon:'🔴' },
    { agent:'NOVA', type:'warn',    msg:'memory footprint exceeded 500 KB', icon:'⚠️' },
    { agent:'TheMAESTRO', type:'warn', msg:'context growth rate accelerating (+2.2 KB/day)', icon:'⚠️' },
    { agent:'INK', type:'info',     msg:'new memory file created: reflection_log.md', icon:'📝' },
    { agent:'SELAH', type:'ok',     msg:'memory cleanup completed — freed 12 KB', icon:'✅' },
    { agent:'Aetherion', type:'warn', msg:'context window at 65% — trending upward', icon:'⚠️' },
    { agent:'HAVEN', type:'ok',     msg:'stable memory usage for 7 consecutive days', icon:'✅' },
    { agent:'Mercury', type:'info', msg:'session log rotated — 45 KB archived', icon:'📝' },
    { agent:'KIYOSAKI', type:'warn', msg:'embeddings.vec grew 22% overnight', icon:'⚠️' },
    { agent:'Shuri', type:'danger', msg:'spike detected — context jumped from 65% to 78%', icon:'🔴' },
    { agent:'Simons', type:'info',  msg:'scheduled memory compaction running', icon:'📝' },
    { agent:'Dr. Strange', type:'danger', msg:'15 memory files — highest in cluster', icon:'🔴' },
    { agent:'MICHAEL', type:'warn', msg:'context usage crossed 67% threshold', icon:'⚠️' },
    { agent:'Proximon', type:'ok',  msg:'pressure dropped below 55%', icon:'✅' },
    { agent:'Widow', type:'ok',     msg:'memory audit passed — no anomalies', icon:'✅' },
  ];
  templates.forEach((t, i) => {
    const minsAgo = (templates.length - i) * 7 + Math.floor(Math.random() * 5);
    const d = new Date(Date.now() - minsAgo * 60000);
    const ts = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false });
    alerts.push({ ...t, ts, timestamp: d.getTime() });
  });
  alerts.sort((a, b) => b.timestamp - a.timestamp);
}

// ========== SIMULATION ==========
function simulateDay() {
  simDay++;
  document.getElementById('simDayNum').textContent = simDay;
  agents.forEach(a => {
    let usageDelta = 0;
    switch (a.pattern) {
      case 'stable':
        usageDelta = (Math.random() - .5) * .03;
        break;
      case 'growing':
        usageDelta = .01 + Math.random() * .02;
        break;
      case 'high':
        usageDelta = .015 + Math.random() * .025;
        break;
      case 'spiky':
        usageDelta = Math.random() < .3 ? (.1 + Math.random() * .1) : (Math.random() - .5) * .04;
        break;
      case 'accelerating':
        usageDelta = .02 + Math.random() * .03 + (simDay * .002);
        break;
    }
    // Occasional cleanup event
    if (Math.random() < .08) {
      usageDelta = -(0.05 + Math.random() * .1);
      addAlert(a.name, 'ok', 'memory cleanup completed — freed ' + Math.round(Math.random() * 30 + 5) + ' KB', '✅');
    }
    a.currentUsage = Math.max(.1, Math.min(.98, a.currentUsage + usageDelta));
    a.ctxUsed = Math.round(a.baseCtxMax * a.currentUsage);
    // Update usage history
    a.usageHistory.push(a.currentUsage);
    if (a.usageHistory.length > 7) a.usageHistory.shift();
    // Memory growth
    const memGrowth = a.growthRate * (1 + (Math.random() - .5) * .4);
    a.totalKB = Math.max(10, a.totalKB + memGrowth);
    a.memHistory.push(a.totalKB);
    if (a.memHistory.length > 30) a.memHistory.shift();
    // File growth
    a.files.forEach(f => { f.sizeKB = Math.max(1, f.sizeKB + memGrowth / a.files.length * (0.5 + Math.random())); });
    // Occasional new file
    if (Math.random() < .03 && a.files.length < 15) {
      const unused = MEM_FILE_NAMES.filter(n => !a.files.find(f => f.name === n));
      if (unused.length) {
        const newFile = unused[Math.floor(Math.random() * unused.length)];
        a.files.push({ name: newFile, sizeKB: Math.round(5 + Math.random() * 20) });
        addAlert(a.name, 'info', 'new memory file created: ' + newFile, '📝');
      }
    }
    // Pressure timeline shift
    a.pressureTimeline.shift();
    a.pressureTimeline.push(a.currentUsage);
    // Last active
    a.lastActive = Math.floor(Math.random() * 30);
    // Generate alerts based on thresholds
    if (a.currentUsage > .8 && a.usageHistory[a.usageHistory.length - 2] <= .8) {
      addAlert(a.name, 'danger', 'exceeded 80% context pressure (' + Math.round(a.currentUsage * 100) + '%)', '🔴');
    } else if (a.currentUsage > .6 && a.currentUsage <= .8 && a.usageHistory[a.usageHistory.length - 2] <= .6) {
      addAlert(a.name, 'warn', 'context pressure entering warning zone (' + Math.round(a.currentUsage * 100) + '%)', '⚠️');
    } else if (a.currentUsage <= .6 && a.usageHistory[a.usageHistory.length - 2] > .6) {
      addAlert(a.name, 'ok', 'context pressure normalized (' + Math.round(a.currentUsage * 100) + '%)', '✅');
    }
  });
  renderAll();
}

function addAlert(agent, type, msg, icon) {
  const d = new Date();
  const ts = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false });
  alerts.unshift({ agent, type, msg, icon, ts, timestamp: d.getTime() });
  if (alerts.length > 50) alerts.pop();
}

// ========== RENDERING ==========
function getPressureColor(pct) {
  if (pct >= .8) return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
  if (pct >= .6) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim();
}

function getPressureClass(pct) {
  if (pct >= .8) return 'critical';
  if (pct >= .6) return 'warn';
  return 'ok';
}

function getTrend(history) {
  if (history.length < 2) return 'flat';
  const recent = history.slice(-3);
  const older = history.slice(-6, -3);
  if (!older.length) return 'flat';
  const recentAvg = recent.reduce((s, v) => s + v, 0) / recent.length;
  const olderAvg = older.reduce((s, v) => s + v, 0) / older.length;
  const diff = recentAvg - olderAvg;
  if (diff > .02) return 'up';
  if (diff < -.02) return 'down';
  return 'flat';
}

function renderStats() {
  const totalMem = agents.reduce((s, a) => s + a.totalKB, 0);
  const critCount = agents.filter(a => a.currentUsage >= .8).length;
  const avgUtil = agents.reduce((s, a) => s + a.currentUsage, 0) / agents.length;
  const totalGrowth = agents.reduce((s, a) => s + a.growthRate, 0);
  const html = `
    <div class="stat-card info">
      <div class="label">Total Memory Footprint</div>
      <div class="value">${(totalMem/1024).toFixed(1)} MB</div>
      <div class="sub">${agents.length} agents, ${agents.reduce((s,a)=>s+a.files.length,0)} files</div>
    </div>
    <div class="stat-card ${critCount > 0 ? 'critical' : 'ok'}">
      <div class="label">Critical Pressure (>80%)</div>
      <div class="value">${critCount}</div>
      <div class="sub">${critCount > 0 ? 'Immediate attention needed' : 'All agents healthy'}</div>
    </div>
    <div class="stat-card ${avgUtil >= .7 ? 'warn' : avgUtil >= .5 ? 'info' : 'ok'}">
      <div class="label">Avg Context Utilization</div>
      <div class="value">${(avgUtil*100).toFixed(1)}%</div>
      <div class="sub">Across all ${agents.length} agents</div>
    </div>
    <div class="stat-card ${totalGrowth > 15 ? 'warn' : 'ok'}">
      <div class="label">Memory Growth Rate</div>
      <div class="value">${totalGrowth.toFixed(1)} KB/day</div>
      <div class="sub">Combined daily growth</div>
    </div>
  `;
  document.getElementById('statsBar').innerHTML = html;
}

function drawGauge(canvas, pct) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 52 * dpr;
  canvas.height = 52 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = 26, cy = 26, r = 20, lw = 5;
  const startAngle = Math.PI * .75;
  const endAngle = Math.PI * 2.25;
  const sweepAngle = endAngle - startAngle;
  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = '#1c2333';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();
  // Value arc
  const valEnd = startAngle + sweepAngle * pct;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, valEnd);
  ctx.strokeStyle = getPressureColor(pct);
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function drawSparkline(canvas, data, color) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width = 80 * dpr;
  const h = canvas.height = 20 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cw = 80, ch = 20;
  if (!data.length) return;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * cw;
    const y = ch - ((v - min) / range) * (ch - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function renderAgentGrid() {
  let filtered = [...agents];
  if (currentFilter === 'critical') filtered = filtered.filter(a => a.currentUsage >= .8);
  else if (currentFilter === 'warning') filtered = filtered.filter(a => a.currentUsage >= .6 && a.currentUsage < .8);
  else if (currentFilter === 'healthy') filtered = filtered.filter(a => a.currentUsage < .6);

  if (currentSort === 'pressure') filtered.sort((a, b) => b.currentUsage - a.currentUsage);
  else if (currentSort === 'growth') filtered.sort((a, b) => b.growthRate - a.growthRate);
  else filtered.sort((a, b) => a.name.localeCompare(b.name));

  const grid = document.getElementById('agentGrid');
  grid.innerHTML = '';
  filtered.forEach(agent => {
    const pct = agent.currentUsage;
    const pclass = getPressureClass(pct);
    const trend = getTrend(agent.usageHistory);
    const trendArrow = trend === 'up' ? '↑' : trend === 'down' ? '↓' : '→';
    const trendClass = trend === 'up' ? 'trend-up' : trend === 'down' ? 'trend-down' : 'trend-flat';
    const isSelected = selectedAgent === agent.id;
    const isExpanded = isSelected;
    const card = document.createElement('div');
    card.className = `agent-card ${pclass === 'critical' ? 'critical-glow' : ''} ${isSelected ? 'selected expanded' : ''}`;
    card.dataset.id = agent.id;

    let filesHtml = '';
    if (isExpanded) {
      filesHtml = '<div class="detail-files">';
      agent.files.forEach(f => {
        filesHtml += `<div class="detail-file"><span class="fname">${f.name}</span><span class="fsize">${f.sizeKB.toFixed(1)} KB</span></div>`;
      });
      filesHtml += '<div class="sparkline-row"><canvas class="sparkline" width="80" height="20"></canvas><span class="sparkline-label">Memory trend (30d)</span></div>';
      filesHtml += '</div>';
    }

    const lastActiveStr = agent.lastActive < 1 ? 'Just now' : agent.lastActive + 'm ago';
    card.innerHTML = `
      <div class="card-header">
        <span class="name">${agent.emoji} ${agent.name}</span>
        <span style="font-size:10px;color:var(--muted)">${agent.role}</span>
      </div>
      <div class="gauge-row">
        <div class="gauge-container">
          <canvas class="gauge-canvas"></canvas>
          <div class="gauge-pct" style="color:${getPressureColor(pct)}">${Math.round(pct*100)}%</div>
        </div>
        <div class="gauge-info">
          <div class="row"><span class="lbl">Files</span><span class="val">${agent.files.length}</span></div>
          <div class="row"><span class="lbl">Memory</span><span class="val">${agent.totalKB.toFixed(0)} KB</span></div>
          <div class="row"><span class="lbl">Tokens</span><span class="val">${(agent.ctxUsed/1000).toFixed(0)}K / ${(agent.baseCtxMax/1000).toFixed(0)}K</span></div>
          <div class="token-bar-wrap"><div class="token-bar" style="width:${pct*100}%;background:${getPressureColor(pct)}"></div></div>
        </div>
      </div>
      <div class="card-footer">
        <span class="trend ${trendClass}">${trendArrow} ${trend === 'up' ? 'Growing' : trend === 'down' ? 'Shrinking' : 'Stable'}</span>
        <span class="ts">${lastActiveStr}</span>
      </div>
      <div class="card-details">${filesHtml}</div>
    `;
    card.addEventListener('click', () => {
      selectedAgent = selectedAgent === agent.id ? null : agent.id;
      renderAgentGrid();
      renderTimeline();
    });
    grid.appendChild(card);
    // Draw gauge
    const gaugeCanvas = card.querySelector('.gauge-canvas');
    drawGauge(gaugeCanvas, pct);
    // Draw sparkline if expanded
    if (isExpanded) {
      const sparkCanvas = card.querySelector('.sparkline');
      if (sparkCanvas) drawSparkline(sparkCanvas, agent.memHistory, getPressureColor(pct));
    }
  });
}

function renderGrowthChart() {
  const canvas = document.getElementById('growthChart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const colors = ['#58a6ff', '#f85149', '#bc8cff', '#39d2c0', '#f0883e'];
  const top5 = [...agents].sort((a, b) => b.growthRate - a.growthRate).slice(0, 5);

  // Find data bounds
  let allVals = [];
  top5.forEach(a => allVals.push(...a.memHistory));
  const minVal = Math.min(...allVals) * .9;
  const maxVal = Math.max(...allVals) * 1.05;
  const range = maxVal - minVal || 1;

  const padL = 42, padR = 10, padT = 10, padB = 24;
  const cw = w - padL - padR;
  const ch = h - padT - padB;

  // Grid
  ctx.strokeStyle = '#1e2d3d';
  ctx.lineWidth = .5;
  ctx.fillStyle = '#7d8590';
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + cw, y);
    ctx.stroke();
    const val = maxVal - (range / 4) * i;
    ctx.fillText(val.toFixed(0), padL - 4, y + 3);
  }
  // X labels
  ctx.textAlign = 'center';
  const days = top5[0]?.memHistory.length || 30;
  for (let i = 0; i < days; i += 5) {
    const x = padL + (i / (days - 1)) * cw;
    ctx.fillText('D' + (i + 1), x, h - 4);
  }

  // Lines
  top5.forEach((agent, ai) => {
    const data = agent.memHistory;
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = padL + (i / (data.length - 1)) * cw;
      const y = padT + ch - ((v - minVal) / range) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = colors[ai];
    ctx.lineWidth = 2;
    ctx.stroke();
    // End dot
    const lastX = padL + cw;
    const lastY = padT + ch - ((data[data.length - 1] - minVal) / range) * ch;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
    ctx.fillStyle = colors[ai];
    ctx.fill();
  });

  // Legend
  const legend = document.getElementById('chartLegend');
  legend.innerHTML = top5.map((a, i) => `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${a.name}</div>`).join('');
}

function renderAlerts() {
  const feed = document.getElementById('alertFeed');
  feed.innerHTML = alerts.slice(0, 25).map(a => `
    <div class="alert-item ${a.type}">
      ${a.icon} <strong>${a.agent}</strong> ${a.msg}
      <div class="alert-ts">${a.ts}</div>
    </div>
  `).join('');
}

function renderTimeline() {
  const grid = document.getElementById('timelineGrid');
  const sorted = [...agents].sort((a, b) => a.name.localeCompare(b.name));
  grid.innerHTML = sorted.map(agent => {
    const isHighlighted = selectedAgent === agent.id;
    const isDimmed = selectedAgent !== null && !isHighlighted;
    const rowClass = isHighlighted ? 'highlighted' : isDimmed ? 'dimmed' : '';
    const segs = agent.pressureTimeline.map(p => {
      let color;
      if (p >= .8) color = 'var(--danger)';
      else if (p >= .6) color = 'var(--warn)';
      else color = 'var(--accent2)';
      return `<div class="timeline-seg" style="flex:1;background:${color}"></div>`;
    }).join('');
    return `<div class="timeline-row ${rowClass}"><span class="tl-name">${agent.name}</span><div class="timeline-bar">${segs}</div></div>`;
  }).join('');

  // Hour labels
  const hoursDiv = document.getElementById('tlHours');
  let hourLabels = '';
  for (let h = 0; h < 24; h += 3) {
    hourLabels += `<span>${String(h).padStart(2, '0')}:00</span>`;
  }
  hoursDiv.innerHTML = hourLabels;
}

function renderAll() {
  renderStats();
  renderAgentGrid();
  renderGrowthChart();
  renderAlerts();
  renderTimeline();
}

// ========== CONTROLS ==========
document.querySelectorAll('.filter-group .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-group .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAgentGrid();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  renderAgentGrid();
});

document.getElementById('simDayBtn').addEventListener('click', simulateDay);

const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
const speedMap = [0, 2000, 1000, 500, 250, 100];
const speedNames = ['Off', '0.5x', '1x', '2x', '4x', '10x'];

speedSlider.addEventListener('input', () => {
  const val = parseInt(speedSlider.value);
  autoSpeed = speedMap[val];
  speedLabel.textContent = speedNames[val];
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (autoSpeed > 0) {
    autoTimer = setInterval(simulateDay, autoSpeed);
  }
});

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  renderGrowthChart();
});

// ========== INIT ==========
initAgents();
renderAll();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Code Path Visualizer | NOVA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a12; color: #e2e8f0; line-height: 1.6;
      max-width: 720px; margin: 0 auto; padding: 2rem 1rem;
    }
    .header { margin-bottom: 2rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #a855f7; }
    .subtitle { color: #94a3b8; margin-bottom: 1.5rem; }
    .card { 
      background: rgba(30, 41, 59, 0.5); border: 1px solid #334155;
      border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .upload-area {
      border: 2px dashed #475569; border-radius: 0.5rem;
      padding: 2rem; text-align: center; background: rgba(71, 85, 105, 0.1);
      margin-bottom: 1.5rem; cursor: pointer;
    }
    .upload-area:hover { border-color: #a855f7; }
    .controls { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
    button {
      background: #4338ca; color: white; border: none; padding: 0.75rem 1.5rem;
      border-radius: 0.5rem; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #3730a3; }
    canvas { 
      width: 100%; height: 400px; background: #1e293b;
      border-radius: 0.5rem; margin: 1rem 0;
    }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .stat { background: rgba(30, 41, 59, 0.7); padding: 1rem; border-radius: 0.5rem; }
    .error { color: #f87171; background: rgba(220, 38, 38, 0.1); padding: 1rem; border-radius: 0.5rem; }
    pre { background: #1e293b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1>G-Code Path Visualizer</h1>
    <div class="subtitle">Upload any .gcode file to visualize toolpaths in 3D</div>
  </div>

  <div class="card">
    <div class="upload-area" id="dropZone">
      <div>📁 Drag & drop .gcode file here</div>
      <div style="margin-top: 0.5rem; font-size: 0.875rem; color: #94a3b8;">or click to browse</div>
    </div>
    <input type="file" id="fileInput" accept=".gcode,.txt" style="display: none;">
    
    <div class="controls">
      <button onclick="loadDemo()">Load Demo (Benchy)</button>
      <button onclick="resetView()" id="resetBtn" disabled>Reset View</button>
      <button onclick="exportView()" id="exportBtn" disabled>Export PNG</button>
    </div>

    <div style="margin: 1rem 0;">
      <label>Layer: <input type="range" id="layerSlider" min="0" max="100" value="0" style="width: 200px;" disabled></label>
      <span id="layerLabel">0/100</span>
    </div>

    <canvas id="canvas"></canvas>

    <div class="stats" id="stats">
      <div class="stat">Total Layers: <span id="totalLayers">0</span></div>
      <div class="stat">Toolpath Length: <span id="pathLength">0 mm</span></div>
      <div class="stat">Extrusion: <span id="extrusion">0 mm</span></div>
      <div class="stat">Travel Moves: <span id="travelMoves">0</span></div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom: 1rem;">G-Code Preview</h3>
    <pre id="codePreview">No file loaded yet. Try the demo or upload your own.</pre>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const layerSlider = document.getElementById('layerSlider');
    const layerLabel = document.getElementById('layerLabel');
    const codePreview = document.getElementById('codePreview');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');

    let gcodeData = [];
    let currentLayer = 0;
    let totalLayers = 0;

    // Set canvas size
    function resizeCanvas() {
      canvas.width = canvas.clientWidth * 2;
      canvas.height = canvas.clientHeight * 2;
      draw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // File handling
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#a855f7';
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '#475569';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#475569';
      const file = e.dataTransfer.files[0];
      if (file && file.name.match(/\.(gcode|txt)$/i)) {
        loadFile(file);
      }
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadFile(file);
    });

    // Parse G-code
    function parseGCode(text) {
      const lines = text.split('\n');
      const layers = [];
      let currentLayer = [];
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith(';LAYER:')) {
          if (currentLayer.length > 0) {
            layers.push([...currentLayer]);
            currentLayer = [];
          }
        }
        if (line && !line.startsWith(';')) {
          currentLayer.push(line);
        }
      }
      if (currentLayer.length > 0) layers.push(currentLayer);
      
      return layers;
    }

    // Load file
    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          gcodeData = parseGCode(e.target.result);
          totalLayers = gcodeData.length;
          currentLayer = 0;
          
          updateUI();
          draw();
          codePreview.textContent = e.target.result.substring(0, 2000) + (e.target.result.length > 2000 ? '\n...' : '');
          resetBtn.disabled = false;
          exportBtn.disabled = false;
          layerSlider.disabled = false;
          layerSlider.max = Math.max(0, totalLayers - 1);
          layerSlider.value = 0;
          
          document.getElementById('totalLayers').textContent = totalLayers;
          document.getElementById('pathLength').textContent = 'Calculating...';
          document.getElementById('extrusion').textContent = 'Calculating...';
          document.getElementById('travelMoves').textContent = 'Calculating...';
        } catch (err) {
          showError('Failed to parse G-code: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Demo
    function loadDemo() {
      const demoGCode = `; Generated by Bambu Studio
; LAYER_COUNT: 50
; LAYER:0
M107
G1 F1500 E-6.5
;LAYER:1
G0 F6000 X100 Y100 Z0.3
G1 F1500 E0
G1 F600 X110 Y100 E0.012
;LAYER:2
G0 F6000 X110 Y110 Z0.6
G1 F600 X100 Y110 E0.024
; Demo continues...`;
      gcodeData = parseGCode(demoGCode);
      totalLayers = gcodeData.length;
      currentLayer = 0;
      updateUI();
      draw();
      codePreview.textContent = demoGCode;
      resetBtn.disabled = false;
      exportBtn.disabled = false;
      layerSlider.disabled = false;
      layerSlider.max = Math.max(0, totalLayers - 1);
      layerSlider.value = 0;
      document.getElementById('totalLayers').textContent = totalLayers;
      document.getElementById('pathLength').textContent = '~1200 mm';
      document.getElementById('extrusion').textContent = '~850 mm';
      document.getElementById('travelMoves').textContent = '42';
    }

    // Drawing
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (gcodeData.length === 0) return;
      
      const scale = Math.min(canvas.width, canvas.height) * 0.8 / 200;
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 2;
      ctx.beginPath();
      
      // Simple visualization
      const layer = gcodeData[currentLayer] || [];
      for (let i = 0; i < layer.length; i++) {
        const line = layer[i];
        if (line.includes('X') && line.includes('Y')) {
          const xMatch = line.match(/X([\d\.]+)/);
          const yMatch = line.match(/Y([\d\.]+)/);
          if (xMatch && yMatch) {
            const x = parseFloat(xMatch[1]) * scale + centerX;
            const y = parseFloat(yMatch[1]) * scale + centerY;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
        }
      }
      ctx.stroke();
    }

    // UI updates
    function updateUI() {
      layerLabel.textContent = `${currentLayer + 1}/${totalLayers}`;
      draw();
    }

    layerSlider.addEventListener('input', (e) => {
      currentLayer = parseInt(e.target.value);
      updateUI();
    });

    function resetView() {
      currentLayer = 0;
      layerSlider.value = 0;
      updateUI();
    }

    function exportView() {
      const link = document.createElement('a');
      link.download = 'gcode-visualization.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function showError(msg) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.textContent = msg;
      document.body.insertBefore(errorDiv, document.body.firstChild);
      setTimeout(() => errorDiv.remove(), 5000);
    }

    // Initialize
    loadDemo();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Task Pipeline — RAMICHE Ops</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--text:#e0e0e8;
  --dim:#6b6b80;--accent:#7c5cff;--accent2:#00d4aa;
  --queued:#3b82f6;--running:#f59e0b;--verifying:#a855f7;--done:#22c55e;
  --failed:#ef4444;--blocked:#6b7280;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',Monaco,'Cascadia Code',monospace;overflow-x:hidden}
.header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:600;letter-spacing:0.5px}
.header h1 span{color:var(--accent);font-weight:700}
.header .meta{font-size:11px;color:var(--dim)}
.header .live{display:inline-flex;align-items:center;gap:6px}
.header .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.dashboard{display:grid;grid-template-columns:1fr 320px;grid-template-rows:auto 1fr;gap:0;height:calc(100vh - 61px)}

/* Top Stats Bar */
.stats-bar{grid-column:1/-1;display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{flex:1;background:var(--surface);padding:14px 20px;display:flex;flex-direction:column;gap:4px}
.stat .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stat .value{font-size:22px;font-weight:700}
.stat .value.queued{color:var(--queued)}.stat .value.running{color:var(--running)}
.stat .value.verifying{color:var(--verifying)}.stat .value.done{color:var(--done)}
.stat .value.failed{color:var(--failed)}
.stat .delta{font-size:10px;color:var(--accent2)}

/* Kanban Pipeline */
.pipeline{display:flex;gap:1px;background:var(--border);overflow-x:auto;padding:0}
.lane{flex:1;min-width:200px;background:var(--surface);display:flex;flex-direction:column}
.lane-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
.lane-header .title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.lane-header .title::before{content:'';width:8px;height:8px;border-radius:2px}
.lane.queued .lane-header .title::before{background:var(--queued)}
.lane.running .lane-header .title::before{background:var(--running)}
.lane.verifying .lane-header .title::before{background:var(--verifying)}
.lane.done .lane-header .title::before{background:var(--done)}
.lane.failed .lane-header .title::before{background:var(--failed)}
.lane.blocked .lane-header .title::before{background:var(--blocked)}
.lane-header .count{font-size:11px;color:var(--dim);background:var(--bg);padding:2px 8px;border-radius:10px}
.lane-body{flex:1;overflow-y:auto;padding:8px}

/* Task Cards */
.card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color 0.2s,transform 0.15s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card .task-id{font-size:9px;color:var(--dim);margin-bottom:4px}
.card .task-name{font-size:12px;font-weight:500;margin-bottom:6px;line-height:1.4}
.card .task-meta{display:flex;align-items:center;justify-content:space-between;gap:6px}
.card .agent-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.card .agent-badge.infra{background:#7c5cff20;color:#7c5cff;border:1px solid #7c5cff30}
.card .agent-badge.creative{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b30}
.card .agent-badge.business{background:#00d4aa20;color:#00d4aa;border:1px solid #00d4aa30}
.card .time{font-size:9px;color:var(--dim)}
.card .priority{position:absolute;top:0;right:8px;font-size:8px;padding:1px 5px;border-radius:0 0 3px 3px}
.card{position:relative}
.card .priority.urgent{background:var(--failed);color:white}
.card .priority.high{background:var(--running);color:#000}
.card .deps{font-size:9px;color:var(--blocked);margin-top:4px;font-style:italic}

/* Right Sidebar */
.sidebar{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px}

/* Agent Utilization */
.agent-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.agent-row .name{font-size:11px;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-row .bar-bg{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.agent-row .bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.agent-row .pct{font-size:10px;color:var(--dim);width:32px;text-align:right}

/* Dependency Graph */
.dep-graph{position:relative;height:180px;overflow:hidden}
.dep-node{position:absolute;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:2px solid;cursor:pointer;transition:transform 0.2s}
.dep-node:hover{transform:scale(1.2);z-index:10}
.dep-edge{position:absolute;height:2px;transform-origin:left center;opacity:0.3}

/* Timeline */
.timeline{flex:1;overflow-y:auto;padding:0 16px 16px}
.timeline-event{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.timeline-event .time-col{font-size:9px;color:var(--dim);width:40px;flex-shrink:0;padding-top:2px}
.timeline-event .content{font-size:11px;line-height:1.4}
.timeline-event .content .agent{font-weight:600}

/* Throughput mini chart */
.throughput-chart{display:flex;align-items:flex-end;gap:2px;height:40px;margin-top:6px}
.throughput-bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;transition:height 0.4s ease;opacity:0.7}
.throughput-bar:hover{opacity:1}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideIn 0.3s ease}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <h1><span>◆</span> AGENT TASK PIPELINE <span style="color:var(--dim);font-weight:400">— RAMICHE OPS</span></h1>
  <div class="meta">
    <span class="live">LIVE</span> · <span id="clock"></span> · Refresh: 4s
  </div>
</div>

<div class="dashboard">
  <div class="stats-bar" id="statsBar"></div>
  <div class="pipeline" id="pipeline"></div>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Agent Utilization</h3>
      <div id="utilization"></div>
    </div>
    <div class="sidebar-section">
      <h3>Dependency Graph</h3>
      <div class="dep-graph" id="depGraph">
        <canvas id="depCanvas" width="288" height="180"></canvas>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Throughput (24h)</h3>
      <div class="throughput-chart" id="throughput"></div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <h3>Event Log</h3>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// === RAMICHE Agent Registry ===
const AGENTS = [
  {id:'atlas',name:'Atlas',lane:'infra',color:'#7c5cff'},
  {id:'proximon',name:'Proximon',lane:'infra',color:'#7c5cff'},
  {id:'shuri',name:'Shuri',lane:'creative',color:'#f59e0b'},
  {id:'aetherion',name:'Aetherion',lane:'creative',color:'#f59e0b'},
  {id:'maestro',name:'TheMAESTRO',lane:'creative',color:'#f59e0b'},
  {id:'vee',name:'Vee',lane:'creative',color:'#f59e0b'},
  {id:'simons',name:'Simons',lane:'business',color:'#00d4aa'},
  {id:'mercury',name:'Mercury',lane:'business',color:'#00d4aa'},
  {id:'echo',name:'ECHO',lane:'business',color:'#00d4aa'},
  {id:'ink',name:'INK',lane:'creative',color:'#f59e0b'},
  {id:'widow',name:'Widow',lane:'infra',color:'#7c5cff'},
  {id:'triage',name:'TRIAGE',lane:'infra',color:'#7c5cff'},
  {id:'nova',name:'NOVA',lane:'creative',color:'#f59e0b'},
  {id:'themis',name:'THEMIS',lane:'business',color:'#00d4aa'},
  {id:'kiyosaki',name:'KIYOSAKI',lane:'business',color:'#00d4aa'},
  {id:'selah',name:'SELAH',lane:'business',color:'#00d4aa'},
  {id:'strange',name:'Dr. Strange',lane:'business',color:'#00d4aa'},
  {id:'prophets',name:'Prophets',lane:'business',color:'#00d4aa'},
  {id:'michael',name:'MICHAEL',lane:'business',color:'#00d4aa'},
  {id:'haven',name:'HAVEN',lane:'business',color:'#00d4aa'},
];

const STATES = ['queued','running','verifying','done','failed','blocked'];
const STATE_COLORS = {queued:'#3b82f6',running:'#f59e0b',verifying:'#a855f7',done:'#22c55e',failed:'#ef4444',blocked:'#6b7280'};

// === Simulated Task Generator ===
const TASK_TEMPLATES = [
  {name:'Deploy Stripe Connect webhook handler',agent:'shuri',lane:'creative',priority:'urgent',deps:[]},
  {name:'Audit Supabase RLS policies',agent:'widow',lane:'infra',priority:'high',deps:[]},
  {name:'Build Grit Coins ledger schema',agent:'proximon',lane:'infra',priority:'high',deps:['T-001']},
  {name:'Design athlete onboarding flow',agent:'aetherion',lane:'creative',priority:'normal',deps:[]},
  {name:'Coach portal: add roster import',agent:'shuri',lane:'creative',priority:'urgent',deps:[]},
  {name:'Pricing page A/B test setup',agent:'simons',lane:'business',priority:'normal',deps:['T-004']},
  {name:'Generate GA merch product shots',agent:'aetherion',lane:'creative',priority:'normal',deps:[]},
  {name:'METTLE email drip sequence',agent:'vee',lane:'creative',priority:'normal',deps:['T-006']},
  {name:'Command Center: wire live agent data',agent:'proximon',lane:'infra',priority:'high',deps:[]},
  {name:'Legal review: Grit Coins ToS',agent:'themis',lane:'business',priority:'high',deps:['T-003']},
  {name:'Collector tier progression API',agent:'shuri',lane:'creative',priority:'normal',deps:['T-003']},
  {name:'Weekly revenue dashboard widget',agent:'kiyosaki',lane:'business',priority:'normal',deps:[]},
  {name:'Parent portal notification system',agent:'shuri',lane:'creative',priority:'normal',deps:['T-005']},
  {name:'Gateway health endpoint monitor',agent:'triage',lane:'infra',priority:'high',deps:[]},
  {name:'Social content calendar pipeline',agent:'echo',lane:'business',priority:'normal',deps:['T-008']},
  {name:'3D print queue optimization',agent:'nova',lane:'creative',priority:'normal',deps:[]},
  {name:'Swim session analytics engine',agent:'simons',lane:'business',priority:'high',deps:['T-005']},
  {name:'Brand voice consistency audit',agent:'ink',lane:'creative',priority:'normal',deps:[]},
  {name:'Agent fallback chain stress test',agent:'proximon',lane:'infra',priority:'urgent',deps:['T-014']},
  {name:'Customer support playbook v2',agent:'haven',lane:'business',priority:'normal',deps:[]},
];

let tasks = [];
let taskIdCounter = 0;
let events = [];
let throughputData = Array(24).fill(0).map(()=>Math.floor(Math.random()*30)+5);
let agentUtilization = {};
AGENTS.forEach(a => agentUtilization[a.id] = Math.random()*0.6+0.1);

function genTaskId(){return `T-${String(++taskIdCounter).padStart(3,'0')}`}

function initTasks(){
  TASK_TEMPLATES.forEach((t,i)=>{
    const stateIdx = i<3?3:i<6?2:i<10?1:i<14?0:Math.random()>0.8?4:0;
    tasks.push({
      id:genTaskId(),
      name:t.name,
      agent:t.agent,
      lane:t.lane,
      state:STATES[stateIdx],
      priority:t.priority,
      deps:t.deps,
      created:Date.now()-Math.random()*3600000,
      elapsed:Math.floor(Math.random()*45)+1
    });
  });
}

// === Render Functions ===
function renderStats(){
  const counts = {};
  STATES.forEach(s=>counts[s]=tasks.filter(t=>t.state===s).length);
  const totalDone = counts.done;
  const avgTime = tasks.filter(t=>t.state==='done').reduce((a,t)=>a+t.elapsed,0)/(totalDone||1);
  const html = [
    {label:'Queued',value:counts.queued,cls:'queued'},
    {label:'Running',value:counts.running,cls:'running'},
    {label:'Verifying',value:counts.verifying,cls:'verifying'},
    {label:'Completed',value:counts.done,cls:'done',delta:`+${Math.floor(Math.random()*3)+1} last hr`},
    {label:'Failed',value:counts.failed,cls:'failed'},
    {label:'Blocked',value:counts.blocked,cls:'blocked'},
    {label:'Avg Time',value:`${avgTime.toFixed(0)}m`,cls:'',delta:'p50 across fleet'},
    {label:'Active Agents',value:AGENTS.filter(a=>tasks.some(t=>t.agent===a.id&&t.state==='running')).length+'/'+AGENTS.length,cls:''},
  ].map(s=>`<div class="stat"><span class="label">${s.label}</span><span class="value ${s.cls}">${s.value}</span>${s.delta?`<span class="delta">${s.delta}</span>`:''}</div>`).join('');
  document.getElementById('statsBar').innerHTML=html;
}

function renderPipeline(){
  const lanes = ['queued','running','verifying','done','failed','blocked'];
  const laneNames = {queued:'Queued',running:'Running',verifying:'Verifying',done:'Done',failed:'Failed',blocked:'Blocked'};
  const html = lanes.map(state=>{
    const laneTasks = tasks.filter(t=>t.state===state).sort((a,b)=>{
      const p={urgent:0,high:1,normal:2};return(p[a.priority]||2)-(p[b.priority]||2);
    });
    const cards = laneTasks.map(t=>{
      const ag = AGENTS.find(a=>a.id===t.agent);
      return `<div class="card" data-id="${t.id}">
        ${t.priority!=='normal'?`<span class="priority ${t.priority}">${t.priority.toUpperCase()}</span>`:''}
        <div class="task-id">${t.id}</div>
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="agent-badge ${ag?ag.lane:''}">${ag?ag.name:'?'}</span>
          <span class="time">${t.elapsed}m</span>
        </div>
        ${t.deps.length?`<div class="deps">⛓ ${t.deps.join(', ')}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="lane ${state}">
      <div class="lane-header">
        <span class="title">${laneNames[state]}</span>
        <span class="count">${laneTasks.length}</span>
      </div>
      <div class="lane-body">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('pipeline').innerHTML=html;
}

function renderUtilization(){
  const active = AGENTS.filter(a=>tasks.some(t=>t.agent===a.id&&['running','verifying'].includes(t.state)));
  const sorted = [...AGENTS].sort((a,b)=>(agentUtilization[b.id]||0)-(agentUtilization[a.id]||0)).slice(0,10);
  document.getElementById('utilization').innerHTML = sorted.map(a=>{
    const pct = Math.round((agentUtilization[a.id]||0)*100);
    const color = pct>80?'var(--failed)':pct>50?'var(--running)':'var(--accent2)';
    return `<div class="agent-row">
      <span class="name">${a.name}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderDepGraph(){
  const canvas = document.getElementById('depCanvas');
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Position tasks with deps in a force-directed-ish layout
  const withDeps = tasks.filter(t=>t.deps.length>0).slice(0,8);
  const allIds = new Set();
  withDeps.forEach(t=>{allIds.add(t.id);t.deps.forEach(d=>allIds.add(d))});
  const nodes = [...allIds].map((id,i)=>{
    const t=tasks.find(x=>x.id===id);
    const angle = (i/allIds.size)*Math.PI*2;
    const r = 60;
    return {id, x:W/2+Math.cos(angle)*r, y:H/2+Math.sin(angle)*r, task:t};
  });

  // Draw edges
  withDeps.forEach(t=>{
    const to=nodes.find(n=>n.id===t.id);
    if(!to)return;
    t.deps.forEach(d=>{
      const from=nodes.find(n=>n.id===d);
      if(!from)return;
      ctx.beginPath();
      ctx.moveTo(from.x,from.y);
      ctx.lineTo(to.x,to.y);
      ctx.strokeStyle='rgba(124,92,255,0.25)';
      ctx.lineWidth=1.5;
      ctx.stroke();
      // Arrow
      const angle=Math.atan2(to.y-from.y,to.x-from.x);
      const ax=to.x-Math.cos(angle)*20,ay=to.y-Math.sin(angle)*20;
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax-8*Math.cos(angle-0.4),ay-8*Math.sin(angle-0.4));
      ctx.lineTo(ax-8*Math.cos(angle+0.4),ay-8*Math.sin(angle+0.4));
      ctx.closePath();
      ctx.fillStyle='rgba(124,92,255,0.4)';
      ctx.fill();
    });
  });

  // Draw nodes
  nodes.forEach(n=>{
    const color = n.task?STATE_COLORS[n.task.state]:'#6b7280';
    ctx.beginPath();
    ctx.arc(n.x,n.y,14,0,Math.PI*2);
    ctx.fillStyle=color+'30';
    ctx.fill();
    ctx.strokeStyle=color;
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle='#e0e0e8';
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(n.id,n.x,n.y);
  });
}

function renderThroughput(){
  const max=Math.max(...throughputData,1);
  document.getElementById('throughput').innerHTML=throughputData.map((v,i)=>
    `<div class="throughput-bar" style="height:${(v/max)*100}%" title="${i}:00 — ${v} tasks"></div>`
  ).join('');
}

function renderTimeline(){
  const el=document.getElementById('timeline');
  el.innerHTML=events.slice(-15).reverse().map(e=>
    `<div class="timeline-event">
      <span class="time-col">${e.time}</span>
      <div class="content"><span class="agent" style="color:${e.color}">${e.agent}</span> ${e.text}</div>
    </div>`
  ).join('');
}

function renderClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour12:false});
}

// === Simulation Engine ===
function addEvent(agent,text){
  const ag=AGENTS.find(a=>a.id===agent)||{name:agent,color:'#7c5cff'};
  const now=new Date();
  events.push({
    time:now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'}),
    agent:ag.name,
    color:ag.color,
    text
  });
  if(events.length>50)events.shift();
}

function simulate(){
  // Advance a random running task to verifying
  const running=tasks.filter(t=>t.state==='running');
  if(running.length>0&&Math.random()>0.5){
    const t=running[Math.floor(Math.random()*running.length)];
    t.state='verifying';
    t.elapsed+=Math.floor(Math.random()*5)+1;
    addEvent(t.agent,`moved <strong>${t.id}</strong> to VERIFYING`);
  }

  // Advance a verifying task to done (or failed)
  const verifying=tasks.filter(t=>t.state==='verifying');
  if(verifying.length>0&&Math.random()>0.4){
    const t=verifying[Math.floor(Math.random()*verifying.length)];
    if(Math.random()>0.15){
      t.state='done';
      addEvent(t.agent,`completed <strong>${t.id}</strong> ✓`);
      // Unblock dependents
      tasks.filter(x=>x.state==='blocked'&&x.deps.includes(t.id)).forEach(x=>{
        x.deps=x.deps.filter(d=>d!==t.id);
        if(x.deps.length===0){x.state='queued';addEvent(x.agent,`<strong>${x.id}</strong> unblocked → QUEUED`);}
      });
    } else {
      t.state='failed';
      addEvent(t.agent,`<strong>${t.id}</strong> FAILED — retrying`);
    }
  }

  // Move queued to running
  const queued=tasks.filter(t=>t.state==='queued');
  if(queued.length>0&&Math.random()>0.3){
    const t=queued[Math.floor(Math.random()*queued.length)];
    t.state='running';
    addEvent(t.agent,`picked up <strong>${t.id}</strong>`);
  }

  // Retry failed tasks
  const failed=tasks.filter(t=>t.state==='failed');
  if(failed.length>0&&Math.random()>0.7){
    const t=failed[Math.floor(Math.random()*failed.length)];
    t.state='queued';
    addEvent(t.agent,`retrying <strong>${t.id}</strong>`);
  }

  // Occasionally spawn new tasks
  if(Math.random()>0.85&&tasks.length<30){
    const tpl=TASK_TEMPLATES[Math.floor(Math.random()*TASK_TEMPLATES.length)];
    const newTask={id:genTaskId(),name:tpl.name+' (v2)',agent:tpl.agent,lane:tpl.lane,state:'queued',priority:tpl.priority,deps:[],created:Date.now(),elapsed:0};
    tasks.push(newTask);
    addEvent(newTask.agent,`new task <strong>${newTask.id}</strong> queued`);
  }

  // Update agent utilization
  AGENTS.forEach(a=>{
    const active=tasks.filter(t=>t.agent===a.id&&['running','verifying'].includes(t.state)).length;
    const total=tasks.filter(t=>t.agent===a.id).length||1;
    agentUtilization[a.id]=agentUtilization[a.id]*0.7+(active/Math.min(total,3))*0.3;
  });

  // Shift throughput
  if(Math.random()>0.8){
    throughputData.shift();
    throughputData.push(Math.floor(Math.random()*35)+8);
  }

  tasks.forEach(t=>t.elapsed+=Math.floor(Math.random()*2));
}

// === Init ===
initTasks();
// Seed some blocked tasks
tasks.filter(t=>t.deps.length>0&&t.state==='queued').slice(0,2).forEach(t=>{
  if(!tasks.some(x=>x.id===t.deps[0]&&x.state==='done')){t.state='blocked';}
});
// Seed initial events
addEvent('atlas','Pipeline initialized — 20 tasks loaded');
addEvent('proximon','Agent health checks passed ✓');
addEvent('shuri','Frontend build queue: 3 tasks');
addEvent('widow','Security scan started');

function render(){
  renderStats();renderPipeline();renderUtilization();renderDepGraph();renderThroughput();renderTimeline();renderClock();
}
render();
setInterval(()=>{simulate();render();},4000);
setInterval(renderClock,1000);
</script>

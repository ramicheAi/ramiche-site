<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" fill="none">
  <!--
    METTLE v5 Full Logo — Icon left, wordmark right, vertically centered
  -->
  <defs>
    <linearGradient id="goldFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C36A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
  </defs>

  <!-- === ICON (scaled to fit left side, 0-100 x range) === -->
  <g transform="translate(5,0) scale(0.85)">
    <!-- Anvil base -->
    <polygon points="20,108 100,108 92,98 28,98" fill="#3A1078"/>
    <polygon points="28,98 92,98 88,93 32,93" fill="#4C1A8A"/>
    <line x1="28" y1="98" x2="92" y2="98" stroke="#D4A843" stroke-width="1.2"/>

    <!-- M facets -->
    <polygon points="22,93 36,93 36,30 22,38" fill="#1E3A6E"/>
    <polygon points="36,30 36,56 60,80 60,54" fill="#B8001F"/>
    <polygon points="52,54 60,28 68,54 60,80" fill="#D4A843" opacity="0.15"/>
    <polygon points="56,50 60,32 64,50 60,68" fill="#D4A843" opacity="0.25"/>
    <polygon points="60,54 60,80 84,56 84,30" fill="#4C1A8A"/>
    <polygon points="84,30 84,93 98,93 98,38" fill="#1E3A6E"/>

    <!-- Gold seams -->
    <line x1="36" y1="30" x2="36" y2="93" stroke="#D4A843" stroke-width="1.4"/>
    <line x1="36" y1="30" x2="60" y2="54" stroke="#D4A843" stroke-width="1.4"/>
    <line x1="36" y1="56" x2="60" y2="80" stroke="#D4A843" stroke-width="1"/>
    <line x1="60" y1="54" x2="84" y2="30" stroke="#D4A843" stroke-width="1.4"/>
    <line x1="60" y1="80" x2="84" y2="56" stroke="#D4A843" stroke-width="1"/>
    <line x1="84" y1="30" x2="84" y2="93" stroke="#D4A843" stroke-width="1.4"/>
    <line x1="22" y1="93" x2="98" y2="93" stroke="#D4A843" stroke-width="1"/>
    <line x1="22" y1="38" x2="36" y2="30" stroke="#D4A843" stroke-width="1.2"/>
    <line x1="84" y1="30" x2="98" y2="38" stroke="#D4A843" stroke-width="1.2"/>

    <!-- Flame tip -->
    <polygon points="57,32 60,18 63,32" fill="#D4A843" opacity="0.6"/>
    <polygon points="58.5,30 60,22 61.5,30" fill="#E8C36A" opacity="0.5"/>
  </g>

  <!-- === WORDMARK (right side) === -->
  <text x="230" y="72" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
        font-weight="900" font-size="36" letter-spacing="10"
        fill="url(#goldFull)">METTLE</text>

  <!-- Gold underline -->
  <line x1="140" y1="82" x2="320" y2="82" stroke="#D4A843" stroke-width="1.2"/>
  <!-- Scarlet center accent -->
  <line x1="215" y1="82" x2="245" y2="82" stroke="#B8001F" stroke-width="1.2"/>
</svg>

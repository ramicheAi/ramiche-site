<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="goldEdgeF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8862A"/>
      <stop offset="25%" stop-color="#F0D478"/>
      <stop offset="50%" stop-color="#FFFBE6"/>
      <stop offset="75%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
    <linearGradient id="purpleF" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4A1A99"/>
      <stop offset="100%" stop-color="#1E0940"/>
    </linearGradient>
    <linearGradient id="scarletF" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#CC1230"/>
      <stop offset="100%" stop-color="#6E0A1A"/>
    </linearGradient>
    <linearGradient id="navyF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A6E"/>
      <stop offset="100%" stop-color="#0C1C38"/>
    </linearGradient>
    <linearGradient id="sparkF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="50%" stop-color="#F0D478"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <linearGradient id="goldTextF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D478"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A67C28"/>
    </linearGradient>
    <radialGradient id="glowF" cx="0.5" cy="0.65" r="0.35">
      <stop offset="0%" stop-color="#F0D478" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F0D478" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ICON (scaled to left side) -->
  <g transform="translate(8,12) scale(0.8)">
    <circle cx="60" cy="78" r="30" fill="url(#glowF)"/>
    <polygon points="22,94 36,94 36,30 22,38" fill="url(#navyF)"/>
    <polygon points="36,30 36,54 60,78 60,54" fill="url(#scarletF)"/>
    <polygon points="60,54 60,78 84,54 84,30" fill="url(#purpleF)"/>
    <polygon points="84,30 84,94 98,94 98,38" fill="url(#navyF)"/>
    <polyline points="22,94 22,38 36,30 36,54 60,78 84,54 84,30 98,38 98,94"
      stroke="url(#goldEdgeF)" stroke-width="2.5" stroke-linejoin="miter" fill="none"/>
    <line x1="22" y1="94" x2="36" y2="94" stroke="url(#goldEdgeF)" stroke-width="2.5"/>
    <line x1="84" y1="94" x2="98" y2="94" stroke="url(#goldEdgeF)" stroke-width="2.5"/>
    <line x1="36" y1="30" x2="36" y2="94" stroke="#D4A843" stroke-width="1" opacity="0.35"/>
    <line x1="84" y1="30" x2="84" y2="94" stroke="#D4A843" stroke-width="1" opacity="0.35"/>
    <polygon points="60,72 66,80 60,88 54,80" fill="url(#sparkF)" opacity="0.9"/>
    <polygon points="60,75 63.5,80 60,85 56.5,80" fill="#FFFBE6" opacity="0.8"/>
  </g>

  <!-- WORDMARK -->
  <text x="260" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue','Arial Black',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="38" letter-spacing="16"
        fill="url(#goldTextF)">METTLE</text>

  <!-- Subtle underline -->
  <line x1="142" y1="78" x2="378" y2="78" stroke="#D4A843" stroke-width="1" opacity="0.35"/>
</svg>

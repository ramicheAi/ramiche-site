<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!--
    METTLE v5 Full Logo — Icon + Wordmark horizontal lockup
    Refined, gold-outlined, sophisticated
  -->
  <defs>
    <linearGradient id="goldEdgeF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9973A"/>
      <stop offset="35%" stop-color="#F0D478"/>
      <stop offset="65%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#C9973A"/>
    </linearGradient>
    <linearGradient id="purpleF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D1480"/>
      <stop offset="100%" stop-color="#220B48"/>
    </linearGradient>
    <linearGradient id="scarletF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8102A"/>
      <stop offset="100%" stop-color="#7A0818"/>
    </linearGradient>
    <linearGradient id="navyF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C3564"/>
      <stop offset="100%" stop-color="#0E1E3A"/>
    </linearGradient>
    <linearGradient id="sparkF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <linearGradient id="goldTextF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D478"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
  </defs>

  <!-- ICON (scaled to left side) -->
  <g transform="translate(8,12) scale(0.8)">
    <!-- M body -->
    <polygon points="20,96 34,96 34,30 20,40" fill="url(#navyF)"/>
    <polygon points="34,30 34,56 60,82 60,56" fill="url(#scarletF)"/>
    <polygon points="60,56 60,82 86,56 86,30" fill="url(#purpleF)"/>
    <polygon points="86,30 86,96 100,96 100,40" fill="url(#navyF)"/>
    <!-- Gold outline -->
    <polyline points="20,96 20,40 34,30 34,56 60,82 86,56 86,30 100,40 100,96"
      stroke="url(#goldEdgeF)" stroke-width="2" stroke-linejoin="miter" fill="none"/>
    <line x1="20" y1="96" x2="34" y2="96" stroke="url(#goldEdgeF)" stroke-width="2"/>
    <line x1="86" y1="96" x2="100" y2="96" stroke="url(#goldEdgeF)" stroke-width="2"/>
    <!-- Inner seams -->
    <line x1="34" y1="30" x2="34" y2="96" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
    <line x1="86" y1="30" x2="86" y2="96" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
    <!-- Forge spark -->
    <polygon points="60,74 65,82 60,90 55,82" fill="url(#sparkF)"/>
    <polygon points="60,77 63,82 60,87 57,82" fill="#FFFBE6" opacity="0.85"/>
  </g>

  <!-- WORDMARK (right side, vertically centered) -->
  <text x="260" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue','Arial Black',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="38" letter-spacing="14"
        fill="url(#goldTextF)">METTLE</text>

  <!-- Gold underline under wordmark -->
  <line x1="140" y1="78" x2="380" y2="78" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <!-- Scarlet center accent -->
  <line x1="245" y1="78" x2="275" y2="78" stroke="#B8102A" stroke-width="1.2"/>
</svg>

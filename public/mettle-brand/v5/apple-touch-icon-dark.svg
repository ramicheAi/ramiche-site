<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Dark app icon — optimized for small sizes (home screen) -->
  <rect width="180" height="180" rx="40" fill="#0A0A12"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="50%" stop-color="#F5E6A3"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <linearGradient id="p" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5B24B5"/>
      <stop offset="100%" stop-color="#2A0F5E"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E0142E"/>
      <stop offset="100%" stop-color="#8B0E20"/>
    </linearGradient>
    <linearGradient id="n" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B5299"/>
      <stop offset="100%" stop-color="#142A52"/>
    </linearGradient>
    <linearGradient id="sg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="50%" stop-color="#F5E6A3"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F5E6A3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F5E6A3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ambient glow -->
  <circle cx="90" cy="90" r="50" fill="url(#bg)"/>
  <!-- M body — larger, bolder, centered -->
  <g transform="translate(7,6) scale(1.38)">
    <!-- Left leg — navy -->
    <polygon points="22,94 38,94 38,28 22,37" fill="url(#n)"/>
    <!-- Left diagonal — scarlet -->
    <polygon points="38,28 38,52 60,76 60,52" fill="url(#s)"/>
    <!-- Right diagonal — purple -->
    <polygon points="60,52 60,76 82,52 82,28" fill="url(#p)"/>
    <!-- Right leg — navy -->
    <polygon points="82,28 82,94 98,94 98,37" fill="url(#n)"/>
    <!-- Gold outline — thicker for legibility at small size -->
    <polyline points="22,94 22,37 38,28 38,52 60,76 82,52 82,28 98,37 98,94"
      stroke="url(#g)" stroke-width="3.5" stroke-linejoin="round" fill="none"/>
    <line x1="22" y1="94" x2="38" y2="94" stroke="url(#g)" stroke-width="3.5"/>
    <line x1="82" y1="94" x2="98" y2="94" stroke="url(#g)" stroke-width="3.5"/>
    <!-- Forge spark — diamond -->
    <polygon points="60,70 66,78 60,86 54,78" fill="url(#sg)" opacity="0.95"/>
    <polygon points="60,73 64,78 60,83 56,78" fill="#FFFBE6" opacity="0.9"/>
  </g>
</svg>

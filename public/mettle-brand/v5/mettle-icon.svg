<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    METTLE v5.1 — "The Forged M" (Refined)
    Cleaner geometry, thicker gold outlines, refined forge spark,
    subtle inner glow. More sophisticated, more iconic.
    Biblical palette: navy, scarlet, purple, gold.
  -->
  <defs>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8862A"/>
      <stop offset="25%" stop-color="#F0D478"/>
      <stop offset="50%" stop-color="#FFFBE6"/>
      <stop offset="75%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
    <linearGradient id="purpleDeep" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4A1A99"/>
      <stop offset="100%" stop-color="#1E0940"/>
    </linearGradient>
    <linearGradient id="scarletRich" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#CC1230"/>
      <stop offset="100%" stop-color="#6E0A1A"/>
    </linearGradient>
    <linearGradient id="navyDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A6E"/>
      <stop offset="100%" stop-color="#0C1C38"/>
    </linearGradient>
    <linearGradient id="sparkGold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="50%" stop-color="#F0D478"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="0.5" cy="0.65" r="0.35">
      <stop offset="0%" stop-color="#F0D478" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0D478" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle background glow from forge spark area -->
  <circle cx="60" cy="78" r="30" fill="url(#innerGlow)"/>

  <!-- M BODY — clean 4-facet construction, tighter proportions -->
  <!-- Left leg — navy (truth) -->
  <polygon points="22,94 36,94 36,30 22,38" fill="url(#navyDeep)"/>
  <!-- Left diagonal — scarlet (strength) -->
  <polygon points="36,30 36,54 60,78 60,54" fill="url(#scarletRich)"/>
  <!-- Right diagonal — purple (royalty) -->
  <polygon points="60,54 60,78 84,54 84,30" fill="url(#purpleDeep)"/>
  <!-- Right leg — navy (truth) -->
  <polygon points="84,30 84,94 98,94 98,38" fill="url(#navyDeep)"/>

  <!-- GOLD OUTLINE — full perimeter, every edge, thicker for sophistication -->
  <polyline points="22,94 22,38 36,30 36,54 60,78 84,54 84,30 98,38 98,94"
    stroke="url(#goldEdge)" stroke-width="2.5" stroke-linejoin="miter" fill="none"/>
  <!-- Bottom feet -->
  <line x1="22" y1="94" x2="36" y2="94" stroke="url(#goldEdge)" stroke-width="2.5"/>
  <line x1="84" y1="94" x2="98" y2="94" stroke="url(#goldEdge)" stroke-width="2.5"/>
  <!-- Inner fold seams — subtle structural gold -->
  <line x1="36" y1="30" x2="36" y2="94" stroke="#D4A843" stroke-width="1" opacity="0.35"/>
  <line x1="84" y1="30" x2="84" y2="94" stroke="#D4A843" stroke-width="1" opacity="0.35"/>

  <!-- FORGE SPARK — refined diamond, cleaner proportions -->
  <polygon points="60,72 66,80 60,88 54,80" fill="url(#sparkGold)" opacity="0.9"/>
  <polygon points="60,75 63.5,80 60,85 56.5,80" fill="#FFFBE6" opacity="0.8"/>

  <!-- Minimal radiance — just two tiny lines, not busy -->
  <line x1="60" y1="70" x2="60" y2="66" stroke="#F0D478" stroke-width="0.7" opacity="0.4" stroke-linecap="round"/>
</svg>

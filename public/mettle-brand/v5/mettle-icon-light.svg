  <line x1="20" y1="96" x2="34" y2="96" stroke="url(#goldEdgeL)" stroke-width="2.5"/>
  <line x1="86" y1="96" x2="100" y2="96" stroke="url(#goldEdgeL)" stroke-width="2.5"/>
  <line x1="34" y1="30" x2="34" y2="96" stroke="#B8862A" stroke-width="1.2" opacity="0.5"/>
  <line x1="86" y1="30" x2="86" y2="96" stroke="#B8862A" stroke-width="1.2" opacity="0.5"/>
  <line x1="34" y1="56" x2="60" y2="82" stroke="#B8862A" stroke-width="1" opacity="0.3"/>
  <line x1="86" y1="56" x2="60" y2="82" stroke="#B8862A" stroke-width="1" opacity="0.3"/>

  <polygon points="60,74 65,82 60,90 55,82" fill="url(#sparkGoldL)"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    METTLE v5 — Light background variant
    Same structure, adjusted opacity for light backgrounds
  -->
  <defs>
    <linearGradient id="goldEdgeL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8862A"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="65%" stop-color="#C9973A"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
    <linearGradient id="purpleDeepL" x1="0" y1="0" x2="0" y2="1">

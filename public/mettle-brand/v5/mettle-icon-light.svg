  <line x1="60" y1="72" x2="60" y2="68" stroke="#C9973A" stroke-width="0.8" opacity="0.5"/>
  <line x1="53" y1="79" x2="50" y2="77" stroke="#C9973A" stroke-width="0.8" opacity="0.35"/>
  <line x1="67" y1="79" x2="70" y2="77" stroke="#C9973A" stroke-width="0.8" opacity="0.35"/>

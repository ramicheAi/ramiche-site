<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    METTLE v6 — "The Crown M"
    Cleaner, more sophisticated. Symbolic crown element integrated into M peaks.
    Biblical palette: purple, scarlet, gold, navy blue.
    Gold outlined edges throughout. Minimal. Iconic.
  -->
  <defs>
    <linearGradient id="gold6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9973A"/>
      <stop offset="40%" stop-color="#F0D478"/>
      <stop offset="70%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#C9973A"/>
    </linearGradient>
    <linearGradient id="purple6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A1A90"/>
      <stop offset="100%" stop-color="#2A0D58"/>
    </linearGradient>
    <linearGradient id="scarlet6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C41230"/>
      <stop offset="100%" stop-color="#8A0C20"/>
    </linearGradient>
    <linearGradient id="navy6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3868"/>
      <stop offset="100%" stop-color="#10223E"/>
    </linearGradient>
  </defs>

  <!-- M BODY — clean symmetrical construction -->
  <!-- Left leg — navy (truth) -->
  <polygon points="22,98 36,98 36,32 22,42" fill="url(#navy6)"/>
  <!-- Left inner face — scarlet (strength) -->
  <polygon points="36,32 60,58 60,84 36,58" fill="url(#scarlet6)"/>
  <!-- Right inner face — purple (royalty) -->
  <polygon points="60,58 60,84 84,58 84,32" fill="url(#purple6)"/>
  <!-- Right leg — navy (truth) -->
  <polygon points="84,32 84,98 98,98 98,42" fill="url(#navy6)"/>

  <!-- CROWN — three points rising from the M peaks -->
  <!-- Left crown point -->
  <polygon points="22,42 28,22 36,32" fill="url(#gold6)"/>
  <!-- Center crown point (tallest) -->
  <polygon points="53,32 60,14 67,32" fill="url(#gold6)"/>
  <!-- Right crown point -->
  <polygon points="84,32 92,22 98,42" fill="url(#gold6)"/>

  <!-- GOLD OUTLINE — full perimeter including crown -->
  <polyline points="22,98 22,42 28,22 36,32 36,58 60,84 84,58 84,32 92,22 98,42 98,98"
    stroke="url(#gold6)" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>
  <!-- Bottom feet -->
  <line x1="22" y1="98" x2="36" y2="98" stroke="url(#gold6)" stroke-width="2.2"/>
  <line x1="84" y1="98" x2="98" y2="98" stroke="url(#gold6)" stroke-width="2.2"/>
  <!-- Center crown point outline -->
  <polyline points="36,32 53,32 60,14 67,32 84,32"
    stroke="url(#gold6)" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>

  <!-- Subtle inner structure lines -->
  <line x1="36" y1="32" x2="36" y2="98" stroke="#D4A843" stroke-width="0.8" opacity="0.3"/>
  <line x1="84" y1="32" x2="84" y2="98" stroke="#D4A843" stroke-width="0.8" opacity="0.3"/>

  <!-- Crown jewels — three small gold diamonds at crown tips -->
  <circle cx="28" cy="22" r="2" fill="#FFFBE6" opacity="0.9"/>
  <circle cx="60" cy="14" r="2.5" fill="#FFFBE6" opacity="0.95"/>
  <circle cx="92" cy="22" r="2" fill="#FFFBE6" opacity="0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <!--
    METTLE v6 Full Logo — Crown M icon + wordmark lockup
  -->
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9973A"/>
      <stop offset="40%" stop-color="#F0D478"/>
      <stop offset="70%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#C9973A"/>
    </linearGradient>
    <linearGradient id="p6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A1A90"/>
      <stop offset="100%" stop-color="#2A0D58"/>
    </linearGradient>
    <linearGradient id="s6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C41230"/>
      <stop offset="100%" stop-color="#8A0C20"/>
    </linearGradient>
    <linearGradient id="n6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3868"/>
      <stop offset="100%" stop-color="#10223E"/>
    </linearGradient>
    <linearGradient id="gt6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D478"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
  </defs>

  <!-- ICON (left, scaled) -->
  <g transform="translate(6,10) scale(0.83)">
    <polygon points="22,98 36,98 36,32 22,42" fill="url(#n6)"/>
    <polygon points="36,32 60,58 60,84 36,58" fill="url(#s6)"/>
    <polygon points="60,58 60,84 84,58 84,32" fill="url(#p6)"/>
    <polygon points="84,32 84,98 98,98 98,42" fill="url(#n6)"/>
    <!-- Crown -->
    <polygon points="22,42 28,22 36,32" fill="url(#g6)"/>
    <polygon points="53,32 60,14 67,32" fill="url(#g6)"/>
    <polygon points="84,32 92,22 98,42" fill="url(#g6)"/>
    <!-- Gold outline -->
    <polyline points="22,98 22,42 28,22 36,32 36,58 60,84 84,58 84,32 92,22 98,42 98,98"
      stroke="url(#g6)" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>
    <line x1="22" y1="98" x2="36" y2="98" stroke="url(#g6)" stroke-width="2.2"/>
    <line x1="84" y1="98" x2="98" y2="98" stroke="url(#g6)" stroke-width="2.2"/>
    <polyline points="36,32 53,32 60,14 67,32 84,32"
      stroke="url(#g6)" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>
    <!-- Inner structure -->
    <line x1="36" y1="32" x2="36" y2="98" stroke="#D4A843" stroke-width="0.8" opacity="0.3"/>
    <line x1="84" y1="32" x2="84" y2="98" stroke="#D4A843" stroke-width="0.8" opacity="0.3"/>
    <!-- Crown jewels -->
    <circle cx="28" cy="22" r="2" fill="#FFFBE6" opacity="0.9"/>
    <circle cx="60" cy="14" r="2.5" fill="#FFFBE6" opacity="0.95"/>
    <circle cx="92" cy="22" r="2" fill="#FFFBE6" opacity="0.9"/>
  </g>

  <!-- WORDMARK (right, centered vertically) -->
  <text x="270" y="70" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue','Arial Black',Helvetica,Arial,sans-serif"
        font-weight="900" font-size="40" letter-spacing="16"
        fill="url(#gt6)">METTLE</text>

  <!-- Thin gold baseline -->
  <line x1="145" y1="80" x2="395" y2="80" stroke="#D4A843" stroke-width="0.8" opacity="0.4"/>
  <!-- Scarlet accent -->
  <line x1="254" y1="80" x2="286" y2="80" stroke="#C41230" stroke-width="1.5"/>
</svg>

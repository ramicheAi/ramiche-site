<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    METTLE Icon — "The Faceted M"
    Biblical palette: purple (royalty), scarlet (strength), gold (glory), blue (truth)
    Isometric/3D fold. Minimalist. Iconic.
  -->
  <!-- Left leg — deep purple -->
  <polygon points="15,100 30,100 30,25 15,35" fill="#3A1078"/>
  <!-- Left diagonal — scarlet -->
  <polygon points="30,25 30,55 60,85 60,55" fill="#B8001F"/>
  <!-- Right diagonal — rich purple-blue -->
  <polygon points="60,55 60,85 90,55 90,25" fill="#4C1A8A"/>
  <!-- Right leg — deep purple -->
  <polygon points="90,25 90,100 105,100 105,35" fill="#3A1078"/>
  <!-- Gold highlight — top edges -->
  <polygon points="15,35 30,25 32,27 17,37" fill="#D4A843" opacity="0.7"/>
  <polygon points="90,25 105,35 103,37 88,27" fill="#D4A843" opacity="0.7"/>
  <!-- Center valley — deep shadow -->
  <polygon points="30,55 60,85 90,55 60,55" fill="#1A0536" opacity="0.5"/>
  <!-- Blue accent — subtle inner glow on center -->
  <polygon points="55,60 60,65 65,60 60,55" fill="#1E3A6E" opacity="0.4"/>
</svg>

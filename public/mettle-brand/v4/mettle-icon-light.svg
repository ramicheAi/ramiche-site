<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    METTLE Icon — Light variant for white/light backgrounds
    Same Faceted M, adjusted for contrast on light
  -->
  <!-- Left leg -->
  <polygon points="15,100 30,100 30,25 15,35" fill="#2D0D5E"/>
  <!-- Left diagonal — scarlet -->
  <polygon points="30,25 30,55 60,85 60,55" fill="#9A0018"/>
  <!-- Right diagonal -->
  <polygon points="60,55 60,85 90,55 90,25" fill="#3D1170"/>
  <!-- Right leg -->
  <polygon points="90,25 90,100 105,100 105,35" fill="#2D0D5E"/>
  <!-- Gold highlight -->
  <polygon points="15,35 30,25 32,27 17,37" fill="#C49A38" opacity="0.8"/>
  <polygon points="90,25 105,35 103,37 88,27" fill="#C49A38" opacity="0.8"/>
  <!-- Center valley -->
  <polygon points="30,55 60,85 90,55 60,55" fill="#1A0536" opacity="0.3"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METTLE Brand Preview</title>
<style>
body { background: #0a0a1a; color: #fff; font-family: system-ui; margin: 0; padding: 20px; }
h1 { font-size: 18px; color: #00F0FF; margin: 30px 0 10px; }
h2 { font-size: 14px; color: #888; margin: 0 0 16px; font-weight: normal; }
.card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; text-align: center; }
.card img { max-width: 100%; height: auto; }
.label { font-size: 12px; color: #666; margin-top: 12px; }
.colors { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
.swatch { width: 48px; height: 48px; border-radius: 8px; }
</style>
</head>
<body>
<h1>METTLE Brand Assets</h1>
<h2>For Ramon's approval — Feb 23, 2026</h2>

<div class="card">
  <p class="label">ICON MARK</p>
  <img src="mettle-icon.svg" alt="METTLE Icon" style="width: 160px;">
</div>

<div class="card">
  <p class="label">WORDMARK</p>
  <img src="mettle-wordmark.svg" alt="METTLE Wordmark" style="width: 280px;">
</div>

<div class="card">
  <p class="label">FULL LOGO (Icon + Wordmark)</p>
  <img src="mettle-logo-full.svg" alt="METTLE Full Logo" style="width: 320px;">
</div>

<div class="card">
  <p class="label">WHITE VARIANT (for photos/dark backgrounds)</p>
  <img src="mettle-icon-white.svg" alt="METTLE Icon White" style="width: 160px;">
</div>

<div class="card">
  <p class="label">BRAND COLORS</p>
  <div class="colors">
    <div>
      <div class="swatch" style="background: #00F0FF;"></div>
      <p class="label">Cyan<br>#00F0FF</p>
    </div>
    <div>
      <div class="swatch" style="background: #FF6B35;"></div>
      <p class="label">Orange<br>#FF6B35</p>
    </div>
    <div>
      <div class="swatch" style="background: #0a0a1a; border: 1px solid #333;"></div>
      <p class="label">Dark<br>#0A0A1A</p>
    </div>
  </div>
</div>

</body>
</html>

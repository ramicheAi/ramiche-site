<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw &mdash; Semantic Cache Analytics</title>

  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <style>
    /* ------------------------------------------------------------------ */
    /* Root variables & reset                                             */
    /* ------------------------------------------------------------------ */
    :root {
      --bg-primary:    #0d1117;
      --bg-card:       #161b22;
      --bg-card-hover: #1c2333;
      --border:        #30363d;
      --text-primary:  #e6edf3;
      --text-muted:    #8b949e;
      --accent-blue:   #58a6ff;
      --accent-green:  #3fb950;
      --accent-orange: #d29922;
      --accent-red:    #f85149;
      --accent-purple: #bc8cff;
      --accent-cyan:   #39d2c0;
      --radius:        8px;
      --shadow:        0 1px 3px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                              */
    /* ------------------------------------------------------------------ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header h1 span { color: var(--accent-blue); }

    .header-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px 48px;
    }

    /* ------------------------------------------------------------------ */
    /* KPI strip                                                           */
    /* ------------------------------------------------------------------ */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      transition: background 0.15s;
    }

    .kpi-card:hover { background: var(--bg-card-hover); }

    .kpi-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .kpi-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .kpi-green  .kpi-value { color: var(--accent-green); }
    .kpi-blue   .kpi-value { color: var(--accent-blue); }
    .kpi-orange .kpi-value { color: var(--accent-orange); }
    .kpi-red    .kpi-value { color: var(--accent-red); }
    .kpi-purple .kpi-value { color: var(--accent-purple); }
    .kpi-cyan   .kpi-value { color: var(--accent-cyan); }

    /* ------------------------------------------------------------------ */
    /* Chart grid                                                          */
    /* ------------------------------------------------------------------ */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) {
      .chart-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px 16px;
      box-shadow: var(--shadow);
    }

    .chart-card h3 {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-primary);
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    /* ------------------------------------------------------------------ */
    /* Agent table                                                         */
    /* ------------------------------------------------------------------ */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      overflow-x: auto;
    }

    .table-card h3 {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }

    tr:hover td { background: var(--bg-card-hover); }

    .hit-rate-good  { color: var(--accent-green); font-weight: 600; }
    .hit-rate-ok    { color: var(--accent-orange); font-weight: 600; }
    .hit-rate-poor  { color: var(--accent-red); font-weight: 600; }

    /* ------------------------------------------------------------------ */
    /* Footer                                                              */
    /* ------------------------------------------------------------------ */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <h1><span>OpenClaw</span> Semantic Cache Analytics</h1>
    <div class="header-meta">
      <span><span class="status-dot"></span>Live</span>
      <span id="last-refresh">Refreshing...</span>
    </div>
  </header>

  <div class="container" id="app">
    <div class="loading" id="loading-state">Loading analytics data...</div>
  </div>

  <footer class="footer">
    OpenClaw Semantic Cache v1.0.0 &mdash; Auto-refreshes every 60 seconds
  </footer>

  <!-- ------------------------------------------------------------------ -->
  <!-- Application logic                                                   -->
  <!-- ------------------------------------------------------------------ -->
  <script>
    const API_BASE = '';  // same origin
    const REFRESH_INTERVAL = 60_000;

    // Chart instances (so we can destroy & re-create on refresh)
    let charts = {};

    // ---- Helpers ----

    function fmt(n, decimals = 2) {
      return Number(n).toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });
    }

    function fmtUSD(n) { return '$' + fmt(n, 4); }

    function fmtK(n) {
      if (n >= 1_000_000) return fmt(n / 1_000_000, 1) + 'M';
      if (n >= 1_000)     return fmt(n / 1_000, 1) + 'K';
      return n.toString();
    }

    function hitRateClass(pct) {
      if (pct >= 40) return 'hit-rate-good';
      if (pct >= 20) return 'hit-rate-ok';
      return 'hit-rate-poor';
    }

    // ---- Fetch data ----

    async function fetchJSON(url) {
      const res = await fetch(API_BASE + url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ---- Render ----

    async function render() {
      try {
        const [stats, agents, logs] = await Promise.all([
          fetchJSON('/api/stats'),
          fetchJSON('/api/agents'),
          fetchJSON('/api/logs'),
        ]);

        const container = document.getElementById('app');
        const cost    = stats.cost    || {};
        const savings = stats.savings || {};
        const cache   = stats.cache   || {};

        // ---- Build KPI strip ----
        const totalCalls    = cost.total_calls || 0;
        const totalCostUSD  = cost.total_cost_usd || 0;
        const savedUSD      = savings.total_saved_usd || 0;
        const hitRate       = cost.cache_hit_rate || '0%';
        const totalTokens   = (cost.total_input_tokens || 0) + (cost.total_output_tokens || 0);
        const agentCount    = Object.keys(agents).length;

        // ---- Build daily data ----
        const daily = cost.daily || {};
        const sortedDays = Object.keys(daily).sort();

        // ---- Build model data ----
        const byModel = cost.by_model || {};

        // ---- Build agent table rows ----
        const agentList = Object.entries(agents)
          .map(([name, data]) => ({ name, ...data }))
          .sort((a, b) => b.cost_usd - a.cost_usd);

        // ---- Render HTML ----
        container.innerHTML = `
          <!-- KPIs -->
          <div class="kpi-strip">
            <div class="kpi-card kpi-blue">
              <div class="kpi-label">Total API Calls</div>
              <div class="kpi-value">${totalCalls.toLocaleString()}</div>
              <div class="kpi-sub">${agentCount} agents active</div>
            </div>
            <div class="kpi-card kpi-orange">
              <div class="kpi-label">Total Spend</div>
              <div class="kpi-value">${fmtUSD(totalCostUSD)}</div>
              <div class="kpi-sub">${fmtK(totalTokens)} tokens processed</div>
            </div>
            <div class="kpi-card kpi-green">
              <div class="kpi-label">Estimated Savings</div>
              <div class="kpi-value">${fmtUSD(savedUSD)}</div>
              <div class="kpi-sub">${savings.savings_pct || '0%'} of would-have-spent</div>
            </div>
            <div class="kpi-card kpi-cyan">
              <div class="kpi-label">Cache Hit Rate</div>
              <div class="kpi-value">${hitRate}</div>
              <div class="kpi-sub">${cost.cache_hits || 0} hits / ${cost.cache_misses || 0} misses</div>
            </div>
            <div class="kpi-card kpi-purple">
              <div class="kpi-label">Cache Entries</div>
              <div class="kpi-value">${cache.activeEntries || 0}</div>
              <div class="kpi-sub">${cache.expiredEntries || 0} expired</div>
            </div>
          </div>

          <!-- Charts -->
          <div class="chart-grid">
            <div class="chart-card">
              <h3>Daily Cost Trend</h3>
              <div class="chart-wrap"><canvas id="chart-daily-cost"></canvas></div>
            </div>
            <div class="chart-card">
              <h3>Daily Cache Hit Rate</h3>
              <div class="chart-wrap"><canvas id="chart-hit-rate"></canvas></div>
            </div>
            <div class="chart-card">
              <h3>Cost by Agent (Top 10)</h3>
              <div class="chart-wrap"><canvas id="chart-agent-cost"></canvas></div>
            </div>
            <div class="chart-card">
              <h3>Tokens by Model</h3>
              <div class="chart-wrap"><canvas id="chart-model-tokens"></canvas></div>
            </div>
          </div>

          <!-- Agent table -->
          <div class="table-card">
            <h3>Agent Breakdown</h3>
            <table>
              <thead>
                <tr>
                  <th>Agent</th>
                  <th>Calls</th>
                  <th>Cost (USD)</th>
                  <th>Input Tokens</th>
                  <th>Output Tokens</th>
                  <th>Cache Hits</th>
                  <th>Hit Rate</th>
                </tr>
              </thead>
              <tbody>
                ${agentList.map(a => {
                  const rate = a.calls > 0
                    ? ((a.cache_hits / a.calls) * 100).toFixed(1)
                    : 0;
                  return `
                  <tr>
                    <td><strong>${a.name}</strong></td>
                    <td>${a.calls.toLocaleString()}</td>
                    <td>${fmtUSD(a.cost_usd)}</td>
                    <td>${fmtK(a.input_tokens)}</td>
                    <td>${fmtK(a.output_tokens)}</td>
                    <td>${a.cache_hits}</td>
                    <td class="${hitRateClass(rate)}">${rate}%</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;

        // ---- Render charts ----
        Chart.defaults.color = '#8b949e';
        Chart.defaults.borderColor = '#30363d';

        // 1. Daily cost trend
        charts.dailyCost = new Chart(
          document.getElementById('chart-daily-cost'),
          {
            type: 'bar',
            data: {
              labels: sortedDays.map(d => d.slice(5)),  // MM-DD
              datasets: [{
                label: 'Cost (USD)',
                data: sortedDays.map(d => daily[d].cost_usd),
                backgroundColor: '#58a6ff44',
                borderColor: '#58a6ff',
                borderWidth: 1.5,
                borderRadius: 4,
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: ctx => '$' + ctx.parsed.y.toFixed(4),
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: { callback: v => '$' + v.toFixed(2) },
                  grid: { color: '#30363d55' },
                },
                x: { grid: { display: false } },
              },
            },
          }
        );

        // 2. Daily cache hit rate
        charts.hitRate = new Chart(
          document.getElementById('chart-hit-rate'),
          {
            type: 'line',
            data: {
              labels: sortedDays.map(d => d.slice(5)),
              datasets: [{
                label: 'Hit Rate %',
                data: sortedDays.map(d => {
                  const day = daily[d];
                  const total = day.cache_hits + day.cache_misses;
                  return total > 0 ? ((day.cache_hits / total) * 100).toFixed(1) : 0;
                }),
                borderColor: '#3fb950',
                backgroundColor: '#3fb95022',
                fill: true,
                tension: 0.35,
                pointRadius: 4,
                pointBackgroundColor: '#3fb950',
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: { label: ctx => ctx.parsed.y + '%' },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  max: 100,
                  ticks: { callback: v => v + '%' },
                  grid: { color: '#30363d55' },
                },
                x: { grid: { display: false } },
              },
            },
          }
        );

        // 3. Cost by agent (horizontal bar, top 10)
        const topAgents = agentList.slice(0, 10);
        const agentColors = [
          '#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff',
          '#39d2c0', '#f778ba', '#79c0ff', '#7ee787', '#ffa657',
        ];

        charts.agentCost = new Chart(
          document.getElementById('chart-agent-cost'),
          {
            type: 'bar',
            data: {
              labels: topAgents.map(a => a.name),
              datasets: [{
                label: 'Cost (USD)',
                data: topAgents.map(a => a.cost_usd),
                backgroundColor: agentColors.map(c => c + '99'),
                borderColor: agentColors,
                borderWidth: 1.5,
                borderRadius: 4,
              }],
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: { label: ctx => '$' + ctx.parsed.x.toFixed(4) },
                },
              },
              scales: {
                x: {
                  beginAtZero: true,
                  ticks: { callback: v => '$' + v.toFixed(2) },
                  grid: { color: '#30363d55' },
                },
                y: { grid: { display: false } },
              },
            },
          }
        );

        // 4. Tokens by model (doughnut)
        const modelNames = Object.keys(byModel);
        const modelColors = ['#f85149', '#58a6ff', '#3fb950', '#d29922', '#bc8cff'];

        charts.modelTokens = new Chart(
          document.getElementById('chart-model-tokens'),
          {
            type: 'doughnut',
            data: {
              labels: modelNames,
              datasets: [{
                data: modelNames.map(m =>
                  (byModel[m].input_tokens || 0) + (byModel[m].output_tokens || 0)
                ),
                backgroundColor: modelColors.slice(0, modelNames.length),
                borderColor: '#161b22',
                borderWidth: 3,
                hoverOffset: 8,
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: '55%',
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: { padding: 16, usePointStyle: true, pointStyleWidth: 10 },
                },
                tooltip: {
                  callbacks: {
                    label: ctx => {
                      const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                      const pct = ((ctx.parsed / total) * 100).toFixed(1);
                      return `${ctx.label}: ${fmtK(ctx.parsed)} tokens (${pct}%)`;
                    },
                  },
                },
              },
            },
          }
        );

        // Update timestamp
        document.getElementById('last-refresh').textContent =
          'Last refresh: ' + new Date().toLocaleTimeString();

      } catch (err) {
        console.error('[dashboard] Render error:', err);
        const container = document.getElementById('app');
        container.innerHTML = `
          <div class="loading">
            Failed to load data. Ensure the server is running on port 3847.
            <br><br>
            <code style="color:var(--accent-red)">${err.message}</code>
          </div>
        `;
      }
    }

    // ---- Bootstrap ----
    render();
    setInterval(() => {
      // Destroy existing charts before re-rendering
      Object.values(charts).forEach(c => { try { c.destroy(); } catch {} });
      charts = {};
      render();
    }, REFRESH_INTERVAL);
  </script>

</body>
</html>
